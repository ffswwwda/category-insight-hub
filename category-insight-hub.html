<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>类目用户研究座 · Category Insight Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300d4ff'/%3E%3Cstop offset='50%25' stop-color='%23a855f7'/%3E%3Cstop offset='100%25' stop-color='%23ff6b9d'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23g)'/%3E%3Ctext x='32' y='46' font-family='system-ui,-apple-system,sans-serif' font-size='38' font-weight='700' fill='white' text-anchor='middle'%3E研%3C/text%3E%3C/svg%3E">
<style>
:root{
  /* ---- Radium light tokens (default) ---- */
  --rad-grad:linear-gradient(135deg,#00d4ff 0%,#a855f7 50%,#ff6b9d 100%);
  --rad-grad-soft:linear-gradient(135deg,#00C3F3 0%,#A5CCD4 50%,#BFBADE 100%);
  --rad-grad-gold:linear-gradient(135deg,#DBB360 0%,#CA983B 100%);
  --rad-cyan:#00C3F3; --rad-purple:#a855f7; --rad-pink:#ff6b9d; --rad-gold:#DBB360; --rad-teal:#A5CCD4;
  --rad-easing:cubic-bezier(.25,.46,.45,.94);
}
/* Theme-aware semantic tokens */
body.light{
  --bg:#F7F5F5; --panel:rgba(255,255,255,.72); --panel-solid:#fff;
  --border:rgba(0,0,0,.08); --border-glass:rgba(255,255,255,.6);
  --ink:#414546; --ink-2:rgba(0,0,0,.6); --muted:rgba(0,0,0,.4); --line:rgba(0,0,0,.05);
  --accent:#00C3F3; --accent-soft:#E6F7FC; --accent-2:#CA983B;
  --teal:#A5CCD4; --gold:#D4A017; --purple:#8B7BB5; --rose:#D4727A;
  --green-a:#16A34A; --green-b:#059669;
  --glass-bg:rgba(255,255,255,.6); --glass-blur:blur(20px);
  --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --shadow-md:0 8px 24px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
  --radius:18px; --radius-sm:13px; --radius-xs:9px;
}
body.dark{
  --bg:#0a0e1a; --panel:rgba(10,14,26,.7); --panel-solid:rgba(20,28,48,.6);
  --border:rgba(255,255,255,.1); --border-glass:rgba(255,255,255,.08);
  --ink:#ffffff; --ink-2:rgba(255,255,255,.62); --muted:rgba(255,255,255,.4); --line:rgba(255,255,255,.08);
  --accent:#00d4ff; --accent-soft:rgba(0,212,255,.12); --accent-2:#DBB360;
  --teal:#A5CCD4; --gold:#DBB360; --purple:#BFBADE; --rose:#ff6b9d;
  --green-a:#10b981; --green-b:#10b981;
  --glass-bg:rgba(255,255,255,.06); --glass-blur:blur(20px);
  --shadow-sm:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.2);
  --shadow-md:0 8px 24px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);
  --shadow-lg:0 12px 40px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --radius:18px; --radius-sm:13px; --radius-xs:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  font-size:14px;line-height:1.58;-webkit-font-smoothing:antialiased;overflow:hidden;cursor:none;
  transition:background .5s ease,color .5s ease}
body.light,body.dark{cursor:none}
input,textarea,select{cursor:auto}

/* === Radium background blobs + grid === */
body.light::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 18% 82%, rgba(0,195,243,.07) 0%, transparent 45%),
    radial-gradient(circle at 82% 18%, rgba(168,85,247,.05) 0%, transparent 45%),
    radial-gradient(circle at 55% 55%, rgba(219,179,96,.035) 0%, transparent 60%)}
body.dark::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 18% 82%, rgba(0,212,255,.10) 0%, transparent 45%),
    radial-gradient(circle at 82% 18%, rgba(168,85,247,.10) 0%, transparent 45%),
    radial-gradient(circle at 55% 55%, rgba(255,107,157,.04) 0%, transparent 60%)}
body.light::after,body.dark::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,195,243,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,195,243,.025) 1px,transparent 1px);
  background-size:60px 60px}

/* === Radium signature: cursor + glow + scroll-progress === */
.custom-cursor{position:fixed;width:20px;height:20px;border-radius:50%;background:var(--rad-grad);
  pointer-events:none;z-index:100000;mix-blend-mode:screen;box-shadow:0 0 20px var(--rad-cyan),0 0 40px var(--rad-purple);
  transform:translate(-50%,-50%);transition:width .3s ease,height .3s ease}
body.light .custom-cursor{mix-blend-mode:normal;box-shadow:0 0 14px rgba(0,195,243,.6),0 0 28px rgba(168,85,247,.4)}
.cursor-glow{position:fixed;width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,.28) 0%,transparent 70%);pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);transition:all .12s ease}
.particle{position:fixed;width:6px;height:6px;border-radius:50%;background:var(--accent);pointer-events:none;
  z-index:99998;opacity:.8}
.scroll-progress{position:fixed;top:0;left:0;height:4px;width:0;background:var(--rad-grad);z-index:9999;
  transition:width .12s ease;box-shadow:0 0 20px var(--rad-cyan)}

/* Ripple + entrance */
.ripple-host{position:relative;overflow:hidden}
.ripple{position:absolute;border-radius:50%;background:rgba(0,212,255,.3);transform:scale(0);
  animation:ripple-animation .6s linear;pointer-events:none}
@keyframes ripple-animation{to{transform:scale(4);opacity:0}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.4);border-radius:8px;border:2px solid transparent}
::-webkit-scrollbar-thumb:hover{background:rgba(128,128,128,.6)}

/* === App Layout === */
.app{display:flex;height:100vh;position:relative;z-index:1}

/* === Sidebar === */
.sidebar{width:232px;flex:0 0 232px;background:var(--panel);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px 16px;z-index:10;
  box-shadow:2px 0 24px rgba(0,0,0,.04)}
.brand{display:flex;gap:10px;align-items:center;margin-bottom:22px;padding:0 2px}
.brand-mark{width:36px;height:36px;border-radius:11px;background:var(--rad-grad);
  color:#fff;display:grid;place-items:center;font-size:15px;font-weight:800;box-shadow:0 6px 18px rgba(0,195,243,.35)}
.brand-name{font-weight:800;font-size:14px;line-height:1.25;
  background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}

/* Workspace tabs */
.ws-tabs{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;flex-shrink:0}
.ws-tab{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:13px;
  border:1px solid var(--border);background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  color:var(--ink-2);font-family:inherit;font-size:13px;font-weight:650;cursor:pointer;
  transition:all .28s var(--rad-easing);position:relative;overflow:hidden}
.ws-tab::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:transparent;border-radius:0 4px 4px 0;transition:background .28s}
.ws-tab:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,195,243,.07)}
.ws-tab.active{border-color:transparent;color:#fff;background:var(--rad-grad);box-shadow:0 6px 18px rgba(0,195,243,.3)}
.ws-tab.active::before{background:rgba(255,255,255,.6)}
.ws-tab .wsi{opacity:.7;font-size:14px;width:20px;text-align:center;flex-shrink:0}

/* === Nav Tree (three big sections) === */
.nav-tree{flex:1;overflow-y:auto;margin-top:4px;display:flex;flex-direction:column;gap:13px;padding-right:2px}
.nav-sec{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:14px;overflow:hidden;flex-shrink:0;transition:border-color .3s}
.nav-sec:hover{border-color:rgba(0,195,243,.35)}
.nav-sec-head{display:flex;align-items:center;gap:7px;padding:11px 13px;font-size:12.5px;font-weight:800;color:var(--ink);
  border-bottom:1px solid var(--line);background:rgba(255,255,255,.4)}
body.dark .nav-sec-head{background:rgba(255,255,255,.04)}
.nsh-ico{font-size:13px;color:var(--accent);opacity:.9}
.nav-sec-tag{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px}
.nav-sec-tag.shared{background:rgba(128,128,128,.14);color:var(--muted)}
.nav-sec-tag.dyn{background:var(--rad-grad);color:#fff}
.nav-sec-dyn .nsh-ico{color:var(--green-a)}
.nav-sec-body{padding:7px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;
  font-size:12.5px;color:var(--ink-2);transition:all .2s var(--rad-easing);position:relative}
.nav-item:hover{background:rgba(0,195,243,.08);color:var(--accent);padding-left:13px}
.nav-item.active{background:rgba(0,195,243,.12);color:var(--accent);font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px;background:var(--rad-grad)}
.ni-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ni-dot.on{background:var(--green-b);box-shadow:0 0 0 3px rgba(5,150,105,.18)}
.ni-dot.off{background:var(--muted);opacity:.5}
.ni-ico{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.ni-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-idx{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:7px;border:1px solid var(--line);font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.3px;flex-shrink:0}
.gal-idx{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0}
.ni-sub{font-size:10px;color:var(--muted);flex-shrink:0}

/* Source / Framework detail views */
.src-detail,.fw-detail{padding:26px 28px;max-width:920px}
/* ——VOC 标签体系页面—— */
.voc-page{display:flex;gap:16px;padding:10px 24px 40px}
.voc-col{flex:0 0 380px;min-width:0;overflow-y:auto;max-height:calc(100vh-200px)}
.voc-col-right{flex:1;border-left:1px solid var(--border);padding-left:16px}
.voc-psh{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.voc-psh::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--rad-grad)}
.voc-mods{display:grid;gap:4px}
.voc-mod{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.voc-mhead{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .15s;user-select:none}
.voc-mhead:hover{background:rgba(0,212,255,.04)}
.voc-mn{width:22px;height:22px;border-radius:6px;background:var(--vmc,#0891B2);color:#fff;font-size:9px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.voc-mt{font-size:11.5px;font-weight:800;color:var(--ink);flex:1}
.voc-note{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(245,158,11,.12);color:#b45309}
.voc-arw{font-size:10px;color:var(--muted);transition:transform .2s}
.voc-mbody{display:grid;gap:6px;padding:8px 10px 10px;border-top:1px solid var(--border)}
.voc-subsec{display:grid;gap:3px}
.voc-subhead{font-size:10.5px;font-weight:700;color:var(--ink);letter-spacing:.2px}
.voc-tags{display:flex;flex-wrap:wrap;gap:3px}
.voc-tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px;background:rgba(128,140,164,.1);color:var(--ink-2)}
.voc-base{background:rgba(8,145,178,.08);color:var(--accent);font-weight:700}
.voc-bases{display:flex;gap:4px;flex-wrap:wrap}
.voc-cats{display:flex;gap:6px;margin-bottom:10px}
.voc-cat{font-size:11px;font-weight:800;padding:5px 14px;border-radius:8px;border:1px solid var(--border);background:var(--glass-bg);color:var(--ink-2);cursor:pointer;transition:all .15s;font-family:inherit}
.voc-cat.on,.voc-cat:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06)}
.voc-cases{display:grid;grid-template-columns:1fr;gap:10px}
.voc-ucards{display:grid;gap:10px}
.voc-ucards{display:grid;gap:10px} /* keep for fallback */
.voc-rows{display:grid;gap:10px}
.voc-row{display:grid;grid-template-columns:1fr 78px 1fr 78px 1.08fr;gap:0;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);position:relative;overflow:hidden;padding:0}
.voc-row::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--uc,var(--accent))}
.voc-col{padding:14px 16px;min-width:0;position:relative}
/* 三板块切分：底色 + 虚线分隔，分区更明显 */
.voc-col-user{background:rgba(148,163,184,.035)}
.voc-col-insight{border-left:1px dashed rgba(0,212,255,.22);background:rgba(0,212,255,.03)}
.voc-col-actions{border-left:1px dashed rgba(8,145,178,.22);background:rgba(8,145,178,.035)}
.voc-utop{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.voc-uavatar{width:30px;height:30px;border-radius:9px;background:var(--rad-grad);color:#fff;font-size:14px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.voc-uinfo{flex:1;min-width:0}
.voc-uname{font-size:13px;font-weight:800;color:var(--ink);line-height:1.2}
.voc-ulevel{font-size:9.5px;color:var(--muted);margin-top:1px;line-height:1.3}
.voc-ulevel b{font-weight:800}
.voc-udesc{font-size:10.5px;color:var(--ink-2);line-height:1.45;margin-bottom:6px}
.voc-usec{margin-top:4px}
.voc-us-head{font-size:8.5px;font-weight:800;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px}
.voc-uhits{display:flex;flex-wrap:wrap;gap:2px}
.voc-hit{font-size:8.5px;font-weight:600;padding:1px 5px;border-radius:4px;background:rgba(139,92,246,.1);color:#7c3aed}
/* 用户 → 洞察 → 动作 的优雅曲线连接器 */
.voc-arrow{position:relative;width:100%;height:100%;justify-self:center;display:flex;align-items:center;justify-content:center;overflow:visible}
.voc-curve-svg{width:100%;height:100%;display:block;overflow:visible}
.voc-curve{fill:none;stroke:var(--accent);stroke-width:1.6;stroke-linecap:round;opacity:.5;
  filter:drop-shadow(0 0 3px rgba(0,212,255,.4))}
/* 洞察列 */
.voc-insight-label{font-size:9px;font-weight:800;color:var(--accent);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.voc-insight-title{font-size:14px;font-weight:900;color:var(--ink);line-height:1.35;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--ink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.voc-insight-dir{font-size:10.5px;color:var(--ink-2);line-height:1.5;margin-bottom:6px}
.voc-insight-aim{font-size:10px;font-weight:700;color:var(--accent);padding:4px 8px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:6px;display:inline-block}
/* 动作列 */
.voc-actions-label{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.voc-actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.voc-act{background:rgba(8,145,178,.08);border:1px solid rgba(8,145,178,.2);border-radius:6px;padding:5px 6px;display:flex;align-items:flex-start;gap:5px;min-height:42px}
.voc-act-n{width:16px;height:16px;border-radius:50%;background:var(--rad-grad);color:#fff;font-size:9px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.voc-act-t{font-size:10px;font-weight:600;color:var(--ink);line-height:1.35}
.sd-kpis{display:flex;gap:14px;margin:18px 0 22px;flex-wrap:wrap}
.sd-kpi{flex:1;min-width:150px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm)}
.sd-kv{font-size:18px;font-weight:800;
  background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sd-kl{font-size:11px;color:var(--muted);margin-top:3px}
.sd-desc{font-size:13.5px;color:var(--ink-2);line-height:1.75;background:var(--glass-bg);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px}
.sd-hint{margin-top:14px;font-size:12.5px;color:var(--accent-2);background:rgba(202,138,4,.1);border:1px solid rgba(202,138,4,.25);
  border-radius:12px;padding:12px 15px}
.fw-desc{font-size:14px;color:var(--ink-2);line-height:1.8;background:var(--glass-bg);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;margin-bottom:14px}
.fw-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.fw-meta-chip{font-size:11.5px;color:var(--ink-2);background:var(--glass-bg);border:1px solid var(--border);
  border-radius:20px;padding:5px 13px}
.fw-meta-chip b{color:var(--muted);font-weight:800;margin-right:6px;font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.fw-secs{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.fw-sec{background:var(--glass-bg);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.fw-sec-h{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;
  font-size:13.5px;font-weight:800;color:var(--ink);user-select:none;transition:background .15s}
.fw-sec-h:hover{background:rgba(128,140,164,.06)}
.fw-sec-t{flex:1;min-width:0}
.fw-sec-arw{color:var(--fc,var(--accent));font-size:13px;margin-left:10px;flex-shrink:0}
.fw-sec-b{padding:4px 18px 16px;border-top:1px solid var(--border)}
.fw-sec-d{font-size:12.5px;color:var(--ink-2);line-height:1.65;margin:10px 0 12px}
.fw-items{display:flex;flex-direction:column;gap:9px}
.fw-item{display:flex;gap:12px;align-items:flex-start}
.fw-item::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--fc,var(--accent));margin-top:6px;flex-shrink:0}
.fw-ih{font-size:13px;font-weight:800;color:var(--ink);min-width:128px;flex-shrink:0;line-height:1.5}
.fw-ip{font-size:12.5px;color:var(--ink-2);line-height:1.6}
.fw-extra{background:linear-gradient(135deg,rgba(8,145,178,.05),rgba(8,145,178,.01));border:1px solid rgba(8,145,178,.2);
  border-radius:14px;padding:18px 20px;margin-bottom:18px}
.fw-extra-h{font-size:14px;font-weight:900;color:var(--fc,#0891B2);margin-bottom:3px}
.fw-extra-sub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
.fw-jtbd-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.fw-jtbd-btn{font-size:12px;font-weight:700;padding:7px 15px;border-radius:9px;border:1px solid var(--border);
  background:var(--glass-bg);color:var(--ink-2);cursor:pointer;font-family:inherit;transition:all .15s}
.fw-jtbd-btn:hover{border-color:var(--fc,#0891B2);color:var(--fc,#0891B2)}
.fw-jtbd-btn.on{background:var(--fc,#0891B2);color:#fff;border-color:var(--fc,#0891B2)}
.fw-jtbd-out{font-size:13px;color:var(--ink-2);line-height:1.7;background:var(--bg);border:1px dashed var(--border);
  border-radius:10px;padding:12px 14px;min-height:46px}
.fw-jtbd-out b{color:var(--fc,#0891B2)}
.fw-note{font-size:12.5px;color:var(--muted);line-height:1.7}

/* ===== Framework Visualizations ===== */
.fw-viz{margin:4px 0 20px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden}
.fw-viz::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--fc,#0891B2),transparent)}
.fw-viz-head{display:flex;align-items:baseline;gap:10px;margin-bottom:2px}
.fw-viz-kicker{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--fc,#0891B2);opacity:.85}
.fw-viz-title{font-size:15px;font-weight:800;color:var(--ink)}
.fw-viz-sub{font-size:12px;color:var(--ink-2);line-height:1.6;margin-bottom:14px;max-width:760px}
.fw-viz svg{display:block;margin:0 auto;max-width:100%;height:auto}
.fw-viz-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:14px;font-size:11.5px;color:var(--ink-2)}
.fw-viz-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}
.fw-qlabel{font-size:11px;font-weight:700;fill:var(--ink)}
.fw-qsub{font-size:9.5px;fill:var(--muted)}
.fw-axis{stroke:var(--border);stroke-width:1.5}
.fw-grid{stroke:var(--line);stroke-width:1;stroke-dasharray:3 4}
.fw-pt-t{font-size:10.5px;font-weight:700;fill:var(--ink)}
.fw-pt-s{font-size:9px;fill:var(--muted)}

/* Journey */
.fj-node{fill:var(--panel-solid);stroke:var(--fc,#A855F7);stroke-width:2}
.fj-num{font-size:15px;font-weight:900;fill:var(--fc,#A855F7);text-anchor:middle}
.fj-name{font-size:12px;font-weight:800;fill:var(--ink);text-anchor:middle}
.fj-tp{font-size:9.5px;fill:var(--muted);text-anchor:middle}
.fj-arrow{stroke:var(--muted);stroke-width:1.6;fill:none}
.fj-curve{stroke:var(--fc,#A855F7);stroke-width:2.4;fill:none;opacity:.85}
.fj-baseline{stroke:var(--border);stroke-width:1.2;stroke-dasharray:4 4}

/* Motivation */
.fm-wrap{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.fm-lane{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.fm-lane-h{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.fm-lane-h i{width:9px;height:9px;border-radius:50%;background:var(--fc,#10B981)}
.fm-chips{display:flex;flex-wrap:wrap;gap:6px}
.fm-chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:var(--glass-bg);border:1px solid var(--border);color:var(--ink-2)}
.fm-seg{border:1px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--bg)}
.fm-seg-h{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:8px}
.fm-seg-bar{display:flex;align-items:center;gap:8px;margin:7px 0}
.fm-seg-name{font-size:11px;font-weight:700;width:88px;flex-shrink:0;color:var(--ink-2)}
.fm-seg-track{flex:1;height:8px;border-radius:5px;background:rgba(128,140,164,.15);overflow:hidden}
.fm-seg-fill{height:100%;border-radius:5px;background:var(--fc,#10B981)}
.fm-seg-pct{font-size:11px;font-weight:700;width:38px;text-align:right;color:var(--ink-2)}
.fm-seg-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.fm-seg-tag{font-size:10px;padding:2px 8px;border-radius:7px;background:rgba(128,140,164,.12);color:var(--muted)}

/* Needs pyramid + cards */
.fn-pyr{display:block;margin:0 auto 8px}
.fn-layer-t{font-size:11px;font-weight:800;fill:#fff}
.fn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:6px}
.fn-card{border:1px solid var(--border);border-radius:11px;padding:9px 11px;background:var(--glass-bg);
  cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.fn-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fc,#0EA5E9)}
.fn-card:hover{border-color:var(--fc,#0EA5E9);transform:translateY(-2px)}
.fn-card.on{border-color:var(--fc,#0EA5E9);background:color-mix(in srgb,var(--fc,#0EA5E9) 12%,var(--glass-bg))}
.fn-card-k{font-size:9.5px;font-weight:800;color:var(--fc,#0EA5E9);letter-spacing:.04em;text-transform:uppercase}
.fn-card-n{font-size:13px;font-weight:800;color:var(--ink);margin:1px 0}
.fn-card-en{font-size:9.5px;color:var(--muted);font-style:italic}
.fn-card-d{font-size:10.5px;color:var(--ink-2);line-height:1.45;margin-top:3px}
.fn-out{margin-top:12px;padding:14px 16px;border-radius:12px;border:1px dashed var(--fc,#0EA5E9);
  background:color-mix(in srgb,var(--fc,#0EA5E9) 7%,transparent);font-size:13px;color:var(--ink);line-height:1.7}
.fn-out b{color:var(--fc,#0EA5E9)}

/* Compass / Extreme matrix points */
.fc-pt,.fe-pt{font-size:10px;font-weight:700;fill:var(--ink)}
.fc-quad-t{font-size:11px;font-weight:800}
.fc-quad-s{font-size:9px;fill:var(--muted)}

/* TRIZ */
.ft-contra{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.ft-box{flex:1;min-width:150px;border:1px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--bg)}
.ft-box-h{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
.ft-box-v{font-size:13.5px;font-weight:800;color:var(--ink)}
.ft-badge{font-size:12px;font-weight:900;color:#fff;background:var(--rad-grad);padding:6px 12px;border-radius:20px;white-space:nowrap}
.ft-pair{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 4px}
.ft-prin{font-size:11px;font-weight:700;padding:5px 11px;border-radius:9px;background:color-mix(in srgb,var(--fc,#14B8A6) 12%,var(--glass-bg));border:1px solid color-mix(in srgb,var(--fc,#14B8A6) 35%,transparent);color:var(--ink)}
.ft-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:6px;margin-top:6px}
.ft-p{font-size:10.5px;font-weight:600;padding:5px 9px;border-radius:8px;background:var(--glass-bg);border:1px solid var(--border);color:var(--ink-2);cursor:default;transition:all .12s}
.ft-p:hover{border-color:var(--fc,#14B8A6);color:var(--ink);transform:translateY(-1px)}
.ft-p b{color:var(--fc,#14B8A6);font-weight:800;margin-right:4px}

/* Plutchik */
.fp-petal{cursor:pointer;transition:opacity .2s,transform .2s;transform-origin:200px 200px}
.fp-petal:hover{opacity:.9}
.fp-petal.on{stroke:#fff;stroke-width:2.5}
.fp-emo{font-size:10px;font-weight:800;fill:var(--ink);text-anchor:middle;pointer-events:none}
.fp-emo-en{font-size:7.5px;fill:var(--muted);text-anchor:middle;pointer-events:none}
.fp-out{margin-top:10px;padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg);font-size:13px;line-height:1.7;color:var(--ink-2)}
.fp-out b{color:var(--fc,#EC4899)}

/* Responsive */
@media(max-width:680px){.fm-wrap{grid-template-columns:1fr}.fn-grid{grid-template-columns:repeat(2,1fr)}}

/* Sidebar footer */
.sb-foot{padding-top:14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);line-height:1.6}
/* 未来实验室 nav 标签（前瞻·紫） */
.nav-sec-tag.lab{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff}
.nav-sec-lab:hover{border-color:rgba(139,92,246,.4)}

/* === 未来实验室 · 数字世界虚拟预测 概念介绍页 === */
.lab-wrap{padding:24px 28px 48px;animation:fadeInUp .5s var(--rad-easing) both}
.lab-hero{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:20px;padding:34px 30px 30px;
  background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(8,145,178,.10));
  box-shadow:0 18px 50px rgba(99,102,241,.12);display:flex;gap:32px;align-items:center}
body.dark .lab-hero{background:linear-gradient(135deg,rgba(139,92,246,.22),rgba(8,145,178,.16))}
.lab-hero-text{flex:1;min-width:0}
.lab-hero-viz{width:260px;flex-shrink:0;position:relative}
.lab-hero::after{content:'';position:absolute;right:-40px;top:-60px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,92,246,.22),transparent 70%);pointer-events:none;z-index:0}
.lab-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;color:#7c3aed;background:rgba(139,92,246,.12);padding:5px 12px;border-radius:20px}
body.dark .lab-eyebrow{color:#c4b5fd}
.lab-title{font-size:32px;font-weight:850;margin:14px 0 4px;letter-spacing:-.5px;line-height:1.15}
.lab-tagline{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:14px}
.lab-tagline .accent{background:linear-gradient(135deg,#8b5cf6,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lab-desc{font-size:13.5px;line-height:1.85;color:var(--ink-2);max-width:760px}
.lab-stats{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px;position:relative;z-index:1}
.lab-stat{flex:1;min-width:150px;border:1px solid var(--border);background:var(--glass-bg);border-radius:14px;padding:14px 16px}
.lab-stat .v{font-size:22px;font-weight:850;background:linear-gradient(135deg,#8b5cf6,#0891b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-variant-numeric:tabular-nums}
.lab-stat .k{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600}
.lab-sec{margin-top:34px}
.lab-sec-h{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:800;color:var(--ink);margin-bottom:16px}
.lab-sec-h::before{content:'';width:4px;height:18px;border-radius:3px;background:linear-gradient(135deg,#8b5cf6,#0891b2)}
/* 5 步流水线 */
.lab-pipe{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.lab-step{position:relative;border:1px solid var(--border);background:var(--glass-bg);border-radius:14px;padding:16px 14px 14px;overflow:hidden}
.lab-step::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#8b5cf6,#0891b2)}
.lab-step .n{font-size:12px;font-weight:850;color:#7c3aed;letter-spacing:1px}
body.dark .lab-step .n{color:#c4b5fd}
.lab-step .t{font-size:14px;font-weight:800;margin:6px 0 6px;color:var(--ink)}
.lab-step .d{font-size:11.5px;line-height:1.65;color:var(--muted)}
.lab-step .arw{position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:#a78bfa;font-size:18px;z-index:2}
/* 3 种预测路径 */
.lab-paths{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.lab-path{border:1px solid var(--border);background:var(--glass-bg);border-radius:16px;padding:18px 16px}
.lab-path .pn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;
  font-size:13px;font-weight:850;color:#fff;background:linear-gradient(135deg,#8b5cf6,#6366f1);margin-bottom:10px}
.lab-path h4{font-size:14px;font-weight:800;margin:0 0 6px}
.lab-path .pt{font-size:11px;font-weight:700;color:#7c3aed;margin-bottom:8px}
body.dark .lab-path .pt{color:#c4b5fd}
.lab-path p{font-size:12px;line-height:1.7;color:var(--muted);margin:0}
/* 概念卡 */
.lab-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.lab-ccard{border:1px solid var(--border);background:var(--glass-bg);border-radius:16px;padding:18px 18px;display:flex;gap:13px;align-items:flex-start}
.lab-ccard .ci{font-size:22px;flex-shrink:0;width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:rgba(139,92,246,.1)}
.lab-ccard h4{font-size:14px;font-weight:800;margin:2px 0 6px}
.lab-ccard p{font-size:11.5px;line-height:1.7;color:var(--muted);margin:0}
.lab-ccard .ico{flex-shrink:0;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:rgba(139,92,246,.1)}
/* 规划中状态横幅 */
.lab-status{display:flex;align-items:center;gap:10px;margin-top:22px;padding:13px 16px;border-radius:13px;
  background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);font-size:12px;color:#b45309;line-height:1.55}
body.dark .lab-status{color:#fbbf24}
.lab-status svg{flex-shrink:0}
/* 示例数据集 callout */
.lab-callout{display:flex;gap:12px;align-items:flex-start;margin-top:22px;padding:14px 16px;border-radius:14px;
  border:1px solid var(--border);background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(168,85,247,.07));font-size:12.5px;line-height:1.7;color:var(--ink-2)}
.lab-callout .ci{flex-shrink:0;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(168,85,247,.12)}
.lab-callout b{color:var(--ink)}
/* CTA */
.lab-cta{margin-top:32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  border:1px solid var(--border);border-radius:18px;padding:22px 24px;background:var(--glass-bg)}
.lab-cta .ct-txt{flex:1;min-width:220px}
.lab-cta .ct-txt b{font-size:15px;font-weight:800;display:block;margin-bottom:4px}
.lab-cta .ct-txt span{font-size:12px;color:var(--muted);line-height:1.6}
.lab-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:13px;border:none;cursor:pointer;
  font-family:inherit;font-size:14px;font-weight:800;color:#fff;background:linear-gradient(135deg,#8b5cf6,#0891b2);
  box-shadow:0 10px 26px rgba(99,102,241,.32);transition:transform .2s var(--rad-easing),box-shadow .2s}
.lab-btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(99,102,241,.42)}
.lab-btn .arr{font-size:16px}

/* ── 全局浮动预测工作台入口（底部固定）── */
.glob-float-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:9998;display:flex;align-items:center;gap:14px;
  padding:12px 22px;border-radius:18px 18px 0 0;
  background:var(--bg);border:1px solid var(--border);border-bottom:none;
  box-shadow:0 -8px 32px rgba(0,0,0,.14);
  transition:opacity .35s var(--rad-easing), transform .35s var(--rad-easing), visibility .35s;
  opacity:1;visibility:visible}
.glob-float-bar.hidden{opacity:0;visibility:hidden;transform:translateX(-50%) translateY(20px);pointer-events:none}
.glob-float-bar .gf-label{font-size:11.5px;font-weight:700;color:var(--ink-2)}
.glob-float-bar .gf-sub{font-size:10px;color:var(--muted)}
.glob-float-bar button{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;
  border-radius:11px;border:none;cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,#8b5cf6,#0891b2);
  box-shadow:0 8px 22px rgba(99,102,241,.28);transition:transform .18s,box-shadow .18s}
.glob-float-bar button:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(99,102,241,.40)}
.glob-float-bar button span{font-size:14px}
.lab-note{margin-top:18px;font-size:11px;color:var(--muted);line-height:1.6}
@media(max-width:760px){.lab-pipe{grid-template-columns:repeat(2,1fr)}.lab-paths,.lab-cards{grid-template-columns:1fr}.lab-title{font-size:26px}.lab-hero{flex-direction:column}.lab-hero-viz{width:100%;max-width:280px;margin:0 auto}}

/* === Main === */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

/* Topbar */
.topbar{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--border);
  background:var(--panel);backdrop-filter:var(--glass-blur);z-index:5;flex-shrink:0}
.topbar h1{margin:0;font-size:18px;font-weight:800;letter-spacing:.12px;
  background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-search{display:flex;align-items:center;gap:6px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:10px;padding:7px 12px;width:260px}
.tb-search input{border:0;outline:0;background:transparent;font-size:12.5px;width:100%;color:var(--ink);font-family:inherit}
.tb-search .ico{color:var(--muted);font-size:13px}
.tb-btn{appearance:none;border:1px solid var(--border);background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  color:var(--ink-2);font-family:inherit;font-size:12px;font-weight:600;padding:6px 13px;border-radius:9px;cursor:pointer;
  transition:all .2s var(--rad-easing)}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,195,243,.07)}
.tb-primary{background:var(--rad-grad);border-color:transparent;color:#fff;box-shadow:0 6px 18px rgba(0,195,243,.3)}
.tb-primary:hover{filter:brightness(1.06)}
.theme-toggle{width:40px;height:40px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all .3s var(--rad-easing);flex-shrink:0}
.theme-toggle:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(0,195,243,.25);transform:scale(1.1)}

/* Subnav for workspace view */
.subnav{display:none;padding:0 24px;border-bottom:1px solid var(--border);background:var(--panel);backdrop-filter:var(--glass-blur);z-index:4;flex-shrink:0}
.subnav.show{display:flex;gap:0}
.sn-tab{padding:9px 16px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;position:relative;transition:all .2s}
.sn-tab:hover{color:var(--ink-2)}
.sn-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Board (scrollable area) */
.board{flex:1;overflow:auto;position:relative}

/* Views */
.view{display:none;min-height:100%}
.view.active{display:block;animation:fadeInUp .5s var(--rad-easing)}

/* ========== VIEW: PURPOSE GRID ========== */
.purpose-grid-wrap{padding:22px 24px 40px}
.purpose-header{margin-bottom:18px;animation:fadeInUp .5s var(--rad-easing)}
.ph-title{font-size:20px;font-weight:800;letter-spacing:.1px;display:flex;align-items:center;gap:10px}
.ph-dot{width:9px;height:9px;border-radius:50%;display:inline-block;box-shadow:0 0 10px currentColor}
.ph-dot.a{background:var(--accent);color:var(--accent)}
.ph-dot.b{background:var(--green-a);color:var(--green-a)}
.ph-desc{font-size:12.5px;color:var(--muted);margin-top:4px;max-width:680px}
.src-pool-bar{background:var(--glass-bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 18px;margin-bottom:20px;box-shadow:var(--shadow-sm);backdrop-filter:var(--glass-blur)}
.spb-label{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.spb-sources{display:flex;flex-wrap:wrap;gap:6px}
.spb-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;
  background:rgba(0,195,243,.1);color:var(--accent);border:1px solid rgba(0,195,243,.2);transition:all .2s}
.spb-chip:hover{background:rgba(0,195,243,.18)}

/* Two-column purpose layout */
.purpose-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pc-col{display:flex;flex-direction:column;gap:10px}
.pc-col-header{font-size:13px;font-weight:800;letter-spacing:.3px;padding:11px 4px 9px;
  color:var(--ink);border-radius:var(--radius-xs);text-align:center}
.pc-col-header.col-a{background:linear-gradient(135deg,rgba(0,195,243,.1),rgba(165,204,212,.06));color:var(--accent);border:1px solid rgba(0,195,243,.18)}
.pc-col-header.col-b{background:linear-gradient(135deg,rgba(22,163,74,.1),rgba(5,150,105,.06));color:var(--green-a);border:1px solid rgba(22,163,74,.18)}

/* Purpose card */
.p-card{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:16px 18px;cursor:pointer;transition:all .3s var(--rad-easing);position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);animation:fadeInUp .5s var(--rad-easing) backwards}
.p-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad);
  opacity:0;transform:scaleX(0);transform-origin:left;transition:all .3s ease}
.p-card:hover{border-color:rgba(0,195,243,.4);box-shadow:var(--shadow-md);transform:translateY(-6px) rotateX(2deg)}
.p-card:hover::after{opacity:1;transform:scaleX(1)}
.pcard-name{font-size:14.5px;font-weight:700;margin-bottom:6px}
.pcard-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pm-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--line);color:var(--ink-2)}
.pm-tag.src{background:rgba(0,195,243,.1);color:var(--accent)}
.pm-tag.mtd{background:rgba(139,123,181,.14);color:var(--purple)}
.pm-tag.tl{background:rgba(219,179,96,.16);color:var(--gold)}
.pcard-desc{font-size:11.5px;color:var(--muted);line-height:1.5}

/* ========== VIEW: PURPOSE WORKSPACE ========== */
.ws-bar{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);
  background:var(--panel);backdrop-filter:var(--glass-blur);flex-shrink:0;z-index:4}
.ws-back{appearance:none;border:1px solid var(--border);background:var(--glass-bg);color:var(--ink-2);
  font-family:inherit;font-size:12px;font-weight:650;padding:6px 13px;border-radius:9px;cursor:pointer;transition:all .2s}
.ws-back:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,195,243,.07)}
.ws-title{font-size:16px;font-weight:800}
.ws-tag{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(22,163,74,.14);color:var(--green-a)}

/* Mode toggle */
.mode-toggle{display:flex;background:var(--line);border-radius:11px;padding:3px;margin:12px 24px;flex-shrink:0;z-index:4}
.mode-opt{flex:1;padding:7px 16px;font-size:12.5px;font-weight:650;border-radius:9px;cursor:pointer;
  text-align:center;transition:all .22s var(--rad-easing);color:var(--muted);border:1px solid transparent}
.mode-opt.active{background:var(--panel-solid);color:var(--ink);box-shadow:var(--shadow-sm);border-color:var(--border)}

/* Workspace body - dual panel layout */
.ws-body{display:flex;flex:1;min-height:0;overflow:hidden}

/* Structured mode panel - 3 column layout (left: data source | center: framework | right: results) */
.struct-panel{display:flex;flex:1;gap:0;overflow:hidden;background:var(--bg)}
.struct-col{flex:1;min-width:0;overflow-y:auto;padding:16px 18px 30px;border-right:1px solid var(--border);
  scrollbar-width:thin;background:var(--bg)}
.struct-col:last-child{border-right:none}
.col-header{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.8px;text-transform:uppercase;
  padding-bottom:10px;margin-bottom:12px;border-bottom:2px solid var(--rad-grad);display:flex;align-items:center;gap:6px;
  background:linear-gradient(90deg,var(--rad-grad),transparent);background-size:100% 2px;background-repeat:no-repeat}
.struct-section{margin-bottom:18px}
.ss-head{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.ss-head::before{content:'';width:4px;height:14px;border-radius:2px;background:var(--rad-grad)}

/* Source/Insight cards in structured mode */
.s-card{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px 15px;margin-bottom:9px;transition:all .25s var(--rad-easing);position:relative;overflow:hidden}
.s-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad);
  opacity:0;transform:scaleX(0);transform-origin:left;transition:all .25s ease}
.s-card:hover{border-color:rgba(0,195,243,.4);box-shadow:var(--shadow-sm);transform:translateY(-3px)}
.s-card:hover::after{opacity:1;transform:scaleX(1)}
.sc-name{font-size:13px;font-weight:700;margin-bottom:3px}
.sc-type{font-size:10.5px;color:var(--muted);margin-bottom:6px}
.sc-concl{font-size:11.5px;color:var(--ink-2);line-height:1.5;margin-bottom:8px}
.sc-to-canvas{float:right;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer;padding:3px 10px;
  border:1px solid rgba(0,195,243,.25);border-radius:8px;transition:all .15s}
.sc-to-canvas:hover{background:rgba(0,195,243,.12);border-color:var(--accent)}

.i-card{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px 15px;margin-bottom:9px;border-left:3px solid var(--purple);transition:all .25s var(--rad-easing)}
.i-card:hover{box-shadow:var(--shadow-sm);transform:translateX(3px)}
.ic-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:4px}
.ic-body{font-size:11.5px;color:var(--ink-2);line-height:1.5}

/* Method chain */
.method-chain{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.mc-step{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:12px;color:var(--ink-2)}
.mc-num{width:22px;height:22px;border-radius:50%;background:rgba(0,195,243,.14);color:var(--accent);
  font-size:11px;font-weight:800;display:grid;place-items:center;flex-shrink:0}
.mc-arrow{color:var(--muted);font-size:14px}

/* Action list */
.action-list{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.al-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;font-size:12px;color:var(--ink-2);line-height:1.5}
.al-bullet{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0}

/* Export AI button */
.export-ai{width:100%;padding:11px;border-radius:11px;font-size:13px;font-weight:700;
  background:var(--rad-grad);color:#fff;border:0;cursor:pointer;
  font-family:inherit;transition:all .25s var(--rad-easing);box-shadow:0 6px 18px rgba(0,195,243,.3);position:relative;overflow:hidden}
.export-ai:hover{transform:translateY(-1px);box-shadow:0 8px 26px rgba(168,85,247,.35)}
.export-ai::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .6s ease}
.export-ai:hover::before{transform:translateX(100%)}

/* Canvas area */
.canvas-area{flex:1;position:relative;overflow:hidden;background:
  radial-gradient(circle at 15% 85%, rgba(0,195,243,.05) 0%, transparent 45%),
  radial-gradient(circle at 85% 15%, rgba(168,85,247,.04) 0%, transparent 45%),
  var(--bg)}

/* Canvas toolbar */
.canvas-toolbar{position:absolute;top:12px;left:12px;z-index:20;display:flex;gap:6px}
.ct-btn{appearance:none;background:var(--panel-solid);border:1px solid var(--border);border-radius:9px;
  padding:6px 12px;font-size:11.5px;font-weight:650;color:var(--ink-2);cursor:pointer;font-family:inherit;
  transition:all .15s;box-shadow:var(--shadow-sm)}
.ct-btn:hover{border-color:var(--accent);color:var(--accent)}
.ct-btn.primary{background:var(--rad-grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(0,195,243,.3)}
.ct-btn.primary:hover{filter:brightness(1.06)}

/* Canvas material drawer */
.canvas-drawer{position:absolute;top:12px;right:12px;width:220px;z-index:20;
  background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  box-shadow:var(--shadow-md);max-height:calc(100% - 80px);overflow-y:auto;backdrop-filter:var(--glass-blur)}
.cd-head{padding:12px 14px 8px;font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;
  border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.cd-toggle{cursor:pointer;color:var(--accent);font-size:11px;font-weight:700}
.cd-item{padding:10px 14px;border-bottom:1px solid var(--line);cursor:grab;transition:background .12s}
.cd-item:last-child{border-bottom:0}
.cd-item:hover{background:rgba(0,195,243,.1)}
.cd-item:active{cursor:grabbing}
.cdi-name{font-size:12px;font-weight:700;color:var(--ink)}
.cdi-sub{font-size:10.5px;color:var(--muted);margin-top:2px}

/* Canvas SVG layer (connections + cards) */
.canvas-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.canvas-svg line{stroke:rgba(0,195,243,.4);stroke-width:1.5}
.canvas-svg circle{fill:var(--accent);r:4}

/* Canvas card nodes */
.cn-node{position:absolute;min-width:140px;max-width:240px;background:var(--panel-solid);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;cursor:grab;user-select:none;z-index:2;
  box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .15s;backdrop-filter:var(--glass-blur)}
.cn-node:hover{box-shadow:var(--shadow-md);z-index:3}
.cn-node:active{cursor:grabbing}
.cn-node.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,195,243,.18),var(--shadow-md)}
.cn-node.dragging{opacity:.85;z-index:10}
.cn-type{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.cn-type.src{color:var(--accent)}
.cn-type.ins{color:var(--purple)}
.cn-type.tool{color:var(--gold)}
.cn-type.note{color:var(--green-a)}
.cn-title{font-size:13px;font-weight:700;margin-bottom:3px}
.cn-body{font-size:11px;color:var(--ink-2);line-height:1.45}
.cn-port{position:absolute;right:-6px;top:50%;width:12px;height:12px;border-radius:50%;
  background:var(--rad-grad);cursor:crosshair;transform:translateY(-50%);z-index:5}
.cn-port-left{right:auto;left:-6px}

/* Canvas zoom indicator */
.zoom-indicator{position:absolute;bottom:12px;left:12px;z-index:20;
  background:var(--panel-solid);border:1px solid var(--border);border-radius:9px;padding:5px 11px;
  font-size:11px;font-weight:600;color:var(--muted);font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}

/* ========== VOC TAGGER (in structured panel) ========== */
.tagger-panel{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.tp-input{width:100%;min-height:70px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;
  font-size:12.5px;font-family:inherit;resize:vertical;outline:none;transition:border-color .2s;background:var(--bg);color:var(--ink)}
.tp-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,195,243,.12)}
.tp-output{margin-top:10px;display:none}
.tp-output.show{display:block}
.tp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tp-tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:rgba(139,123,181,.14);color:var(--purple);border:1px solid rgba(139,123,181,.2)}
.tp-result{font-size:11.5px;color:var(--ink-2);line-height:1.55;padding:10px 12px;background:var(--bg);border-radius:9px}

/* ========== CORPUS TOOL: CSV 上传 + 情绪分析 ========== */
.csv-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  padding:22px 16px;border:1.5px dashed var(--border);border-radius:14px;cursor:pointer;
  background:var(--bg);transition:all .25s var(--rad-easing);text-align:center}
.csv-drop:hover{border-color:var(--accent);background:rgba(0,195,243,.05)}
.csv-drop.has-file{border-style:solid;border-color:var(--accent);background:rgba(0,195,243,.06)}
.csv-sq{width:42px;height:42px;border-radius:12px;background:var(--rad-grad);display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(0,195,243,.28)}
.csv-sq svg{width:22px;height:22px}
.fd-text{font-size:12.5px;color:var(--ink-2)}
.fd-text b{color:var(--ink);font-weight:700}
.csv-cols-wrap{margin-top:12px}
.csv-cols-label{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:7px}
.csv-chips{display:flex;flex-wrap:wrap;gap:7px}
.csv-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;
  background:var(--bg);border:1px solid var(--border);color:var(--ink-2);cursor:pointer;transition:all .18s var(--rad-easing)}
.csv-chip:hover{border-color:var(--accent);color:var(--accent)}
.csv-chip.selected{background:var(--rad-grad);color:#fff;border-color:transparent}
.cc-rate{font-size:10px;opacity:.7;padding-left:5px;border-left:1px solid currentColor}
.csv-info{font-size:11.5px;color:var(--muted);margin-top:8px}
.emo-tag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;
  border:1px solid;margin-left:5px}
.emo-dist{display:grid;gap:6px;margin-top:4px}
.emo-row{display:flex;align-items:center;gap:10px;font-size:12px}
.emo-name{width:42px;color:var(--ink)}
.emo-track{flex:1;height:9px;background:var(--line);border-radius:6px;overflow:hidden}
.emo-fill{display:block;height:100%;border-radius:6px}
.emo-val{width:34px;text-align:right;color:var(--muted)}
.emo-summary{display:flex;gap:10px;margin:6px 0 4px;flex-wrap:wrap}
.emo-pill{font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px;color:#fff}

/* ========== EXPORT MODAL ========== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius);
  width:660px;max-width:92vw;max-height:84vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:24px 26px;backdrop-filter:var(--glass-blur)}
.mb-title{font-size:17px;font-weight:800;
  background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.mb-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.mb-field{margin-bottom:14px}
.mb-label{font-size:12px;font-weight:700;margin-bottom:5px;color:var(--ink-2)}
.mb-textarea{width:100%;min-height:90px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;
  font-size:11.5px;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;resize:vertical;outline:none;
  background:var(--bg);color:var(--ink);line-height:1.6}
.mb-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,195,243,.12)}
.mb-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.mb-copy{padding:9px 20px;border-radius:10px;font-size:12.5px;font-weight:700;
  background:var(--rad-grad);color:#fff;border:0;cursor:pointer;font-family:inherit;position:relative;overflow:hidden}
.mb-close{padding:9px 20px;border-radius:10px;font-size:12.5px;font-weight:700;
  background:var(--glass-bg);border:1px solid var(--border);cursor:pointer;font-family:inherit;color:var(--ink-2)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--rad-grad);color:#fff;font-size:12.5px;padding:10px 18px;border-radius:11px;box-shadow:var(--shadow-lg);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* DE dashboard iframe */
.de-frame{width:100%;height:calc(100vh - 120px);border:none;display:block}
.voc-frame{width:100%;height:calc(100vh - 120px);border:none;display:block;background:transparent}

/* ============ LEVEL1: SOURCE EXPLORER ============ */
.src-explorer{padding:18px 22px;overflow:auto;height:calc(100vh - 120px)}
.se-meta{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.6}
.se-filter{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.se-search{flex:1;min-width:220px;padding:9px 12px;border:1px solid var(--border);border-radius:10px;
  background:var(--glass-bg);backdrop-filter:var(--glass-blur);font-size:13px;color:var(--ink);outline:none;transition:all .2s}
.se-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,195,243,.14)}
.se-select{padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);font-size:12.5px;color:var(--ink);cursor:pointer;transition:all .2s}
.se-select:hover{border-color:var(--accent)}
.se-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,195,243,.14)}
.se-chips{display:flex;gap:6px;flex-wrap:wrap}
.se-chip{padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);
  cursor:pointer;background:var(--glass-bg);transition:.15s}
.se-chip:hover{border-color:var(--accent);color:var(--accent)}
.se-chip.on{background:var(--rad-grad);color:#fff;border-color:transparent}
.se-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.se-kpi{background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;text-align:center;transition:all .25s var(--rad-easing);box-shadow:var(--shadow-sm)}
.se-kpi:hover{transform:translateY(-4px)}
.se-kpi b{display:block;font-size:20px;font-weight:800;
  background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.se-kpi span{font-size:11px;color:var(--muted)}
.se-table-wrap{background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--border);
  border-radius:14px;overflow:auto;max-height:calc(100vh - 440px);margin-bottom:16px}
.se-table{width:100%;border-collapse:collapse;font-size:12.5px}
.se-table th{position:sticky;top:0;background:var(--panel-solid);text-align:left;padding:10px 12px;color:var(--muted);
  font-weight:600;border-bottom:1px solid var(--border)}
.se-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--ink);vertical-align:top;transition:background .15s}
.se-table tbody tr:hover td{background:rgba(0,195,243,.06)}
.se-txt{color:var(--muted);max-width:420px}
.se-sent{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.s-正面{background:rgba(22,163,74,.16);color:#15803d}
.s-负面{background:rgba(220,38,38,.16);color:#b91c1c}
.s-中性{background:rgba(100,116,139,.16);color:#475569}
.se-report{background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--border);
  border-radius:16px;padding:20px 24px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.rep-title{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rep-title::before{content:'';width:4px;height:16px;border-radius:2px;background:var(--rad-grad)}
.rep-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.rep-kpi{text-align:center;background:var(--panel-solid);border-radius:12px;padding:12px;transition:all .25s var(--rad-easing);box-shadow:var(--shadow-sm)}
.rep-kpi:hover{transform:translateY(-3px)}
.rep-kpi b{display:block;font-size:18px;font-weight:800;
  background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rep-kpi span{font-size:11px;color:var(--muted)}
.rep-section{margin-bottom:14px}
.rep-h{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px}
.rep-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px}
.rbl{width:60px;color:var(--ink)}
.rb-track{flex:1;height:10px;background:var(--line);border-radius:6px;overflow:hidden}
.rb-fill{display:block;height:100%;background:var(--rad-grad);border-radius:6px;position:relative;overflow:hidden}
.rb-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:progress-shine 2s infinite}
@keyframes progress-shine{100%{left:100%}}
.rbv{width:42px;text-align:right;color:var(--muted)}
.rep-note{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}

/* ============ LEVEL2: NL / SUGGESTIONS / ANALYSIS ============ */
.nl-box{display:flex;gap:8px;margin-bottom:8px}
.nl-input{flex:1;min-height:46px;resize:vertical;padding:10px 12px;border:1px solid var(--border);border-radius:10px;
  background:var(--glass-bg);backdrop-filter:var(--glass-blur);font-size:13px;color:var(--ink);outline:none;font-family:inherit;transition:all .2s}
.nl-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,195,243,.14)}
.nl-result{margin-top:6px}
.nl-head{font-size:12.5px;color:var(--muted);margin-bottom:6px}
.nl-hit{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel-solid);
  border:1px solid var(--border);border-radius:10px;margin-bottom:6px;transition:all .2s}
.nl-hit:hover{border-color:var(--accent);transform:translateX(3px)}
.nl-name{font-weight:600;color:var(--ink);font-size:13px}
.nl-meta{font-size:11px;color:var(--muted)}
.nl-add{margin-left:auto;padding:5px 12px;border:none;border-radius:8px;background:var(--rad-grad);color:#fff;
  font-size:12px;cursor:pointer;transition:all .15s}
.nl-add:hover{filter:brightness(1.06)}
.nl-empty{font-size:12px;color:var(--muted);padding:8px 0}
.suggest-block{margin-bottom:12px}
.sb-title{font-size:12px;font-weight:800;color:var(--ink);margin-bottom:7px;opacity:.9;display:flex;align-items:center;gap:8px}
.sb-title::before{content:'';width:4px;height:13px;border-radius:2px;background:var(--rad-grad)}
.sg-list{display:flex;flex-wrap:wrap;gap:7px}
.sg-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);
  border-radius:20px;font-size:12px;color:var(--ink);background:var(--glass-bg);cursor:pointer;transition:.15s}
.sg-chip:hover{border-color:var(--accent);color:var(--accent)}
.sg-chip.src.on,.sg-chip.fw.on{background:rgba(0,195,243,.14);border-color:var(--accent);color:var(--accent)}
.sg-chip .sg-x{font-size:10px;color:var(--muted)}
.sg-empty{font-size:12px;color:var(--muted)}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.an-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--border);
  border-radius:14px;padding:14px;min-height:160px;transition:all .3s var(--rad-easing);box-shadow:var(--shadow-sm)}
.an-card:hover{transform:translateY(-5px);border-color:rgba(0,195,243,.35);box-shadow:var(--shadow-md)}
.an-h{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.an-h::before{content:'';width:4px;height:13px;border-radius:2px;background:var(--rad-grad)}
.an-body{font-size:12px}
.an-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
.quad-svg{width:100%;height:auto;display:block}
.quad-bg{fill:var(--panel-solid);stroke:var(--border);stroke-width:1}
.quad-axis{stroke:var(--border);stroke-width:1;stroke-dasharray:3 3}
.quad-lbl{fill:var(--muted);font-size:9px}
.quad-pt{fill:var(--accent)}
.quad-pt-lbl{fill:var(--ink);font-size:8.5px}
.seg-item{margin-bottom:10px;padding-bottom:8px;border-bottom:1px dashed var(--border)}
.seg-item b{color:var(--ink);font-size:12.5px}
.seg-tags{font-size:10.5px;color:var(--accent);margin-left:6px}
.seg-body{color:var(--muted);margin-top:3px;line-height:1.5}
.journey-flow{display:flex;align-items:stretch;gap:2px;flex-wrap:wrap}
.j-step{flex:1;min-width:64px;background:var(--panel-solid);border-radius:10px;padding:8px 6px;text-align:center;border:1px solid var(--border);transition:all .2s}
.j-step:hover{border-color:var(--accent)}
.j-num{width:18px;height:18px;line-height:18px;margin:0 auto 4px;border-radius:50%;background:var(--rad-grad);color:#fff;font-size:10px}
.j-name{font-size:11.5px;font-weight:600;color:var(--ink)}
.j-pain{font-size:10px;color:#b91c1c;margin-top:3px}
.j-arrow{align-self:center;color:var(--muted);font-size:14px}

/* ============ GALLERIES (源数据/逻辑 三大板块 → 右侧) ============ */
.gal-head{padding:22px 24px 14px}
.gal-h-title{font-size:22px;font-weight:800;letter-spacing:.1px;background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gal-h-sub{font-size:12.5px;color:var(--muted);margin-top:5px;max-width:760px;line-height:1.6}
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:6px 24px 40px}
/* ——分析框架双板块—— */
.fg-section{margin-bottom:8px}
.fg-shead{font-size:13px;font-weight:800;color:var(--ink);margin:0 24px 10px;display:flex;align-items:center;gap:8px}
.fg-shead::before{content:'';width:4px;height:14px;border-radius:2px;background:var(--rad-grad)}
.dc-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin:0 24px 10px;padding:18px 20px;
  transition:all .25s;position:relative;overflow:hidden}
.dc-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(0,195,243,.45)}
.dc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad)}
.dc-head{display:flex;align-items:center;gap:14px}
.dc-ico{width:52px;height:52px;border-radius:14px;background:var(--rad-grad);display:grid;place-items:center;flex-shrink:0;box-shadow:0 6px 18px rgba(0,195,243,.25)}
.dc-title{font-size:18px;font-weight:800;color:var(--ink)}
.dc-sub{font-size:12px;color:var(--ink-2);margin-top:2px}
.dc-go{margin-left:auto;font-size:12px;font-weight:700;color:var(--accent);opacity:.85}
.gal-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;cursor:pointer;
  transition:transform .25s var(--easing),box-shadow .25s var(--easing),border-color .25s;position:relative;overflow:hidden;animation:fadeInUp .4s both}
.gal-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad);transform:scaleX(0);transform-origin:left;transition:transform .3s var(--easing)}
.gal-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:rgba(0,195,243,.4)}
.gal-card:hover::after{transform:scaleX(1)}
.gal-top{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.gal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gal-dot.on{background:var(--green-b);box-shadow:0 0 0 3px rgba(5,150,105,.16)}
.gal-dot.off{background:var(--muted);opacity:.5}
.gal-ico{font-size:18px;flex-shrink:0}
.gal-name{font-size:15px;font-weight:700;color:var(--ink)}
.gal-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--rad-grad);color:#fff}
.gal-type{font-size:11.5px;color:var(--muted);margin-bottom:8px}
.gal-desc{font-size:12px;color:var(--ink-2);line-height:1.55;margin-bottom:12px;min-height:34px}
.gal-foot{display:flex;align-items:center;justify-content:space-between;font-size:11.5px}
.gal-rec{color:var(--green-b);font-weight:600}
.gal-foot .gal-go{color:var(--accent);font-weight:700;opacity:0;transition:opacity .2s,transform .2s;transform:translateX(-4px)}
.gal-card:hover .gal-go{opacity:1;transform:translateX(0)}

/* ============ AI TOOLS ============ */
.ai-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;padding:6px 24px 40px}
.ai-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;cursor:pointer;
  transition:transform .25s var(--easing),box-shadow .25s, border-color .25s;position:relative;overflow:hidden;animation:fadeInUp .4s both}
.ai-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(0,195,243,.45)}
.ai-ico{width:52px;height:52px;border-radius:15px;background:var(--rad-grad);display:grid;place-items:center;font-size:26px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,195,243,.25)}
.ai-name{font-size:17px;font-weight:800;margin-bottom:8px;color:var(--ink)}
.ai-desc{font-size:12.5px;color:var(--ink-2);line-height:1.65;margin-bottom:14px}
.ai-go{font-size:12.5px;font-weight:700;color:var(--accent);opacity:.85}
.ai-groups{margin-top:0}
.ai-group{margin-bottom:20px}
.ag-head{padding:8px 24px 10px;font-size:15px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:10px}
.ag-head::before{content:'';width:4px;height:16px;border-radius:2px;background:var(--rad-grad);flex-shrink:0}
.ai-group .ai-grid{padding:0 24px}

/* ============ PRODUCT SCORING TOOL ============ */
.ps-dims{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-top:14px}
.ps-dim{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;position:relative;overflow:hidden}
.ps-dim::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad)}
.ps-dim-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ps-dim-ico{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:17px}
.ps-dim-title{font-size:15px;font-weight:800;color:var(--ink)}
.ps-dim-wt{margin-left:auto;font-size:13px;font-weight:800;padding:2px 10px;border-radius:8px}
.ps-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(128,140,164,.12)}
.ps-item:last-child{border-bottom:none}
.ps-item-name{flex:1;font-size:12.5px;color:var(--ink-2);line-height:1.4}
.ps-item-score{width:56px;text-align:center;font-size:13px;font-weight:700;color:var(--ink)}
.ps-slider{flex:1;height:4px;-webkit-appearance:none;appearance:none;border-radius:2px;
  background:rgba(128,140,164,.15);outline:none;cursor:pointer}
.ps-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--rad-grad);cursor:pointer;box-shadow:0 2px 8px rgba(0,195,243,.35)}
.ps-total-bar{display:flex;align-items:center;gap:20px;margin-top:22px;padding:18px 22px;
  background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(168,87,247,.06));
  border:1px solid rgba(0,195,243,.25);border-radius:var(--radius)}
.ps-total-label{font-size:14px;font-weight:700;color:var(--ink)}
.ps-total-val{font-size:32px;font-weight:900;background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text}
.ps-total-max{font-size:12px;color:var(--muted)}
.ps-radar-wrap{text-align:center;margin-top:18px}
.ps-radar-wrap svg{max-width:360px;width:100%;height:auto}
.ps-verdict{margin-top:14px;padding:12px 18px;border-radius:var(--radius-sm);
  font-size:13.5px;font-weight:700;text-align:center;line-height:1.55}
.ps-verdict.go{background:rgba(16,185,129,.1);color:#059669;border:1px solid rgba(16,185,129,.25)}
.ps-verdict.caution{background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.25)}
.ps-verdict.stop{background:rgba(220,38,38,.1);color:#dc2626;border:1px solid rgba(220,38,38,.25)}

/* ============ PRODUCT SCORING (NL decomposition + source match + report) ============ */
.ps-input-wrap{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:16px}
.ps-nl{width:100%;min-height:120px;resize:vertical;font:13px/1.6 var(--font);color:var(--ink);
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;outline:none}
.ps-nl:focus{border-color:var(--accent)}
.ps-input-bar{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.ps-drop{display:flex;align-items:center;gap:10px;flex:1;min-width:220px;padding:10px 12px;border:1.5px dashed var(--border);
  border-radius:var(--radius-sm);cursor:pointer;color:var(--muted);font-size:12.5px;transition:border-color .2s,background .2s;
  background:var(--panel-solid)}
.ps-drop:hover{border-color:var(--accent);background:rgba(0,212,255,.08);color:var(--ink-2)}
.ps-drop svg{flex:0 0 auto}
.ps-drop input[type=file]{display:none}
.ps-run{margin-left:auto;padding:9px 20px;border:none;border-radius:10px;font-size:13px;font-weight:800;color:#fff;cursor:pointer;
  background:var(--rad-grad);background-size:200% 200%;box-shadow:0 6px 18px rgba(0,180,255,.25);transition:transform .15s}
.ps-run:hover{transform:translateY(-1px)}

.ps-decomp{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 18px}
.dc-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:9px;font-size:12px;font-weight:700;
  background:var(--glass-bg);border:1px solid var(--border)}
.dc-chip b{color:var(--accent);font-weight:800}
.dc-chip.muted{color:var(--muted)}

.ps-sec{margin:18px 0 8px;font-size:13px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
.ps-sec::before{content:'';width:4px;height:14px;border-radius:2px;background:var(--rad-grad)}
.src-match{display:flex;flex-direction:column;gap:8px}
.src-row{display:flex;align-items:center;gap:12px;padding:9px 12px;background:var(--glass-bg);border:1px solid var(--border);border-radius:10px}
.src-row .src-name{font-size:12.5px;font-weight:700;color:var(--ink);min-width:110px}
.src-row .src-track{flex:1;height:6px;border-radius:3px;background:rgba(128,140,164,.16);overflow:hidden}
.src-row .src-fill{height:100%;border-radius:3px;background:var(--rad-grad)}
.src-row .src-pct{font-size:11.5px;font-weight:800;color:var(--muted);min-width:36px;text-align:right}
.src-row .src-go{font-size:11px;font-weight:800;color:var(--accent);cursor:pointer;opacity:.85}
.src-row .src-go:hover{opacity:1}

.score-panel{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.score-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad)}
.score-panel-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.score-panel-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--rad-grad);color:#fff}
.score-panel-title{font-size:15px;font-weight:800;color:var(--ink)}
.score-panel-score{margin-left:auto;font-size:22px;font-weight:900;background:var(--rad-grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-panel-note{font-size:11.5px;color:var(--muted);margin-bottom:10px}
.score-row{padding:9px 0;border-bottom:1px dashed var(--border)}
.score-row:last-child{border-bottom:none}
.score-row-top{display:flex;align-items:center;gap:10px}
.score-row-name{font-size:12.5px;font-weight:700;color:var(--ink-2)}
.score-row-val{font-size:13px;font-weight:900;color:var(--ink);min-width:26px;text-align:right}
.score-row-val .of{font-size:10px;color:var(--muted);font-weight:600}
.score-reason{font-size:11.5px;color:var(--muted);line-height:1.6;margin:5px 0 6px}
.score-sources{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.src-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;
  background:rgba(0,212,255,.1);color:#0891b2;border:1px solid rgba(0,212,255,.22);cursor:pointer}
.src-chip:hover{background:rgba(0,212,255,.18)}
.conf{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:800;margin-left:auto}
.conf::before{content:'';width:6px;height:6px;border-radius:50%}
.conf.high{background:rgba(16,185,129,.12);color:#059669}.conf.high::before{background:#10b981}
.conf.mid{background:rgba(245,158,11,.12);color:#d97706}.conf.mid::before{background:#f59e0b}
.conf.low{background:rgba(99,102,241,.12);color:#6366f1}.conf.low::before{background:#6366f1}
.conf.guess{background:rgba(128,140,164,.14);color:#64748b}.conf.guess::before{background:#94a3b8}
.ps-conf-sum{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 4px}
.ps-conf-pill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:9px;background:var(--glass-bg);border:1px solid var(--border)}
.ps-loading{padding:30px;text-align:center;color:var(--muted);font-size:13px}
/* ——神之一手洞察工具—— */
.is-framework{margin-top:6px}
.is-steps{display:grid;grid-template-columns:1fr;gap:5px;margin-top:6px}
.is-card{display:flex;gap:8px;padding:8px 10px;background:var(--glass-bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
.is-card-n{width:24px;height:24px;border-radius:7px;background:var(--rad-grad);color:#fff;font-size:11px;font-weight:900;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.is-card-body{flex:1}
.is-card-title{font-size:11.5px;font-weight:800;color:var(--ink)}
.is-card-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-top:1px}
.ir-steps{display:grid;gap:10px}
.ir-summary{margin-bottom:2px}
.ir-card{background:var(--glass-bg);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.ir-head{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.ir-n{width:22px;height:22px;border-radius:6px;background:var(--rad-grad);color:#fff;font-size:10px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.ir-title{font-size:12px;font-weight:800;color:var(--ink)}
.ir-body{padding:8px 12px 6px}
.ir-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed rgba(128,140,164,.1)}
.ir-item:last-child{border-bottom:none}
.ir-item-k{font-size:10.5px;font-weight:700;color:var(--accent);white-space:nowrap;width:100px;flex-shrink:0}
.ir-item-v{font-size:11px;color:var(--ink-2);line-height:1.5}
/* ——领新详情弹窗（modal）—— */
.lfm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.lfm-overlay.show{display:flex}
.lfm-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);width:460px;max-width:94vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.25);animation:fadeInUp .25s both;overflow-y:auto;overflow-x:hidden;position:relative}
.lfm-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad);z-index:1}
.lfm-bar{height:3px;background:var(--rad-grad);border-radius:var(--radius) var(--radius) 0 0;flex-shrink:0}
.lfm-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.lfm-title{font-size:15px;font-weight:800;color:var(--ink);flex:1}
.lfm-actions{display:flex;gap:8px}
.lfm-btn{font-size:10px;font-weight:700;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass-bg);color:var(--ink-2);cursor:pointer;font-family:inherit;transition:all .15s;pointer-events:auto;position:relative;z-index:10001}
.lfm-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.lfm-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--glass-bg);color:var(--muted);font-size:20px;cursor:pointer;display:grid;place-items:center;line-height:1;transition:all .15s;pointer-events:auto;position:relative;z-index:10001}
.lfm-close:hover{background:rgba(220,38,38,.12);color:#dc2626}
.lfm-body{overflow-y:auto;padding:20px 24px 24px;flex:1;user-select:text;pointer-events:auto}
.lfm-detail{display:block}
.lfm-dsec{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;position:relative;overflow:hidden}
.lfm-dsec::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--rad-grad);opacity:.6}
.lfm-dlabel{font-size:9.5px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.lfm-dlabel::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--rad-grad);flex-shrink:0}
.lfm-dval{font-size:13px;color:var(--ink-2);line-height:1.6}
.lfm-dsub{font-size:11px;color:var(--muted);line-height:1.5;margin-top:3px}
.lfm-dquote{font-style:italic;border-left:3px solid var(--accent);padding-left:10px;color:var(--ink)}
/* ——新品开发创意工具—— */
.nd-tabs{display:flex;gap:0;margin:8px 0;border-bottom:1px solid var(--border)}
.nd-tab{font-size:11.5px;font-weight:800;padding:6px 14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.nd-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nd-panel{margin-top:2px}
.nd-psec{margin-bottom:10px}
.nd-psh{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.nd-cats{display:flex;flex-wrap:wrap;gap:6px}
.nd-cat{font-size:10.5px;font-weight:700;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--glass-bg);color:var(--ink-2);cursor:pointer;transition:all .15s;font-family:inherit}
.nd-cat.active,.nd-cat:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.06)}
.nd-cnt{font-size:9px;opacity:.7;margin-left:4px}
.nd-selcnt{font-size:10px;font-weight:800;padding:1px 7px;border-radius:5px;background:var(--accent);color:#fff}
.nd-prins{display:grid;gap:4px;max-height:280px;overflow-y:auto}
.nd-prin{display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .1s;background:var(--glass-bg)}
