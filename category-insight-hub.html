function setupCanvasEvents(){
  // Zoom with mousewheel
  canvasEl.addEventListener('wheel',function(e){
    e.preventDefault();
    var factor=e.deltaY>0?.92:1.08;
    state.canvasZoom=Math.max(.2, Math.min(5, state.canvasZoom*factor));
    renderCanvas();
  },{passive:false});

  // Pan with middle-click drag or space+drag
  var panning=false,pStartX,pStartY;
  canvasEl.addEventListener('mousedown',function(e){
    if(e.target===canvasEl||e.target===svgEl||(e.button===1)){
      panning=true;pStartX=e.clientX-state.canvasPanX;pStartY=e.clientY-state.canvasPanY;
      canvasEl.style.cursor='grabbing';
    }
  });
  document.addEventListener('mousemove',function(e){
    if(panning){state.canvasPanX=e.clientX-pStartX;state.canvasPanY=e.clientY-pStartY;renderCanvas();}
  });
  document.addEventListener('mouseup',function(e){if(panning){panning=false;canvasEl.style.cursor='';}});

  // Node dragging
  canvasEl.addEventListener('mousedown',function(e){
    var node=e.target.closest('.cn-node');
    if(node&&!e.target.closest('.cn-port')){
      state.isDragging=true;state.dragNode=node;
      var rect=node.getBoundingClientRect();
      var cRect=canvasEl.getBoundingClientRect();
      state.dragOffX=e.clientX-rect.left;state.dragOffY=e.clientY-rect.top;
      node.classList.add('dragging');
      e.preventDefault();
    }
  });
  document.addEventListener('mousemove',function(e){
    if(state.isDragging&&state.dragNode){
      var cRect=canvasEl.getBoundingClientRect();
      var x=(e.clientX-cRect.left-state.canvasPanX)/state.canvasZoom-state.dragOffY/state.canvasZoom;
      var y=(e.clientY-cRect.top-state.canvasPanY)/state.canvasZoom-state.dragOffY/state.canvasZoom;
      var nid=state.dragNode.getAttribute('data-nid');
      var n=state.canvasNodes.find(function(n){return n.id===nid});
      if(n){n.x=x;n.y=y;renderCanvas();}
    }
  });
  document.addEventListener('mouseup',function(e){
    if(state.isDragging){
      if(state.dragNode)state.dragNode.classList.remove('dragging');
      state.isDragging=false;state.dragNode=null;
      saveCanvasState();
    }
  });

  // Connection drawing from port to port
  var connFrom=null;
  canvasEl.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('cn-port')){
      connFrom=e.target.parentNode.getAttribute('data-nid');
    }
  });
  canvasEl.addEventListener('mouseup',function(e){
    if(connFrom&&e.target.classList.contains('cn-port')){
      var connTo=e.target.parentNode.getAttribute('data-nid');
      if(connFrom!==connTo){
        // Check duplicate
        var dup=state.canvasLines.some(function(l){
          return(l.from===connFrom&&l.to===connTo)||(l.from===connTo&&l.to===connFrom);
        });
        if(!dup){
          state.canvasLines.push({from:connFrom,to:connTo});
          saveCanvasState();renderCanvas();
        }
      }
    }
    connFrom=null;
  });
}

function renderCanvas(){
  if(!canvasEl)return;

  // Update transform
  canvasEl.style.transformOrigin='0 0';
  canvasEl.style.transform='translate('+state.canvasPanX+'px,'+state.canvasPanY+'px) scale('+state.canvasZoom+')';

  // Zoom indicator
  $('#zoomIndicator').textContent=Math.round(state.canvasZoom*100)+'%';

  // Remove old nodes
  $$('.cn-node').forEach(function(n){n.remove()});

  // Render nodes
  state.canvasNodes.forEach(function(n){
    var el=document.createElement('div');
    el.className='cn-node';el.setAttribute('data-nid',n.id);
    el.style.left=n.x+'px';el.style.top=n.y+'px';
    var typeLabel={'src':'数据源','ins':'洞察','tool':'工具','note':'批注'}[n.type]||'卡片';
    var typeClass={'src':'src','ins':'ins','tool':'tool','note':'note'}[n.type]||'';
    var bodyHtml=n.body?'<div class="cn-body">'+escHtml(n.body)+'</div>':'';
    var subHtml=n.sub?'<div style="font-size:10.5px;color:var(--muted)">'+escHtml(n.sub)+'</div>':'';
    el.innerHTML=
      '<div class="cn-type '+typeClass+'">'+typeLabel+'</div>'+
      '<div class="cn-title">'+escHtml(n.title)+'</div>'+
      subHtml+bodyHtml+
      '<div class="cn-port cn-port-left" title="连线入口"></div>'+
      '<div class="cn-port" title="连线出口"></div>';
    canvasEl.appendChild(el);

    // Double click to edit title/body
    el.addEventListener('dblclick',function(){
      var newT=prompt('编辑标题:',n.title);if(newT&&newT.trim()){n.title=newT.trim();saveCanvasState();renderCanvas();}
    });
  });

  // Render lines (SVG)
  renderCanvasLines();
}

function renderCanvasLines(){
  if(!svgEl)return;
  svgEl.innerHTML=''; // Clear

  // Get node positions (need to account for transform)
  var getNodeCenter=function(nid){
    var el=$('.cn-node[data-nid="'+nid+'"]');
    if(!el)return null;
    var rect=el.getBoundingClientRect();
    var cRect=canvasEl.getBoundingClientRect();
    return{
      rx:(rect.left+rect.width-cRect.left-state.canvasPanX)/state.canvasZoom,
      ry:(rect.top+rect.height/2-cRect.top-state.canvasPanY)/state.canvasZoom,
      lx:(rect.left-cRect.left-state.canvasPanX)/state.canvasZoom,
      ly:(rect.top+rect.height/2-cRect.top-state.canvasPanY)/state.canvasZoom
    };
  };

  state.canvasLines.forEach(function(line){
    var from=getNodeCenter(line.from),to=getNodeCenter(line.to);
    if(!from||!to)return;

    // Bezier curve: right edge of "from" -> left edge of "to"
    var dx=to.lx-from.rx;
    var cx1=from.rx+dx*.45,cy1=from.ry;
    var cx2=to.lx-dx*.45,cy2=to.ty;

    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M'+from.rx+','+from.ry+' C'+cx1+','+cy1+' '+cx2+','+cy2+' '+to.lx+','+to.ly);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','rgba(8,145,178,.3)');
    path.setAttribute('stroke-width','1.5');
    svgEl.appendChild(path);

    // Endpoint dots
    [from.rx,from.ry],[to.lx,to.ty].forEach(function(pt){
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',pt[0]);c.setAttribute('cy',pt[1]);c.setAttribute('r','3.5');
      c.setAttribute('fill','#0891B2');
      svgEl.appendChild(c);
    });
  });
}

  {tag:'外观',patterns:[/好看|丑|漂亮|美观|颜值|设计|颜色|质感|手感|材质|塑料感|廉价感|高级感|精致|粗糙/],negPatterns:[]},
  {tag:'功能',patterns:[/好用|不好用|方便|不方便|实用|鸡肋|功能|性能|效果|有效|无效|灵敏|迟钝|太快|太慢/],negPatterns:[/不难用/]},
  {tag:'噪音',patterns:[/吵|响|大声|安静|静音|噪音|噪声|吵人|嗡嗡|震动|声音大|声音小|声音太大|声音太小|太大声|太响/],negPatterns:[/不吵|很安静|静音不错|不响/]},
  {tag:'价格',patterns:[/贵|便宜|划算|性价比|价格|价位|折扣|贵了|便宜了|物有所值|不值/],negPatterns:[]},
  {tag:'清洁',patterns:[/清洗|清洁|难洗|好洗|拆卸|安装|组装|拆装|卫生|细菌|发霉/],negPatterns:[/好清洗|容易清洗|好洗/]},
  {tag:'舒适',patterns:[/舒服|不舒服|软|硬|贴合|磨手|夹手|硌|异物感|不适|疼痛/],negPatterns:[/很舒适|挺舒服|很舒服/]}
];

function runVocTagger(inputId,tagsId,resultId,outputId){
  inputId=inputId||'vocInput'; tagsId=tagsId||'vocTags'; resultId=resultId||'vocResult'; outputId=outputId||'vocOutput';
  var inputEl=$('#'+inputId); if(!inputEl)return;
  var input=inputEl.value.trim();
  if(!input){toast('请输入内容');return;}

  var tags=[];
  var judgments=[];

  VOC_RULES.forEach(function(rule){
    var matched=false;
    rule.patterns.forEach(function(pat){
      if(pat.test(input)){matched=true;}
    });
    // Negation check
    if(matched&&rule.negPatterns.length){
      rule.negPatterns.forEach(function(np){
        if(np.test(input)){matched=false;}
      });
    }

    if(matched){
      tags.push('<span class="tp-tag">'+rule.tag+'</span>');
      judgments.push('【'+rule.tag+'】检测到相关表述');
    }
  });

  var output=$('#'+outputId);
  output.classList.add('show');
  $('#'+tagsId).innerHTML=tags.length?tags.join(''):'<span style="color:var(--muted)">未匹配到已知维度</span>';
  $('#'+resultId).textContent=judgments.length?
    judgments.join('\n')+'\n\n结论：'+input.substring(0,60)+'...':
    '该文本未触发任何已知规则，可能属于新的维度类别。建议人工审核后补充规则。';
  toast('规则引擎执行完成');
}

// ============================================================
function gatherContext(){
  var ctx={workspace:'',purpose:'',purposeDesc:'',sources:[],nlSources:[],frameworks:[],methods:'',
           insights:[],analysis:{},canvasSummary:''};

  // Workspace & purpose
  ctx.workspace=DATA.workspaces[state.ws].label;
  if(state.purposeId){
    var p=getPurpose(state.ws,state.purposeId);
    if(p){ctx.purpose=p.name;ctx.purposeDesc=p.desc;ctx.methods=p.methods;ctx.tools=p.tools;
      p.sources.forEach(function(s){var src=getSource(s);if(src)ctx.sources.push(src.name+'('+src.type+')');});
    }
    // Insights
    var ins=getInsights(state.purposeId);
    ins.forEach(function(i){ctx.insights.push(i.title+': '+i.body);});
  }

  // Level2：自然语言补充获取的数据源
  state.nlAcquired.forEach(function(sid){
    var s=getSource(sid);if(s)ctx.nlSources.push(s.name+'('+s.type+')');
  });

  // Level2：选中的分析框架
  state.selectedFrameworks.forEach(function(fid){
    var f=DATA.frameworks.find(function(x){return x.id===fid;});
    if(f)ctx.frameworks.push(f.name+'：'+f.desc);
  });

  // Level2：基础分析结论
  ctx.analysis=state.analysisSummary||{};

  // Canvas context
  if(state.canvasNodes.length){
    ctx.canvasSummary='画布上有 '+state.canvasNodes.length+' 个节点（'+
      state.canvasNodes.filter(function(n){return n.type==='src'}).length+' 数据源 / '+
      state.canvasNodes.filter(function(n){return n.type==='ins'}).length+' 洞察 / '+
      state.canvasNodes.filter(function(n){return n.type==='note'}).length+' 批注）'+
      (state.canvasLines.length?', '+state.canvasLines.length+' 条连线':'');
  }

  return ctx;
}

function generatePrompt(ctx,question){
  var q=question&&question.trim()?question.trim():'请帮我综合以上信息，给出深度分析和可行动的建议。';
  var prompt=
'# 分析任务提示词（请将以下内容完整复制给智能体）\n\n'+
'## 角色设定\n你是一名严谨的类目用户研究分析师。请把自己当作**第一次接触我们数据**的人——'+
'在阅读下方材料前不要做任何先验假设，所有结论都必须基于所提供的材料，并明确区分「数据已支持 / 需要验证 / 外部补充」。\n\n'+
'## 一、当前目的（最重要）\n'+
'- 工作方向：'+ctx.workspace+'\n'+
'- 当前目的：'+(ctx.purpose||'全局概览')+'\n'+
'- 目的说明：'+(ctx.purposeDesc||'—')+'\n\n'+
'## 二、数据源（上下文）\n'+
'- 该目的已绑定的数据源：\n'+(ctx.sources.length?ctx.sources.map(function(s){return '  · '+s}).join('\n'):'  · 无')+'\n'+
(ctx.nlSources.length?'- 通过自然语言补充获取的数据源：\n'+ctx.nlSources.map(function(s){return '  · '+s}).join('\n')+'\n':'')+
'## 三、使用的分析框架\n'+
(ctx.frameworks.length?ctx.frameworks.map(function(f){return '  · '+f}).join('\n')+'\n':'  · 由你判断选用合适框架\n')+
'## 四、已有基础分析结论（skill 简化版自动产出，供你延展，非终稿）\n'+
'- 需求四象限：'+(ctx.analysis.quad||'未生成')+'\n'+
'- 细分市场：'+(ctx.analysis.segments||'未生成')+'\n'+
'- 购买旅程：'+(ctx.analysis.journey||'未生成')+'\n'+
'## 五、关键洞察（来自数据源与交叉分析）\n'+
(ctx.insights.length?ctx.insights.map(function(i){return '  · '+i}).join('\n'):'  · 暂无')+'\n'+
(ctx.canvasSummary?('## 六、画布推导状态\n'+ctx.canvasSummary+'\n'):'')+
'\n## 七、我的问题\n'+q+'\n\n'+
'## 八、输出要求（务必遵守）\n'+
'1. **复述理解**：先用自己的话复述你对以上数据、目的与上下文的理解，确认没有误解后再展开。\n'+
'2. **三类结论标注**：所有结论必须归入「数据已支持 / 需要验证 / 外部补充」三类，且**每条必标出处**（注明来自哪个数据源或框架）。\n'+
'3. **行动建议**：给出 2-3 个具体可执行的下一步行动，按优先级排列，并说明预期收益与所需验证。\n'+
'4. **多轮深化**：如信息不足以支撑某结论，明确指出缺口并建议补充哪类数据，而非编造。';
  return prompt;
}

// ── 浮动工作台入口：仅「数字世界虚拟预测」(Lab) 与「虚拟用户压力测试」(Stress) 页面底部固定显示；滚动到 CTA 区时自动隐藏 ──
var _floatBarTimer=null;
var _curView='';
function initFloatBar(){
  var bar=document.getElementById('globFloatBar');
  if(!bar) return;
  function update(){
    // 非 Lab / Stress 页面：一律隐藏
    if(_curView!=='Lab' && _curView!=='Stress'){ bar.classList.add('hidden'); return; }
    // 动态文案与目标：Stress → 去生成虚拟用户；Lab → 进入预测工作台
    var lbl=document.getElementById('globFloatLabel');
    if(lbl) lbl.textContent = (_curView==='Stress') ? '去生成虚拟用户' : '进入预测工作台';
    // 仅当当前视图内的 CTA 区域进入视口下半部时隐藏（用户已看到真正的入口）
    var viewId = (_curView==='Stress') ? 'viewStress' : 'viewLab';
    var cta=document.querySelector('#'+viewId+' .lab-cta');
    if(!cta){ bar.classList.remove('hidden'); return; }
    var r=cta.getBoundingClientRect();
    if(r.top < window.innerHeight * .7){ bar.classList.add('hidden'); }
    else{ bar.classList.remove('hidden'); }
  }
  // 挂钩 setView：每次视图切换都重新判定
  window.__onViewChange=function(v){ _curView=v; update(); };
  var board=document.getElementById('board');
  board.addEventListener('scroll', function(){ clearTimeout(_floatBarTimer); _floatBarTimer=setTimeout(update,60); }, {passive:true});
  // 初始按当前激活视图判定
  var labView=document.getElementById('viewLab');
  _curView = (labView && labView.classList.contains('active')) ? 'Lab' : '';
  update();
}
init();
</script>

<!-- ===== Radium interaction layer (cursor / particles / scroll / ripple / theme) ===== -->
<script>
(function(){
  // ---- Theme toggle (default light, per preference) ----
  var store = { get:function(k){try{return localStorage.getItem(k);}catch(e){return null;}},
                set:function(k,v){try{localStorage.setItem(k,v);}catch(e){}} };
  var savedTheme = store.get('cih-theme');
  if(savedTheme){ document.body.className = savedTheme; }
  var themeBtn = document.getElementById('themeToggle');
  if(themeBtn){
    themeBtn.addEventListener('click', function(){
      var next = document.body.classList.contains('light') ? 'dark' : 'light';
      document.body.className = next;
      store.set('cih-theme', next);
      if(window.toast) toast(next==='dark' ? '已切换至暗色模式' : '已切换至亮色模式');
      // 同步主题给所有内嵌 iframe（德国看板 / VOC 工具）
      document.querySelectorAll('iframe').forEach(function(f){
        try{ if(f.contentWindow) f.contentWindow.postMessage({type:'cih-theme', value:next}, '*'); }catch(e){}
      });
    });
  }

  // ---- Custom glowing cursor + particle trail ----
  var cursor = document.getElementById('cursor');
  var glow = document.getElementById('cursorGlow');
  var particles = [];
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  document.addEventListener('mousemove', function(e){
    if(!cursor) return;
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    if(glow){ glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; }
    if(reduced) return;
    if(particles.length > 18){ particles[0].remove(); particles.shift(); }
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = e.clientX + 'px';
    p.style.top = e.clientY + 'px';
    document.body.appendChild(p);
    particles.push(p);
    var o = 0.8, s = 1;
    (function animate(){
      o -= 0.03; s -= 0.04;
      p.style.opacity = o;
      p.style.transform = 'translate(-50%,-50%) scale('+s+')';
      if(o > 0) requestAnimationFrame(animate);
      else { p.remove(); particles = particles.filter(function(x){return x!==p;}); }
    })();
  });
  var hoverSel = '.btn,.export-ai,.tb-btn,.ws-tab,.p-card,.s-card,.i-card,.an-card,.se-kpi,.rep-kpi,.nav-item,.ct-btn,.mode-opt,.theme-toggle,.mb-copy,.sg-chip,.nl-add,.spb-chip,.j-step,.cd-item';
  document.querySelectorAll(hoverSel).forEach(function(el){
    el.addEventListener('mouseenter', function(){
      if(!cursor) return;
      cursor.style.width='40px'; cursor.style.height='40px';
      if(glow){ glow.style.width='150px'; glow.style.height='150px'; }
    });
    el.addEventListener('mouseleave', function(){
      if(!cursor) return;
      cursor.style.width='20px'; cursor.style.height='20px';
      if(glow){ glow.style.width='100px'; glow.style.height='100px'; }
    });
  });

  // ---- Scroll progress (driven by innermost scroll container) ----
  var prog = document.getElementById('scrollProgress');
  function updateProgress(){
    var sc = document.querySelector('.view.active .board, .view.active .src-explorer, .view.active .struct-panel') ||
             document.querySelector('.board, .src-explorer, .struct-panel');
    var pct = 0;
    if(sc){
      var max = sc.scrollHeight - sc.clientHeight;
      pct = max > 0 ? (sc.scrollTop / max) * 100 : 0;
    }
    if(prog) prog.style.width = Math.max(0, Math.min(100, pct)) + '%';
  }
  document.addEventListener('scroll', function(e){
    if(e.target && e.target.classList && (e.target.classList.contains('board') || e.target.classList.contains('src-explorer') || e.target.classList.contains('struct-panel'))) updateProgress();
  }, true);
  window.addEventListener('resize', updateProgress);
  updateProgress();

  // ---- Ripple on ripple-host elements ----
  document.addEventListener('click', function(e){
    var host = e.target.closest && e.target.closest('.ripple-host');
    if(!host) return;
    var r = document.createElement('span');
    r.className = 'ripple';
    var d = Math.max(host.clientWidth, host.clientHeight);
    r.style.width = r.style.height = d + 'px';
    r.style.left = (e.clientX - host.getBoundingClientRect().left - d/2) + 'px';
    r.style.top = (e.clientY - host.getBoundingClientRect().top - d/2) + 'px';
    host.appendChild(r);
    setTimeout(function(){ r.remove(); }, 600);
  });
})();
</script>
