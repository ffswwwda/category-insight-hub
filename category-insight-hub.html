<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>类目用户研究座 · Category Insight Hub</title>
<style>
:root{
  --bg:#F5F3F1; --panel:rgba(255,255,255,.72); --panel-solid:#fff;
  --border:rgba(0,0,0,.07); --border-glass:rgba(0,0,0,.06);
  --ink:#2D2A26; --ink-2:#5C5650; --muted:#9B9590; --line:rgba(0,0,0,.04);
  --accent:#0891B2; --accent-soft:#E0F7FD; --accent-2:#CA8A04;
  --teal:#14B8A6; --gold:#D4A017; --purple:#8B7BB5; --rose:#D4727A;
  --blue-a:#2563EB; --green-a:#16A34A; --green-b:#059669;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --shadow-md:0 4px 12px rgba(0,0,0,.06),0 12px 32px rgba(0,0,0,.05);
  --shadow-lg:0 8px 24px rgba(0,0,0,.08),0 24px 48px rgba(0,0,0,.06);
  --radius:18px; --radius-sm:13px; --radius-xs:9px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  --easing:cubic-bezier(.25,.46,.45,.94);
  --glass-bg:rgba(255,255,255,.55); --glass-blur:blur(20px);
  --glass-border:1px solid rgba(255,255,255,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.58;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.22)}

/* === App Layout === */
.app{display:flex;height:100vh}

/* === Sidebar === */
.sidebar{width:220px;flex:0 0 220px;background:var(--panel);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border-right:var(--glass-border);display:flex;flex-direction:column;padding:18px 14px 16px;z-index:10}
.brand{display:flex;gap:10px;align-items:center;margin-bottom:22px;padding:0 2px}
.brand-mark{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#06B6D4);
  color:#fff;display:grid;place-items:center;font-size:15px;font-weight:800;box-shadow:var(--shadow-sm)}
.brand-name{font-weight:700;font-size:13.5px;line-height:1.25;color:var(--ink)}
.brand-sub{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}

/* Workspace tabs */
.ws-tabs{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;flex-shrink:0}
.ws-tab{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:13px;
  border:1.5px solid var(--border);background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  color:var(--ink-2);font-family:var(--font);font-size:13px;font-weight:650;cursor:pointer;
  transition:all .28s var(--easing);position:relative;overflow:hidden}
.ws-tab::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:transparent;border-radius:0 4px 4px 0;transition:background .28s}
.ws-tab:hover{border-color:var(--accent);color:var(--accent);background:rgba(8,145,178,.06)}
.ws-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(8,145,178,.07);
  box-shadow:0 2px 12px rgba(8,145,178,.1)}
.ws-tab.active::before{background:var(--accent)}
.ws-tab .wsi{opacity:.6;font-size:14px;width:20px;text-align:center;flex-shrink:0}

/* === Nav Tree (three big sections) === */
.nav-tree{flex:1;overflow-y:auto;margin-top:4px;display:flex;flex-direction:column;gap:13px;padding-right:2px}
.nav-sec{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);border-radius:14px;overflow:hidden;flex-shrink:0}
.nav-sec-head{display:flex;align-items:center;gap:7px;padding:10px 12px;font-size:12.5px;font-weight:750;color:var(--ink);
  border-bottom:1px solid var(--line);background:rgba(255,255,255,.42)}
.nsh-ico{font-size:13px;color:var(--accent);opacity:.85}
.nav-sec-tag{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.3px}
.nav-sec-tag.shared{background:rgba(0,0,0,.05);color:var(--muted)}
.nav-sec-tag.dyn{background:linear-gradient(135deg,var(--accent),#06B6D4);color:#fff}
.nav-sec-dyn .nsh-ico{color:var(--green-a)}
.nav-sec-body{padding:7px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;
  font-size:12.5px;color:var(--ink-2);transition:all .2s var(--easing);position:relative}
.nav-item:hover{background:rgba(8,145,178,.07);color:var(--accent)}
.nav-item.active{background:rgba(8,145,178,.1);color:var(--accent);font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px;background:var(--accent)}
.ni-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ni-dot.on{background:var(--green-b);box-shadow:0 0 0 3px rgba(5,150,105,.15)}
.ni-dot.off{background:var(--muted);opacity:.5}
.ni-ico{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.ni-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni-sub{font-size:10px;color:var(--muted);flex-shrink:0}

/* Source / Framework detail views */
.src-detail,.fw-detail{padding:26px 28px;max-width:900px}
.sd-kpis{display:flex;gap:14px;margin:18px 0 22px;flex-wrap:wrap}
.sd-kpi{flex:1;min-width:150px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);
  border-radius:14px;padding:16px 18px}
.sd-kv{font-size:18px;font-weight:800;color:var(--ink)}
.sd-kl{font-size:11px;color:var(--muted);margin-top:3px}
.sd-desc{font-size:13.5px;color:var(--ink-2);line-height:1.75;background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:14px;padding:16px 18px}
.sd-hint{margin-top:14px;font-size:12.5px;color:var(--accent-2);background:rgba(202,138,4,.08);border:1px solid rgba(202,138,4,.2);
  border-radius:12px;padding:12px 15px}
.fw-desc{font-size:14px;color:var(--ink-2);line-height:1.8;background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:14px;padding:18px 20px;margin-bottom:16px}
.fw-note{font-size:12.5px;color:var(--muted);line-height:1.7}

/* Sidebar footer */
.sb-foot{padding-top:14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);line-height:1.6}

/* === Main === */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* Topbar */
.topbar{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--line);
  background:var(--panel);backdrop-filter:var(--glass-blur);z-index:5;flex-shrink:0}
.topbar h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.12px;color:var(--ink)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-search{display:flex;align-items:center;gap:6px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:10px;padding:7px 12px;width:260px}
.tb-search input{border:0;outline:0;background:transparent;font-size:12.5px;width:100%;color:var(--ink);font-family:var(--font)}
.tb-search .ico{color:var(--muted);font-size:13px}
.tb-btn{appearance:none;border:1px solid var(--border);background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  color:var(--ink-2);font-family:var(--font);font-size:12px;font-weight:600;padding:6px 13px;border-radius:9px;cursor:pointer;
  transition:all .2s var(--easing)}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(8,145,178,.06)}
.tb-primary{background:linear-gradient(135deg,var(--accent),#06B6D4);border-color:transparent;color:#fff}
.tb-primary:hover{filter:brightness(1.06)}

/* Subnav for workspace view */
.subnav{display:none;padding:0 24px;border-bottom:1px solid var(--line);background:var(--panel);backdrop-filter:var(--glass-blur);z-index:4;flex-shrink:0}
.subnav.show{display:flex;gap:0}
.sn-tab{padding:9px 16px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.sn-tab:hover{color:var(--ink-2)}
.sn-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Board (scrollable area) */
.board{flex:1;overflow:auto;position:relative}

/* Views */
.view{display:none;min-height:100%}
.view.active{display:block}

/* ========== VIEW: PURPOSE GRID ========== */
.purpose-grid-wrap{padding:22px 24px 40px}
.purpose-header{margin-bottom:18px}
.ph-title{font-size:19px;font-weight:800;letter-spacing:.1px;display:flex;align-items:center;gap:10px}
.ph-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.ph-dot.a{background:var(--accent)}
.ph-dot.b{background:var(--green-a)}
.ph-desc{font-size:12.5px;color:var(--muted);margin-top:4px;max-width:680px}
.src-pool-bar{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 18px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.spb-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.spb-sources{display:flex;flex-wrap:wrap;gap:6px}
.spb-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;
  background:var(--accent-soft);color:var(--accent);border:1px solid rgba(8,145,178,.15)}

/* Two-column purpose layout */
.purpose-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pc-col{display:flex;flex-direction:column;gap:10px}
.pc-col-header{font-size:13px;font-weight:800;letter-spacing:.3px;padding:10px 4px 8px;
  color:var(--ink);border-radius:var(--radius-xs);text-align:center}
.pc-col-header.col-a{background:linear-gradient(135deg,rgba(8,145,178,.08),rgba(6,182,212,.06));color:var(--accent);border:1px solid rgba(8,145,178,.12)}
.pc-col-header.col-b{background:linear-gradient(135deg,rgba(22,163,74,.08),rgba(5,150,105,.06));color:var(--green-a);border:1px solid rgba(22,163,74,.12)}

/* Purpose card */
.p-card{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:16px 18px;cursor:pointer;transition:all .25s var(--easing);position:relative;overflow:hidden}
.p-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;transition:background .25s}
.p-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.p-card:hover::after{background:linear-gradient(90deg,var(--accent),var(--teal))}
.pcard-name{font-size:14.5px;font-weight:700;margin-bottom:6px}
.pcard-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pm-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--line);color:var(--ink-2)}
.pm-tag.src{background:rgba(8,145,178,.07);color:var(--accent)}
.pm-tag.mtd{background:rgba(139,123,181,.1);color:var(--purple)}
.pm-tag.tl{background:rgba(212,160,23,.1);color:var(--gold)}
.pcard-desc{font-size:11.5px;color:var(--muted);line-height:1.5}

/* ========== VIEW: PURPOSE WORKSPACE ========== */

/* Workspace header bar */
.ws-bar{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--line);
  background:var(--panel);backdrop-filter:var(--glass-blur);flex-shrink:0;z-index:4}
.ws-back{appearance:none;border:1px solid var(--border);background:var(--glass-bg);color:var(--ink-2);
  font-family:var(--font);font-size:12px;font-weight:650;padding:6px 13px;border-radius:9px;cursor:pointer;transition:all .2s}
.ws-back:hover{border-color:var(--accent);color:var(--accent);background:rgba(8,145,178,.06)}
.ws-title{font-size:16px;font-weight:800}
.ws-tag{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(22,163,74,.1);color:var(--green-a)}

/* Mode toggle */
.mode-toggle{display:flex;background:var(--line);border-radius:11px;padding:3px;margin:12px 24px;flex-shrink:0;z-index:4}
.mode-opt{flex:1;padding:7px 16px;font-size:12.5px;font-weight:650;border-radius:9px;cursor:pointer;
  text-align:center;transition:all .22s var(--easing);color:var(--muted);border:1px solid transparent}
.mode-opt.active{background:var(--panel-solid);color:var(--ink);box-shadow:var(--shadow-sm);border-color:var(--border)}

/* Workspace body - dual panel layout */
.ws-body{display:flex;flex:1;min-height:0;overflow:hidden}

/* Structured mode panel */
.struct-panel{width:380px;flex:0 0 380px;overflow-y:auto;padding:16px 20px 30px;border-right:1px solid var(--line);
  background:var(--bg);scrollbar-width:thin}
.struct-section{margin-bottom:18px}
.ss-head{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}

/* Source/Insight cards in structured mode */
.s-card{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px 15px;margin-bottom:9px;transition:all .2s;position:relative}
.s-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.sc-name{font-size:13px;font-weight:700;margin-bottom:3px}
.sc-type{font-size:10.5px;color:var(--muted);margin-bottom:6px}
.sc-concl{font-size:11.5px;color:var(--ink-2);line-height:1.5;margin-bottom:8px}
.sc-to-canvas{float:right;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer;padding:3px 10px;
  border:1px solid rgba(8,145,178,.2);border-radius:8px;transition:all .15s}
.sc-to-canvas:hover{background:var(--accent-soft);border-color:var(--accent)}

.i-card{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:13px 15px;margin-bottom:9px;border-left:3px solid var(--purple)}
.ic-title{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:4px}
.ic-body{font-size:11.5px;color:var(--ink-2);line-height:1.5}

/* Method chain */
.method-chain{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.mc-step{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:12px;color:var(--ink-2)}
.mc-num{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);
  font-size:11px;font-weight:800;display:grid;place-items:center;flex-shrink:0}
.mc-arrow{color:var(--muted);font-size:14px}

/* Action list */
.action-list{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.al-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;font-size:12px;color:var(--ink-2);line-height:1.5}
.al-bullet{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0}

/* Export AI button */
.export-ai{width:100%;padding:11px;border-radius:11px;font-size:13px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),#06B6D4);color:#fff;border:0;cursor:pointer;
  font-family:var(--font);transition:all .25s var(--easing);box-shadow:0 4px 14px rgba(8,145,178,.2)}
.export-ai:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(8,145,178,.3)}

/* Canvas area */
.canvas-area{flex:1;position:relative;overflow:hidden;background:
  radial-gradient(circle at 15% 85%, rgba(8,145,178,.04) 0%, transparent 45%),
  radial-gradient(circle at 85% 15%, rgba(139,123,181,.03) 0%, transparent 45%),
  var(--bg)}

/* Canvas toolbar */
.canvas-toolbar{position:absolute;top:12px;left:12px;z-index:20;display:flex;gap:6px}
.ct-btn{appearance:none;background:var(--panel-solid);border:1px solid var(--border);border-radius:9px;
  padding:6px 12px;font-size:11.5px;font-weight:650;color:var(--ink-2);cursor:pointer;font-family:var(--font);
  transition:all .15s;box-shadow:var(--shadow-sm)}
.ct-btn:hover{border-color:var(--accent);color:var(--accent)}
.ct-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.ct-btn.primary:hover{filter:brightness(1.06)}

/* Canvas material drawer */
.canvas-drawer{position:absolute;top:12px;right:12px;width:220px;z-index:20;
  background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  box-shadow:var(--shadow-md);max-height:calc(100% - 80px);overflow-y:auto}
.cd-head{padding:12px 14px 8px;font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;
  border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.cd-toggle{cursor:pointer;color:var(--accent);font-size:11px;font-weight:700}
.cd-item{padding:10px 14px;border-bottom:1px solid var(--line);cursor:grab;transition:background .12s}
.cd-item:last-child{border-bottom:0}
.cd-item:hover{background:var(--accent-soft)}
.cd-item:active{cursor:grabbing}
.cdi-name{font-size:12px;font-weight:700;color:var(--ink)}
.cdi-sub{font-size:10.5px;color:var(--muted);margin-top:2px}

/* Canvas SVG layer (connections + cards) */
.canvas-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.canvas-svg line{stroke:rgba(8,145,178,.35);stroke-width:1.5}
.canvas-svg circle{fill:var(--accent);r:4}

/* Canvas card nodes */
.cn-node{position:absolute;min-width:140px;max-width:240px;background:var(--panel-solid);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;cursor:grab;user-select:none;z-index:2;
  box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.cn-node:hover{box-shadow:var(--shadow-md);z-index:3}
.cn-node:active{cursor:grabbing}
.cn-node.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(8,145,178,.15),var(--shadow-md)}
.cn-node.dragging{opacity:.85;z-index:10}
.cn-type{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.cn-type.src{color:var(--accent)}
.cn-type.ins{color:var(--purple)}
.cn-type.tool{color:var(--gold)}
.cn-type.note{color:var(--green-a)}
.cn-title{font-size:13px;font-weight:700;margin-bottom:3px}
.cn-body{font-size:11px;color:var(--ink-2);line-height:1.45}
.cn-port{position:absolute;right:-6px;top:50%;width:12px;height:12px;border-radius:50%;
  background:var(--accent);cursor:crosshair;transform:translateY(-50%);z-index:5}
.cn-port-left{right:auto;left:-6px}

/* Canvas zoom indicator */
.zoom-indicator{position:absolute;bottom:12px;left:12px;z-index:20;
  background:var(--panel-solid);border:1px solid var(--border);border-radius:9px;padding:5px 11px;
  font-size:11px;font-weight:600;color:var(--muted);font-family:var(--mono)}

/* ========== VOC TAGGER (in structured panel) ========== */
.tagger-panel{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.tp-input{width:100%;min-height:70px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;
  font-size:12.5px;font-family:var(--font);resize:vertical;outline:none;transition:border-color .2s}
.tp-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(8,145,178,.08)}
.tp-output{margin-top:10px;display:none}
.tp-output.show{display:block}
.tp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tp-tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:rgba(139,123,181,.1);color:var(--purple);border:1px solid rgba(139,123,181,.15)}
.tp-result{font-size:11.5px;color:var(--ink-2);line-height:1.55;padding:10px 12px;background:var(--bg);border-radius:9px}

/* ========== EXPORT MODAL ========== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);
  backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius);
  width:640px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:24px 26px}
.mb-title{font-size:17px;font-weight:800;margin-bottom:6px}

// CANVAS ENGINE (截图2 右侧)

var canvasEl, svgEl;

function renderCanvasArea(p){
  canvasEl=$('#canvasArea');
  svgEl=$('#canvasSvg');

  // Seed canvas with initial nodes
  if(!state.canvasNodes.length){
    seedCanvas(p);
  }

  // Material drawer
  renderDrawer(p);

  // Setup events
  setupCanvasEvents();

  // Render nodes and lines
  renderCanvas();
}

function seedCanvas(p){
  var baseX=60,baseY=80,gapX=200,gapY=130;
  var ni=0;

  // Add source nodes
  p.sources.forEach(function(sid,i){
    var s=getSource(sid);if(!s)return;
    state.canvasNodes.push({
      id:'n-src-'+sid,x:baseX+i*gapX,y:baseY,type:'src',
      title:s.name,sub:(s.records?s.records+' 条':'待接入'),sourceId:sid
    });ni++;
  });

  // Add insight nodes
  var insights=getInsights(state.purposeId);
  insights.slice(0,4).forEach(function(ins,i){
    state.canvasNodes.push({
      id:'n-ins-'+i,x:baseX+(i%2)*gapX+60,y:baseY+gapY+Math.floor(i/2)*gapY,
      type:'ins',title:ins.title,body:ins.body
    });ni++;
  });

  // Add note node
  state.canvasNodes.push({id:'n-note-1',x:baseX+gapX*1.5,y:baseY+gapY*3,type:'note',
    title:'推导批注',body:'在此处记录你的推导过程和关键发现...'});
  saveCanvasState();
}

function renderDrawer(p){
  var html='';
  // Sources in drawer
  p.sources.forEach(function(sid){
    var s=getSource(sid);if(!s)return;
    html+='<div class="cd-item" draggable="true" data-type="src" data-id="'+sid+'" ondragstart="onDrawerDrag(event)">'+
      '<div class="cdi-name">'+escHtml(s.name)+'</div>'+
      '<div class="cdi-sub">'+escHtml(s.type)+' · '+(s.records?s.records+'条':'待接入')+'</div>'+
    '</div>';
  });
  // Insights
  var insights=getInsights(state.purposeId);
  insights.forEach(function(ins,i){
    html+='<div class="cd-item" draggable="true" data-type="ins" data-idx="'+i+'" ondragstart="onDrawerDrag(event)">'+
      '<div class="cdi-name">'+escHtml(ins.title)+'</div>'+
      '<div class="cdi-sub">洞察 · 可拖入画布</div>'+
    '</div>';
  });

function addSourceToCanvas(sid){
  var s=getSource(sid);if(!s)return;
  var existing=state.canvasNodes.find(function(n){return n.sourceId===sid&&n.type==='src'});
  if(existing){toast(s.name+' 已在画布上');return;}

    id:'n-src-'+sid+'-'+Date.now(),x:80+Math.random()*300,y:80+Math.random()*200,
    type:'src',title:s.name,sub:s.records?s.records+'条':'待接入',sourceId:sid
  });

}

function addInsightToCanvas(idx){
  var insights=getInsights(state.purposeId);
  if(!insights[idx])return;
  var ins=insights[idx];
  state.canvasNodes.push({

    type:'ins',title:ins.title,body:ins.body
  });
  saveCanvasState();renderCanvas();toast('已添加: '+ins.title);
}

function setupCanvasEvents(){
  // Zoom with mousewheel
  canvasEl.addEventListener('wheel',function(e){
    e.preventDefault();
    var factor=e.deltaY>0?.92:1.08;
    state.canvasZoom=Math.max(.2, Math.min(5, state.canvasZoom*factor));
    renderCanvas();
  },{passive:false});

  // Pan with middle-click drag or space+drag
  var panning=false,pStartX,pStartY;
  canvasEl.addEventListener('mousedown',function(e){
    if(e.target===canvasEl||e.target===svgEl||(e.button===1)){
      panning=true;pStartX=e.clientX-state.canvasPanX;pStartY=e.clientY-state.canvasPanY;
      canvasEl.style.cursor='grabbing';
    }
  });
  document.addEventListener('mousemove',function(e){
    if(paning){state.canvasPanX=e.clientX-pStartX;state.canvasPanY=e.clientY-pStartY;renderCanvas();}
  });
  document.addEventListener('mouseup',function(e){if(panning){panaging=false;canvasEl.style.cursor='';}});

  // Node dragging
  canvasEl.addEventListener('mousedown',function(e){
    var node=e.target.closest('.cn-node');
    if(node&&!e.target.closest('.cn-port')){
      state.isDragging=true;state.dragNode=node;
      var rect=node.getBoundingClientRect();
      var cRect=canvasEl.getBoundingClientRect();
      state.dragOffX=e.clientX-rect.left;state.dragOffY=e.clientY-rect.top;
      node.classList.add('dragging');
      e.preventDefault();
    }
  });
  document.addEventListener('mousemove',function(e){
    if(state.isDragging&&state.dragNode){
      var cRect=canvasEl.getBoundingClientRect();
      var x=(e.clientX-cRect.left-state.canvasPanX)/state.canvasZoom-state.dragOffY/state.canvasZoom;
      var y=(e.clientY-cRect.top-state.canvasPanY)/state.canvasZoom-state.dragOffY/state.canvasZoom;
      var nid=state.dragNode.getAttribute('data-nid');
      var n=state.canvasNodes.find(function(n){return n.id===nid});
      if(n){n.x=x;n.y=y;renderCanvas();}
    }
  });
  document.addEventListener('mouseup',function(e){
    if(state.isDragging){
      if(state.dragNode)state.dragNode.classList.remove('dragging');
      state.isDragging=false;state.dragNode=null;
      saveCanvasState();
    }
  });

  // Connection drawing from port to port
  var connFrom=null;
  canvasEl.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('cn-port')){
      connFrom=e.target.parentNode.getAttribute('data-nid');
    }
  });
  canvasEl.addEventListener('mouseup',function(e){
    if(connFrom&&e.target.classList.contains('cn-port')){
      var connTo=e.target.parentNode.getAttribute('data-nid');
      if(connFrom!==connTo){
        // Check duplicate
        var dup=state.canvasLines.some(function(l){
          return(l.from===connFrom&&l.to===connTo)||(l.from===connTo&&l.to===connFrom);
        });
        if(!dup){
          state.canvasLines.push({from:connFrom,to:connTo});
          saveCanvasState();renderCanvas();
        }
      }
    }
    connFrom=null;
  });
}

function renderCanvas(){
  if(!canvasEl)return;

  // Update transform
  canvasEl.style.transformOrigin='0 0';
  canvasEl.style.transform='translate('+state.canvasPanX+'px,'+state.canvasPanY+'px) scale('+state.canvasZoom+')';

  // Zoom indicator
  $('#zoomIndicator').textContent=Math.round(state.canvasZoom*100)+'%';

  // Remove old nodes
  $$('.cn-node').forEach(function(n){n.remove()});

  // Render nodes
  state.canvasNodes.forEach(function(n){
    var el=document.createElement('div');
    el.className='cn-node';el.setAttribute('data-nid',n.id);
    el.style.left=n.x+'px';el.style.top=n.y+'px';
    var typeLabel={'src':'数据源','ins':'洞察','tool':'工具','note':'批注'}[n.type]||'卡片';
    var typeClass={'src':'src','ins':'ins','tool':'tool','note':'note'}[n.type]||'';
    var bodyHtml=n.body?'<div class="cn-body">'+escHtml(n.body)+'</div>':'';
    var subHtml=n.sub?'<div style="font-size:10.5px;color:var(--muted)">'+escHtml(n.sub)+'</div>':'';
    el.innerHTML=
      '<div class="cn-type '+typeClass+'">'+typeLabel+'</div>'+
      '<div class="cn-title">'+escHtml(n.title)+'</div>'+
      subHtml+bodyHtml+
      '<div class="cn-port cn-port-left" title="连线入口"></div>'+
      '<div class="cn-port" title="连线出口"></div>';
    canvasEl.appendChild(el);

    // Double click to edit title/body
    el.addEventListener('dblclick',function(){
      var newT=prompt('编辑标题:',n.title);if(newT&&newT.trim()){n.title=newT.trim();saveCanvasState();renderCanvas();}
    });
  });

  // Render lines (SVG)
  renderCanvasLines();
}

function renderCanvasLines(){
  if(!svgEl)return;
  svgEl.innerHTML=''; // Clear

  // Get node positions (need to account for transform)
  var getNodeCenter=function(nid){
    var el=$('.cn-node[data-nid="'+nid+'"]');
    if(!el)return null;
    var rect=el.getBoundingClientRect();
    var cRect=canvasEl.getBoundingClientRect();
    return{
      rx:(rect.left+rect.width-cRect.left-state.canvasPanX)/state.canvasZoom,
      ry:(rect.top+rect.height/2-cRect.top-state.canvasPanY)/state.canvasZoom,
      lx:(rect.left-cRect.left-state.canvasPanX)/state.canvasZoom,
      ly:(rect.top+rect.height/2-cRect.top-state.canvasPanY)/state.canvasZoom
    };
  };

  state.canvasLines.forEach(function(line){
    var from=getNodeCenter(line.from),to=getNodeCenter(line.to);
    if(!from||!to)return;

    // Bezier curve: right edge of "from" -> left edge of "to"
    var dx=to.lx-from.rx;
    var cx1=from.rx+dx*.45,cy1=from.ry;
    var cx2=to.lx-dx*.45,cy2=to.ty;

    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M'+from.rx+','+from.ry+' C'+cx1+','+cy1+' '+cx2+','+cy2+' '+to.lx+','+to.ly);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','rgba(8,145,178,.3)');
    path.setAttribute('stroke-width','1.5');
    svgEl.appendChild(path);

    // Endpoint dots
    [from.rx,from.ry],[to.lx,to.ty].forEach(function(pt){
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',pt[0]);c.setAttribute('cy',pt[1]);c.setAttribute('r','3.5');
      c.setAttribute('fill','#0891B2');
      svgEl.appendChild(c);
    });
  });
}

function zoomCanvas(factor){
  state.canvasZoom=Math.max(.2, Math.min(5, state.canvasZoom*factor));
  renderCanvas();
}
function fitCanvas(){
  state.canvasZoom=1;state.canvasPanX=0;state.canvasPanY=0;
  renderCanvas();
}
function clearCanvas(){
  if(confirm('清空画布？所有节点和连线将被移除。')){
    state.canvasNodes=[];state.canvasLines=[];
    saveCanvasState();renderCanvas();
  }
}
function toggleDrawer(){
  var d=$('#matDrawer');state.drawerOpen=!state.drawerOpen;
  d.style.display=state.drawerOpen?'block':'none';
}

function saveCanvasState(){
  try{localStorage.setItem('cih_canvas_'+state.purposeId,JSON.stringify({nodes:state.canvasNodes,lines:state.canvasLines,zoom:state.canvasZoom}));}catch(e){}
}

function loadCanvasState(){
  try{
    var raw=localStorage.getItem('cih_canvas_'+state.purposeId);
    if(raw){var d=JSON.parse(raw);state.canvasNodes=d.nodes||[];state.canvasLines=d.lines||[];if(d.zoom)state.canvasZoom=d.zoom;}
  }catch(e){}
}

// Drawer drag -> drop onto canvas
function onDrawerDrag(e){
  e.dataTransfer.setData('text/plain',JSON.stringify({type:e.target.dataset.type,id:e.target.dataset.id,idx:e.target.dataset.idx}));
}
canvasEl&&(canvasEl.addEventListener('dragover',function(e){e.preventDefault()}));
canvasEl&&(canvasEl.addEventListener('drop',function(e){
  e.preventDefault();
  try{
    var d=JSON.parse(e.dataTransfer.getData('text/plain'));
    var cRect=canvasEl.getBoundingClientRect();
    var x=(e.clientX-cRect.left-state.canvasPanX)/state.canvasZoom-70;
    var y=(e.clientY-cRect.top-state.canvasPanY)/state.canvasZoom-30;
    if(d.type==='src'){var s=getSource(d.id);if(s){state.canvasNodes.push({id:'n-src-d-'+Date.now(),x:x,y:y,type:'src',title:s.name,sub:d.id,sourceId:d.id});}}
    else if(d.type==='ins'){var ins=(getInsights(state.purposeId)||[])[parseInt(d.idx)];if(ins){state.canvasNodes.push({id:'n-ins-d-'+Date.now(),x:x,y:y,type:'ins',title:ins.title,body:ins.body});}}
    else if(d.type==='note'){state.canvasNodes.push({id:'n-note-d-'+Date.now(),x:x,y:y,type:'note',title:'批注',body:''});}
    saveCanvasState();renderCanvas();toast('已添加到画布');
  }catch(err){console.error(err);}
}));

// ============================================================
// VOC RULE ENGINE (简化版)
// ============================================================
var VOC_RULES=[
  {tag:'尺寸',patterns:[/\b(大|小|大号|小号|size|偏大|偏小|太大|太小|尺寸|长短|长短不一)\b/i],negPatterns:[/(不大|不小|尺寸合适|大小刚好)\b/i]},
  {tag:'外观',patterns:[/\b(好看|丑|漂亮|美观|颜值|设计|颜色|质感|手感|材质|塑料感|廉价感|高级感|精致|粗糙)\b/i],negPatterns:[]},
  {tag:'功能',patterns:[/\b(好用|不好用|方便|不方便|实用|鸡肋|功能|性能|效果|有效|无效|灵敏|迟钝|快|慢)\b/i],negPatterns:[/(不难用)\b/i]},
  {tag:'噪音',patterns:[/\b(吵|响|大声|安静|静音|噪音|噪声|吵人|嗡嗡|震动|声音大|声音小)\b/i],negPatterns:[/(不吵|很安静|静音不错)\b/i]},
  {tag:'价格',patterns:[/\b(贵|便宜|划算|值|不值|性价比|价格|价位|折扣|贵了|便宜了|物有所值)\b/i],negPatterns:[]},
  {tag:'清洁',patterns:[/\b(清洗|清洁|难洗|好洗|拆卸|安装|组装|拆装|卫生|细菌|发霉)\b/i],negPatterns:[/(好清洗|容易清洗)\b/i]},
  {tag:'舒适',patterns:[/\b(舒服|不舒服|软|硬|贴合|磨手|夹手|硌|异物感|不适|疼痛)\b/i],negPatterns:[/(很舒适|挺舒服)\b/i]}
];

function runVocTagger(){
  var input=$('#vocInput').value.trim();
  if(!input){toast('请输入内容');return;}

  var tags=[];
  var judgments=[];

  VOC_RULES.forEach(function(rule){
    var matched=false;
    rule.patterns.forEach(function(pat){
      if(pat.test(input)){matched=true;}
    });
    // Negation check
    if(matched&&rule.negPatterns.length){
      rule.negPatterns.forEach(function(np){
        if(np.test(input)){matched=false;}
      });
    }

    if(matched){
      tags.push('<span class="tp-tag">'+rule.tag+'</span>');
      judgments.push('【'+rule.tag+'】检测到相关表述');
    }
  });

  var output=$('#vocOutput');
  output.classList.add('show');
  $('#vocTags').innerHTML=tags.length?tags.join(''):'<span style="color:var(--muted)">未匹配到已知维度</span>';
  $('#vocResult').textContent=judgments.length?
    judgments.join('\n')+'\n\n结论：'+input.substring(0,60)+'...':
    '该文本未触发任何已知规则，可能属于新的维度类别。建议人工审核后补充规则。';
  toast('规则引擎执行完成');
}

// ============================================================
// EXPORT TO AI PROMPT (截图3)
// ============================================================
function gatherContext(){
  var ctx={workspace:'',purpose:'',sources:[],methods:'',insights:[],canvasSummary:''};

  // Workspace & purpose
  ctx.workspace=DATA.workspaces[state.ws].label;
  if(state.purposeId){
    var p=getPurpose(state.ws,state.purposeId);
    if(p){ctx.purpose=p.name;ctx.methods=p.methods;ctx.tools=p.tools;
      p.sources.forEach(function(s){var src=getSource(s);if(src)ctx.sources.push(src.name+'('+src.type+')');});
    }
    // Insights
    var ins=getInsights(state.purposeId);
    ins.forEach(function(i){ctx.insights.push(i.title+': '+i.body);});
  }

  // Canvas context
  if(state.canvasNodes.length){
    ctx.canvasSummary='画布上有 '+state.canvasNodes.length+' 个节点（'+
      state.canvasNodes.filter(function(n){return n.type==='src'}).length+' 数据源 / '+
      state.canvasNodes.filter(function(n){return n.type==='ins'}).length+' 洞察 / '+
      state.canvasNodes.filter(function(n){return n.type==='note'}).length+' 批注）'+
      (state.canvasLines.length?', '+state.canvasLines.length+' 条连线':'');
  }

  return ctx;
}

function generatePrompt(ctx,question){
  var role='我是一名类目用户研究的创作者，你是我的思考伙伴。';
  var prompt='---\n## 角色设定\n'+role+
    '\n\n## 当前上下文\n### 工作方向\n'+ctx.workspace+
    '\n### 当前目的\n'+(ctx.purpose||'全局概览')+
    '\n### 调用的数据源\n'+(ctx.sources.length?ctx.sources.join('；'):'无')+
    '\n### 分析方法\n'+(ctx.methods||'—')+
    '\n### 关键洞察\n'+(ctx.insights.length?ctx.insights.join('\n'):'暂无')+
    (ctx.canvasSummary?'\n### 画布状态\n'+ctx.canvasSummary:'')+
    '\n\n## 我的问题\n'+question||
    '请帮我综合以上信息，给出深度分析和可行动的建议。'+
    '\n\n## 要求\n1. 先复述你对以上数据的理解，确保没有误解。\n2. 区分"数据已支持"、"需要验证"、"外部补充"三类结论，每条必标出处。'+
    '3. 给出 2-3 个具体的下一步行动建议，按优先级排列。';
  return prompt;
}

function openExportModal(){
  $('#exportModal').classList.add('show');
  var ctx=gatherContext();
  var q=$('#expQuestion').value.trim();
  $('#expResult').value=generatePrompt(ctx,q);
}

function closeExportModal(){$('#exportModal').classList.remove('show')}
function copyPrompt(){
  var t=$('#expResult').value;
  navigator.clipboard.writeText(t).then(
    function(){toast('提示词已复制到剪贴板')},
    function(){/* fallback */$('#expResult').select();document.execCommand('copy');toast('已复制')}
  );
}
