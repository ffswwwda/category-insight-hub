.nd-prin:hover{border-color:var(--accent)}
.nd-prin.sel{border-color:var(--accent);background:rgba(0,212,255,.08)}
.nd-pn{width:20px;height:20px;border-radius:5px;background:var(--rad-grad);color:#fff;font-size:10px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.nd-pname{font-size:11px;font-weight:700;color:var(--ink);min-width:36px}
.nd-pdesc{font-size:10px;color:var(--muted);line-height:1.3;flex:1}
.nc-grid{display:grid;gap:8px}
.nc-quad{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;transition:all .15s;background:var(--glass-bg)}
.nc-quad.active,.nc-quad:hover{border-color:var(--qc,#0891B2);box-shadow:0 0 0 1px var(--qc,#0891B2)}
.nc-qh{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.nc-ql{font-size:12px;font-weight:800;color:var(--qc,#0891B2)}
.nc-qd{font-size:10.5px;color:var(--muted);margin-bottom:4px}
.nc-ms{display:grid;gap:2px;padding-left:4px}
.nc-move{display:flex;gap:6px;font-size:10.5px;line-height:1.4}
.nc-mn{font-weight:700;color:var(--ink-2);min-width:52px}
.nc-md{color:var(--muted)}
.nd-res-steps{display:grid;gap:10px}
.nd-res-card{background:var(--glass-bg);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.nd-res-head{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.nd-res-n{width:22px;height:22px;border-radius:6px;background:var(--rad-grad);color:#fff;font-size:10px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.nd-res-title{font-size:12px;font-weight:800;color:var(--ink)}
.nd-res-body{padding:8px 12px 6px}
.nd-res-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px dashed rgba(128,140,164,.1)}
.nd-res-item:last-child{border-bottom:none}
.nd-res-k{font-size:11px;font-weight:700;color:var(--ink);white-space:nowrap;width:100px;flex-shrink:0}
.nd-res-v{font-size:11.5px;color:var(--ink-2);line-height:1.5}
/* ——风险预测工具—— */
.rp-q{margin-bottom:8px}
.rp-ql{font-size:11px;font-weight:800;color:var(--ink);margin-bottom:1px}
.rp-qh{font-size:9.5px;color:var(--muted);margin-bottom:3px}
.rp-qt{width:100%;font:12px/1.5 var(--font);padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--panel-solid);color:var(--ink);resize:vertical;min-height:38px;outline:none;box-sizing:border-box}
.rp-qt:focus{border-color:var(--accent)}
.rp-steps{display:grid;gap:10px}
.rp-rcard{background:var(--glass-bg);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.rp-rhead{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.rp-rn{width:24px;height:24px;border-radius:6px;background:var(--rad-grad);color:#fff;font-size:10px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.rp-rtitle{font-size:12px;font-weight:800;color:var(--ink)}
.rp-rbody{padding:8px 12px 6px}
.rp-ri{display:flex;gap:8px;padding:5px 0;border-bottom:1px dashed rgba(128,140,164,.1)}
.rp-ri:last-child{border-bottom:none}
.rp-rik{font-size:10.5px;font-weight:700;color:var(--accent);white-space:nowrap;min-width:80px;flex-shrink:0}
.rp-riv{font-size:11.5px;color:var(--ink-2);line-height:1.5}
.rp-risk-chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(245,158,11,.12);color:#b45309;margin:2px}
/* ——外部数据参考（Reddit）—— */
.nd-ext-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin:6px 0 8px}
.nd-ext-head{display:flex;align-items:center;gap:6px;padding:7px 10px;font-size:11px;font-weight:800;color:var(--accent);cursor:pointer;transition:background .15s;background:var(--glass-bg)}
.nd-ext-head:hover{background:rgba(0,212,255,.06)}
.nd-ext-arrow{font-size:10px;transition:transform .2s}
.nd-ext-body{padding:8px 10px 10px;border-top:1px solid var(--border)}
.nd-ext-row{display:flex;gap:6px;margin-bottom:6px}
.nd-ext-input{flex:1;font:12px/1.5 var(--font);padding:5px 9px;border:1px solid var(--border);border-radius:7px;background:var(--panel-solid);color:var(--ink);outline:none}
.nd-ext-input:focus{border-color:var(--accent)}
.nd-ext-btn{padding:5px 14px;border:none;border-radius:7px;font-size:11px;font-weight:800;color:#fff;background:var(--rad-grad);cursor:pointer}
.nd-ext-btn:disabled{opacity:.5;cursor:default}
.nd-ext-posts{display:grid;gap:5px;max-height:280px;overflow-y:auto}
.nd-ext-post{padding:7px 9px;border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .1s;background:var(--glass-bg)}
.nd-ext-post:hover{border-color:var(--accent);background:rgba(0,212,255,.04)}
.nd-ep-title{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nd-ep-text{font-size:10.5px;color:var(--muted);line-height:1.4;margin-top:2px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.nd-ep-meta{display:flex;gap:10px;margin-top:3px;font-size:10px;color:var(--muted)}
.nd-ep-sr{font-weight:700;color:var(--accent)}

/* ——产品打分：左右布局 + 维度框架 + 评分表格—— */
.ps-layout{display:flex;gap:16px;margin-top:10px;padding:0 24px 40px}
.ps-left{flex:0 0 400px;min-width:0;overflow-y:auto;max-height:calc(100vh - 220px)}
.ps-right{flex:1;min-width:0;overflow-y:auto;max-height:calc(100vh - 220px);border-left:1px solid var(--border);padding-left:16px}
.ps-example-bar{margin-top:6px}
.ps-example-btn{display:inline-flex;font-size:10.5px;font-weight:800;padding:3px 12px;border-radius:8px;background:rgba(8,145,178,.12);color:var(--accent);cursor:pointer;transition:background .15s}
.ps-example-btn:hover{background:rgba(8,145,178,.22)}
.ps-framework{margin-top:8px}
.ps-fw-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:6px}
.fw-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.fw-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fw-ico{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;background:var(--rad-grad);color:#fff;font-size:12px}
.fw-name{font-size:12px;font-weight:800;color:var(--ink)}
.fw-wt{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;background:rgba(128,140,164,.12);color:var(--muted)}
.fw-body{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px}
.fw-item{display:flex;flex-direction:column;gap:1px}
.fw-item-name{font-size:11px;font-weight:700;color:var(--ink-2)}
.fw-item-hint{font-size:9.5px;color:var(--muted);line-height:1.4}
/* 评分表格（横向对应表）*/
.st-panel{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;overflow:hidden}
.st-panel-head{display:flex;align-items:center;gap:10px;padding:12px 14px 0;border-bottom:1px solid var(--border)}
.st-panel-ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--rad-grad);color:#fff;font-size:13px}
.st-panel-title{font-size:14px;font-weight:800;color:var(--ink)}
.st-panel-wt{font-size:11px;font-weight:700;padding:1px 8px;border-radius:6px;background:rgba(128,140,164,.1);color:var(--muted)}
.st-panel-score{margin-left:auto;font-size:20px;font-weight:900;background:var(--rad-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.st-hdr{display:grid;grid-template-columns:110px 1fr 1fr 1fr 70px;gap:8px;padding:6px 14px;font-size:10px;font-weight:800;color:var(--muted);border-bottom:1px solid var(--border);background:rgba(128,140,164,.04)}
.st-row{display:grid;grid-template-columns:110px 1fr 1fr 1fr 70px;gap:8px;padding:8px 14px;border-bottom:1px dashed var(--border);align-items:start}
.st-row:last-child{border-bottom:none}
.st-cell{font-size:11.5px;color:var(--ink-2);line-height:1.5}
.st-name-txt{font-weight:700;color:var(--ink);font-size:12px}
.st-score{display:flex;flex-direction:column;gap:4px}
.st-score-val{font-size:13px;font-weight:900;color:var(--ink)}
.st-of{font-size:10px;color:var(--muted);font-weight:600}
.st-bar{height:5px;border-radius:3px;background:rgba(128,140,164,.16);overflow:hidden}
.st-fill{height:100%;border-radius:3px;background:var(--rad-grad);transition:width .4s}
.st-reason{font-size:11.5px;color:var(--muted);line-height:1.5}
.st-src{display:flex;flex-wrap:wrap;gap:4px}
.st-conf{text-align:center}
.conf-badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.2px;text-transform:uppercase}
.conf-badge.high{background:rgba(16,185,129,.14);color:#059669}
.conf-badge.mid{background:rgba(245,158,11,.14);color:#d97706}
.conf-badge.low{background:rgba(239,68,68,.14);color:#dc2626}
.conf-badge.guess{background:rgba(156,163,175,.14);color:#6b7280}

/* ============ LEAD USER FEEDBACK ZONE ============ */
.gal-lf{margin:6px 24px 44px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);padding:14px 16px 6px}
.lf-zone{margin-top:6px}
.lf-page{margin:6px 24px 44px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);padding:14px 16px 6px}
.lf-tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid var(--border)}
.lf-tab{padding:7px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;position:relative;top:1px}
.lf-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.lf-tab:hover:not(.active){color:var(--ink-2)}
.lf-body{min-height:120px}
/* User Identity Cards */
.uid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.uid-card{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.uid-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.uid-avatar{width:40px;height:40px;border-radius:12px;background:var(--rad-grad);display:grid;
  place-items:center;font-size:18px;font-weight:900;color:#fff;margin-bottom:8px}
.uid-name{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:2px}
.uid-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.uid-tag{font-size:10px;padding:1px 7px;border-radius:6px;background:rgba(0,212,255,.1);color:var(--accent);font-weight:600}
.uid-quote{font-size:11.5px;color:var(--ink-2);line-height:1.5;font-style:italic;border-left:2px solid var(--accent);
  padding-left:8px;margin-top:4px}
.uid-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--muted)}
/* ——领先用户视图切换 + 四象限图—— */
.lf-view-toggle{display:flex;gap:4px;margin-bottom:8px;justify-content:flex-end}
.lf-vt{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:var(--glass-bg);color:var(--ink-2);cursor:pointer;transition:all .15s;font-family:inherit}
.lf-vt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.lf-vt:hover:not(.on){border-color:var(--accent);color:var(--accent)}
.lf-quad-wrap{display:grid;place-items:center;padding:6px}
.lf-pt{transition:transform .2s}
.lf-pt:hover{transform:scale(1.1);transform-origin:center}
/* ——四象限分布重做版（hero卡+大图+结论卡）—— */
.lfq-wrap{display:grid;gap:12px;padding:4px 0}
.lfq-hero{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;position:relative;overflow:hidden}
.lfq-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rad-grad)}
.lfq-hl{font-size:16px;font-weight:900;color:var(--ink);margin-bottom:2px}
.lfq-hs{font-size:11px;color:var(--muted);margin-bottom:10px}
.lfq-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.lfq-kpi{text-align:center;background:rgba(128,140,164,.06);border:1px solid var(--border);border-radius:8px;padding:6px 4px;position:relative}
.lfq-kv{font-size:20px;font-weight:900;line-height:1.1}
.lfq-kl{font-size:9.5px;color:var(--muted);margin-top:2px;font-weight:600}
/* ——四象限图：纯 HTML mini 卡片散点（与领新专区卡片风格一致）—— */
.lfq-quad{text-align:center;padding:6px 0}
.lfq-quad-bg{position:absolute;inset:30px 60px 36px 60px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;pointer-events:none}
.lfq-bgq{}
.lfq-bgq.NW{border-bottom:1px dashed var(--border);border-right:1px dashed var(--border)}
.lfq-bgq.NE{border-bottom:1px dashed var(--border);border-left:1px dashed var(--border)}
.lfq-bgq.SW{border-top:1px dashed var(--border);border-right:1px dashed var(--border)}
.lfq-bgq.SE{border-top:1px dashed var(--border);border-left:1px dashed var(--border)}
.lfq-mid{position:absolute;background:transparent;pointer-events:none;z-index:0}
.lfq-mid-h{left:60px;right:60px;top:50%;height:0;border-top:1px dashed var(--border)}
.lfq-mid-v{top:30px;bottom:36px;left:50%;width:0;border-left:1px dashed var(--border)}
.lfq-ql{position:absolute;font-size:10px;font-weight:800;letter-spacing:.2px;opacity:.7;pointer-events:none;z-index:1}
.lfq-ql-NW{top:6px;left:8px;color:#10B981}
.lfq-ql-NE{top:6px;right:8px;text-align:right;color:#0891B2}
.lfq-ql-SW{bottom:6px;left:8px;color:#F59E0B}
.lfq-ql-SE{bottom:6px;right:8px;text-align:right;color:#A855F7}
.lfq-ax-bottom{position:absolute;bottom:6px;left:60px;right:60px;text-align:center;font-size:9px;font-weight:800;color:var(--accent);letter-spacing:.3px;z-index:1;pointer-events:none}
.lfq-ax-left{position:absolute;left:4px;top:50%;transform:rotate(-90deg) translateX(50%);transform-origin:left top;font-size:9px;font-weight:800;color:var(--accent);letter-spacing:.3px;white-space:nowrap;z-index:1;pointer-events:none}
.lfq-uc{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:2;
  display:flex;align-items:center;gap:6px;padding:4px 9px 4px 4px;
  background:var(--bg);border:1px solid var(--c,var(--border));border-radius:9px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);transition:all .2s;min-width:90px;
  border-left:3px solid var(--c,var(--accent))}
.lfq-uc:hover{transform:translate(-50%,-50%) translateY(-2px) scale(1.06);box-shadow:0 6px 16px rgba(0,0,0,.2);z-index:3}
.lfq-uc-dot{width:24px;height:24px;border-radius:50%;background:var(--c,var(--accent));color:#fff;font-size:11px;font-weight:900;display:grid;place-items:center;flex-shrink:0}
.lfq-uc-info{display:flex;flex-direction:column;gap:0;min-width:0;flex:1}
.lfq-uc-n{font-size:10px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;line-height:1.2}
.lfq-uc-f{font-size:9px;font-weight:800;color:var(--c,var(--accent));line-height:1.2;letter-spacing:.2px}
.lfq-bottom{background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;position:relative;overflow:hidden}
.lfq-bottom::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--rad-grad)}
.lfq-bh{font-size:14px;font-weight:900;color:var(--ink);margin-bottom:4px}
.lfq-bs{font-size:11.5px;color:var(--ink-2);margin-bottom:10px;line-height:1.5}
.lfq-bs b{color:var(--accent)}
.lfq-recs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lfq-rec{background:rgba(128,140,164,.06);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.lfq-rh{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.lfq-rt{font-size:11.5px;font-weight:800}
.lfq-rm{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;background:var(--accent);color:#fff;margin-left:auto}
.lfq-rd{font-size:10.5px;color:var(--ink-2);line-height:1.5}
/* Raw Feedback List */
.rf-list{}.rf-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;transition:background .15s}
.rf-row:hover{background:rgba(0,212,255,.04)}
.rf-src{font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;white-space:nowrap;margin-top:2px}
.rf-src.voc{background:rgba(245,158,11,.1);color:#b45309}
.rf-src.interview{background:rgba(168,87,247,.1);color:#7e22ce}
.rf-src.niche{background:rgba(16,185,129,.1);color:#047857}
.rf-txt{flex:1;color:var(--ink-2);line-height:1.5}
.rf-metrics{display:flex;gap:6px;flex-shrink:0}
.rf-metric{font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;white-space:nowrap}
.rf-metric.lead{background:rgba(0,212,255,.1);color:#0369a1}
.rf-metric.creat{background:rgba(236,72,153,.1);color:#be185d}
.rf-metric.hit-low{background:rgba(156,163,175,.12);color:#6b7280}
/* ——领先用户扩展：身份卡双维度+信号+区块—— */
.uid-top{display:flex;gap:10px;margin-bottom:8px}
.uid-id{flex:1}
.uid-arch{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.3px;padding:1px 6px;border-radius:5px;background:var(--arch,#94a3b8);color:#fff;text-transform:uppercase;margin-top:1px}
.uid-dims{display:flex;gap:10px;margin-bottom:6px}
.uid-dim{flex:1;display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.uid-dim b{font-size:13px}
.dim-hi{color:#10b981}
.dim-mid{color:#f59e0b}
.dim-lo{color:#94a3b8}
.uid-sigs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.uid-sig{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(139,92,246,.1);color:#7c3aed;letter-spacing:.2px}
.uid-block{margin-bottom:5px}
.ub-h{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.4px;margin-bottom:2px;text-transform:uppercase}
.uid-idea{font-size:11.5px;color:var(--accent);line-height:1.5;font-weight:600}
/* ——领先需求评估：聚类筛选栏—— */
.fb-filter{background:var(--panel-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px}
.fb-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.fb-row:last-child{margin-bottom:0}
.fb-label{font-size:10px;font-weight:800;color:var(--muted);width:44px;flex-shrink:0}
.fb-chips{display:flex;flex-wrap:wrap;gap:5px}
.lf-chip{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;border:1px solid var(--border);background:var(--glass-bg);color:var(--ink-2);cursor:pointer;transition:all .15s;font-family:inherit}
.lf-chip:hover{border-color:var(--accent);color:var(--accent)}
.lf-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.rf-head{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:3px}
.rf-purpose{font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;background:rgba(16,185,129,.1);color:#047857;letter-spacing:.3px}
.rf-cluster{font-size:9px;font-weight:700;padding:1px 6px;border-radius:5px;background:rgba(8,145,178,.1);color:#0369a1}
.rf-metric b{font-size:12px}
.rf-hint{font-size:10px;color:var(--muted);margin-bottom:6px;padding-left:2px}

/* ============ TOOL WRAP (VOC / Corpus) ============ */
.tool-wrap{padding:18px 24px 40px;max-width:920px}
.tool-result{margin-top:16px}
.tp-tip{font-size:11px;color:var(--muted);margin:8px 0 4px;line-height:1.5}
.cl-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px}
.cl-txt{flex:1;color:var(--ink-2);line-height:1.5}
.cl-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.cl-none{color:var(--muted);font-size:11px}
.cl-neg{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:8px;background:rgba(220,38,38,.14);color:#b91c1c;margin-left:4px}

function $(sel){return document.querySelector(sel)}
function $$(sel){return document.querySelectorAll(sel)}
function toast(msg){
  var t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show')},1800);
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function csvCell(s){
  s=(s==null?'':String(s));
  if(/[",\n\r]/.test(s)) s='"'+s.replace(/"/g,'""')+'"';
  return s;
}

function getPurpose(ws,id){return DATA.workspaces[ws].purposes.find(function(p){return p.id===id})}

function setView(viewId){
  $$('.view').forEach(function(v){v.classList.remove('active')});
  var t=$( '#view'+viewId.charAt(0).toUpperCase()+viewId.slice(1) );
  if(t)t.classList.add('active');
  if(window.__onViewChange) window.__onViewChange(viewId);
}

function switchWorkspace(wsKey){
  if(state.ws===wsKey)return;
  state.ws=wsKey;
  state.purposeId=null;
  setActiveNav('');
  updateWorkspaceUI();
  renderNavPurpose();
  renderPurposeGrid();
  setView('Grid');
}

function enterPurpose(purposeId){
  // 目的 id 跨工作区唯一，自动定位所属工作区（网格同时展示两工作区，卡片只传 p.id）
  var found=null;
  Object.keys(DATA.workspaces).forEach(function(wk){
    if(DATA.workspaces[wk].purposes.some(function(p){return p.id===purposeId;}))found=wk;
  });
  if(found)state.ws=found;
  state.purposeId=purposeId;
  state.mode='struct';
  setActiveNav('pw-'+purposeId);
  updateWorkspaceUI();
  renderPurposeWorkspace();
  setView('Workspace');
}

function goBackToGrid(){
  state.purposeId=null;
  setActiveNav('');
  updateWorkspaceUI();
  renderPurposeGrid();
  setView('Grid');
}

function stressViz(){
  // 100 虚拟用户分布（呼应 Rogers 采纳曲线的钟形偏态）
  var cx=120, baseY=150, amp=64, n=48, dots=[];
  for(var i=0;i<n;i++){
    var t=(i/(n-1))*2-1;            // -1..1
    var g=Math.exp(-2.3*t*t);       // 高斯钟形
    var x=cx+t*86 + Math.sin(i*9.7)*4;
    var y=baseY - g*amp + Math.cos(i*7.3)*5;
    var r=(2.6 + g*2.4).toFixed(1);
    dots.push('<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r+'" fill="url(#stressG)" opacity="'+(0.42+g*0.5).toFixed(2)+'"/>');
  }
  return '<svg viewBox="0 0 240 200" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">'+
    '<defs>'+
      '<linearGradient id="stressG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00d4ff"/><stop offset="50%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ff6b9d"/></linearGradient>'+
      '<radialGradient id="stressGlow"><stop offset="0%" stop-color="#a855f7" stop-opacity=".20"/><stop offset="100%" stop-color="#a855f7" stop-opacity="0"/></radialGradient>'+
    '</defs>'+
    '<ellipse cx="120" cy="118" rx="112" ry="92" fill="url(#stressGlow)"/>'+
    dots.join('')+
    '<circle cx="120" cy="132" r="17" fill="url(#stressG)" opacity=".92"/>'+
    '<text x="120" y="136" text-anchor="middle" fill="#fff" font-size="9" font-weight="800">100</text>'+
    '<text x="120" y="22" text-anchor="middle" fill="#a855f7" font-size="9" font-weight="800">虚拟用户分布（Rogers 采纳曲线）</text>'+
    '<g font-size="6.6" fill="#8b90a0" text-anchor="middle">'+
      '<text x="33" y="186">创新者 2.5%</text>'+
      '<text x="66" y="186">早期 13.5%</text>'+
      '<text x="120" y="186">早期大众 34%</text>'+
      '<text x="174" y="186">晚期 34%</text>'+
      '<text x="207" y="186">落后 16%</text>'+
    '</g>'+
  '</svg>';
}

var DIMS=['尺寸','质量','材质','噪音','价格','清洁','舒适'];
var SENTS=['正面','负面','中性'];

function genSampleRows(srcId){
  if(state.sourceCache[srcId])return state.sourceCache[srcId];
  var s=DATA.sources[srcId]; if(!s)return [];
  var mkts=(s.market||'DE/US/JP').split('/').filter(Boolean);
  if(mkts[0]==='—'||!mkts.length)mkts=['DE'];
  var n = s.records>0 ? Math.min(s.records,400) : 120;
  var rows=[];
  for(var i=0;i<n;i++){
    var r1=Math.abs(Math.sin(i*12.9898))*43758.5453; r1=r1-Math.floor(r1);
    var r2=Math.abs(Math.sin(i*78.233)+1)*12543.123; r2=r2-Math.floor(r2);
    var r3=Math.abs(Math.cos(i*3.17))*9123.7; r3=r3-Math.floor(r3);
    var dim=DIMS[Math.floor(r1*DIMS.length)];
    var sent=SENTS[Math.floor(r2*SENTS.length)];
    var rating=1+Math.floor(r3*5);
    var mk=mkts[Math.floor(r1*mkts.length)];
    var txt=(sent==='负面'
        ? '该商品在'+dim+'方面表现不佳，'+(dim==='噪音'?'运行时声音偏大影响体验。':dim==='尺寸'?'尺寸与描述不符偏小。':dim==='价格'?'定价偏高性价比不足。':'用户反馈需要改进。')
        : sent==='正面'
        ? '整体满意，'+dim+'符合预期，使用顺畅。'
        : '中规中矩，'+dim+'没有明显问题也没有惊喜。');
    rows.push({id:i+1,market:mk,rating:rating,dimension:dim,sentiment:sent,text:txt});
  }
  state.sourceCache[srcId]=rows;
  return rows;
}

function computeSourceStats(rows){
  var n=rows.length||1;
  var neg=rows.filter(function(r){return r.sentiment==='负面'}).length;
  var avg=rows.reduce(function(a,r){return a+(+r.rating||0)},0)/n;
  var dimCount={};
  rows.forEach(function(r){dimCount[r.dimension]=(dimCount[r.dimension]||0)+1});
  var topDim=Object.keys(dimCount).sort(function(a,b){return dimCount[b]-dimCount[a]})[0]||'—';
  return {n:n,negPct:Math.round(neg/n*100),avg:avg.toFixed(2),topDim:topDim,dimCount:dimCount};
}

  var sentOpts='<option value="">全部情感</option>'+SENTS.map(function(d){return '<option value="'+d+'"'+(f.sentiment===d?' selected':'')+'>'+d+'</option>'}).join('');

      '<div class="se-meta">'+escHtml(s.desc)+' · 覆盖市场 '+escHtml(s.market)+' · 当前样本 '+rows.length+' 条</div>'+
      '<div class="se-filter">'+

function setSourceFilter(srcId,key,val){

function toggleSourceFilter(srcId,key,val){
  state.sourceFilters[srcId][key]=(state.sourceFilters[srcId][key]===val?'':val);
  renderSourceExplorer(srcId);

function filterSourceRows(srcId){
  var f=state.sourceFilters[srcId]; if(!f)return genSampleRows(srcId);
  return genSampleRows(srcId).filter(function(r){
    if(f.text && (r.text+r.dimension+r.market).indexOf(f.text)<0)return false;
    if(f.market && r.market!==f.market)return false;
    if(f.dimension && r.dimension!==f.dimension)return false;
    if(f.sentiment && r.sentiment!==f.sentiment)return false;
    return true;
  });
}
function applySourceFilter(srcId){
  var rows=filterSourceRows(srcId);
  var tbl=$('#seTable-'+srcId); if(!tbl)return;
  var head='<thead><tr><th>#</th><th>市场</th><th>评分</th><th>维度</th><th>情感</th><th>内容</th></tr></thead>';
  var body=rows.slice(0,60).map(function(r){
    return '<tr><td>'+r.id+'</td><td>'+r.market+'</td><td>'+r.rating+'</td><td>'+escHtml(r.dimension)+
      '</td><td><span class="se-sent s-'+r.sentiment+'">'+r.sentiment+'</span></td><td class="se-txt">'+escHtml(r.text)+'</td></tr>';
  }).join('');
  tbl.innerHTML=head+'<tbody>'+(body||'<tr><td colspan="6" style="text-align:center;color:var(--muted)">无匹配记录</td></tr>')+'</tbody>';
  var st=computeSourceStats(rows);
  var kpis=$('#viewSource').querySelectorAll('.se-kpi b');
  if(kpis.length===4){kpis[0].textContent=st.n;kpis[2].textContent=st.negPct+'%';kpis[3].textContent=st.topDim;}
}
function exportSourceData(srcId){
  var rows=filterSourceRows(srcId);
  var header=['id','market','rating','dimension','sentiment','text'];
  var csv=[header.join(',')].concat(rows.map(function(r){
    return header.map(function(h){var v=(''+r[h]).replace(/"/g,'""');return /[",\n]/.test(v)?'"'+v+'"':v;}).join(',');
  })).join('\n');
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=((DATA.sources[srcId]||{}).name||srcId)+'_export.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('已导出 '+rows.length+' 条记录');
}

      PLUT.emos.forEach(function(e,i){var ang=i*45,rad=ang*Math.PI/180;
        svg+='<ellipse class="fp-petal" data-i="'+i+'" cx="200" cy="112" rx="24" ry="74" fill="'+e.c+'" opacity="0.78" transform="rotate('+ang+' 200 200)" onclick="plutchikPick('+i+')"/>';
        var tx=(200+118*Math.sin(rad)).toFixed(1), ty=(200-118*Math.cos(rad)).toFixed(1);
        svg+='<text class="fp-emo" x="'+tx+'" y="'+(parseFloat(ty)+3).toFixed(1)+'">'+e.n+'</text><text class="fp-emo-en" x="'+tx+'" y="'+(parseFloat(ty)+13).toFixed(1)+'">'+e.en+'</text>';
      });
      svg+='<circle cx="200" cy="200" r="34" fill="var(--panel-solid)" stroke="'+c+'" stroke-width="2"/><text x="200" y="196" text-anchor="middle" font-size="11" font-weight="800" fill="var(--ink)">情绪</text><text x="200" y="210" text-anchor="middle" font-size="8" fill="var(--muted)">8 基础</text></svg>';
      body=head('八情绪花瓣','Plutchik 情绪罗盘','成对对立、强度向内递增。点击任一情绪，高亮其对立项，并给出应用提示。')+svg+
        '<div class="fp-out" id="fpOut">点击花瓣查看对立情绪对与应用方向 →</div>';
      break;
    }
    default:
      body='';
  }
  return '<div class="fw-viz" style="--fc:'+c+'">'+body+'</div>';
}

function plutchikPick(i){

// anime.js 描绘曲线：strokeDashoffset 逐段画出
function drawVocConnectors(){
  if(!window.anime) return;
  document.querySelectorAll('.voc-curve').forEach(function(p,i){
    var len; try{ len=p.getTotalLength(); }catch(e){ len=0; }
    if(!len) return;
    p.style.strokeDasharray=len;
    p.style.strokeDashoffset=len;
    anime.animate(p, { strokeDashoffset:[len,0], duration:900, delay:180+i*110, ease:'inOutSine' });
  });
}
// 行 + 动作卡 stagger 入场
function animateVocRows(){
  if(!window.anime) return;
  anime.animate('.voc-row', { opacity:[0,1], translateX:[-12,0], duration:520, delay:anime.stagger(90), ease:'outQuad' });
  anime.animate('.voc-act', { opacity:[0,1], translateY:[8,0], duration:420, delay:anime.stagger(35,{start:260}), ease:'outQuad' });
}
function vocToggle(el){
  var body=el.nextElementSibling;
  var arrow=el.querySelector('.voc-arw');
  if(!body) return;
  var isOpen = body.dataset.open!=='0';
  if(isOpen){
    if(window.anime){
      var h=body.offsetHeight;
      anime.animate(body, { height:[h,0], opacity:[1,0], duration:260, ease:'inOutQuad',
        complete:function(){ body.style.display='none'; body.style.height=''; body.style.opacity=''; }});
    } else { body.style.display='none'; }
    body.dataset.open='0';
    if(arrow) arrow.textContent='▸';
  } else {
    body.style.display='grid';
    var h2=body.offsetHeight;
    if(window.anime){
      body.style.height='0px'; body.style.opacity='0';
      anime.animate(body, { height:[0,h2], opacity:[0,1], duration:300, ease:'inOutQuad',
        complete:function(){ body.style.height=''; body.style.opacity=''; }});
    }
    body.dataset.open='1';
    if(arrow) arrow.textContent='▾';
  }
}
function vocSwitchCat(cat, btn){
  document.querySelectorAll('.voc-cat').forEach(function(b){b.classList.remove('on');});
  if(btn) btn.classList.add('on');
  document.getElementById('vocCases').innerHTML=renderVocCases(cat);
  drawVocConnectors();
  animateVocRows();
}

// ---- 神之一手洞察引擎（启发式信号分析）----
var INSIGHT_SIGNALS = {
  problems:['清洗','噪音','麻烦','难用','不方便','累','不舒服','不好','差','坏','易坏','容易坏','卡','慢','痛','硬','软','脏','异味','臭','松','紧','滑','漏','不够','太少','太短','太大','太小','太重','太轻','没效果','不好用','不实用','不卫生','不防水','不静音','不牢固','不耐用'],
  scenes:['卧室','客厅','浴室','厨房','旅行','出差','酒店','宿舍','办公室','车载','户外','阳台','床上','地板','沙发','厕所','洗手间'],
  emotions:['烦','焦虑','担心','失望','愤怒','恼火','崩溃','痛苦','难受','尴尬','羞耻','害怕','不舒服','孤独','无助'],
  desires:['希望','想','要','需要','期待','渴望','想有','想要','打算','计划','考虑','想试试'],
  workarounds:['自己','改装','换','替代','用别','自己做了','自己弄','DIY','自制','自己加','自己改','自己装'],
  deepNeeds:['放松','沉浸','陪伴','安全','自由','自然','被服务','解放双手','无负担','隐私','真实感','不尴尬','不操心','简单','直觉','轻松']
};
function runInsight(){
  var ta=document.getElementById('insightNl');
  var text=ta?ta.value.trim():'';
  if(!text){ if(window.toast) toast('请先输入用户评论或反馈'); return; }
  var el=document.getElementById('insightReport');
  if(el) el.innerHTML='<div class="ps-loading">正在运行神之一手洞察…</div>';
  var btn=document.getElementById('insightRun'); if(btn) btn.disabled=true;
  var steps=[];
  // Step 1:异常发现
  var probs=[]; INSIGHT_SIGNALS.problems.forEach(function(p){if(text.indexOf(p)>-1)probs.push(p);});
  var scenes=[]; var us=[]; INSIGHT_SIGNALS.scenes.forEach(function(s){if(text.indexOf(s)>-1&&us.indexOf(s)<0)us.push(s);}); scenes=us;
  var emos=[]; INSIGHT_SIGNALS.emotions.forEach(function(e){if(text.indexOf(e)>-1)emos.push(e);});
  var wa=[]; INSIGHT_SIGNALS.workarounds.forEach(function(w){if(text.indexOf(w)>-1)wa.push(w);});
  steps.push({title:'异常发现',n:'01',items:[
    {k:'显性问题',v:probs.length?probs.join(' · '):'未检测到典型高频问题词'},
    {k:'关联场景',v:scenes.length?scenes.join(' · '):'未检测到场景词'},
    {k:'情感信号',v:emos.length?'负面情感：'+emos.join(' · '):'情感表达较中性'},
    {k:'自创方案',v:wa.length?'用户尝试自己解决：'+wa.join(' · '):'无明显DIY信号'}
  ]});
  // Step 2:需求本质提取
  var desires=[]; INSIGHT_SIGNALS.desires.forEach(function(d){if(text.indexOf(d)>-1)desires.push(d);});
  var deeps=[]; INSIGHT_SIGNALS.deepNeeds.forEach(function(d){if(text.indexOf(d)>-1)deeps.push(d);});
  var inferred=[];
  if(probs.indexOf('清洗')>-1||probs.indexOf('卫生')>-1) inferred.push('懒人化 · 免维护体验');
  if(probs.indexOf('噪音')>-1) inferred.push('沉浸感 · 安静陪伴');
  if(probs.indexOf('不方便')>-1||probs.indexOf('麻烦')>-1) inferred.push('解放双手 · 直觉操作');
  if(emos.length>0) inferred.push('情绪安抚 · 被理解和接纳');
  if(wa.length>0) inferred.push('未满足需求强度高 · 用户愿意自己动手');
  steps.push({title:'需求本质提取',n:'02',items:[
    {k:'表层表达',v:desires.length?'用户表达：'+desires.join(' · '):'未直接表达期望'},
    {k:'真正想获得的状态',v:deeps.length?deeps.join(' · '):'未检测到深层状态词'},
    {k:'从问题反推',v:inferred.length?inferred.join('\n'):'信号不足以反推需求本质'}
  ]});
  // Step 3:行业默认逻辑拆解
  var assumptions=[];
  if(scenes.indexOf('浴室')>-1) assumptions.push('为什么产品必须「防水」才算合格？如果最早设计就考虑浴室场景，防水应该是基础而不是卖点。');
  if(scenes.indexOf('卧室')>-1) assumptions.push('为什么产品默认「只在卧室/私密空间使用」？定义本身就限制了使用场景。');
  if(probs.indexOf('清洗')>-1) assumptions.push('为什么用户必须自己清洗？行业默认「每次用完都要洗」，但用户真正想要的是「用完不用管」。');
  if(probs.indexOf('噪音')>-1) assumptions.push('为什么产品一定有噪音？行业默认「电机=噪音」，但用户要的是「无声操作」。');
  if(wa.length>0) assumptions.push('用户选择自己动手 → 行业方案无法满足 → 存在尚未被定义的默认假设。');
  if(!assumptions.length) assumptions.push('未从输入中识别到明显默认假设。建议补充更多原始数据。');
  steps.push({title:'行业默认逻辑拆解',n:'03',items:assumptions.map(function(a){return{k:'被挑战的默认假设',v:a};})});
  // Step 4:重新定义产品
  steps.push({title:'重新定义产品',n:'04',items:[
    {k:'产品的原始目的',v:'帮助用户进入某种理想的体验状态——不是「提供功能」，而是「创造状态」。'},
    {k:'从异常到新定义',v:inferred.length?'目标状态应向「'+inferred.slice(0,2).join('」+「')+'」靠拢，而非继续在参数上竞争':'数据不足'},
    {k:'可能的体验系统方向',v:inferred.length?'不再是单一工具 → 整合 '+inferred.slice(0,3).map(function(i){return i.split('·')[0].trim();}).filter(Boolean).join(' / ')+' 的体验':'数据不足'}
  ]});
  // Step 5:神之一手洞察
  var opp=[];
  if(scenes.length) opp.push('新场景机会：'+scenes.join('/')+' 场景的需求未被充分满足，存在定义新子类目的空间。');
  if(probs.length) opp.push('问题驱动创新：'+probs.slice(0,3).join('/')+' 等高频问题说明现有产品定义存在本质缺陷。');
  if(wa.length) opp.push('用户自创信号：用户开始自己解决问题 → 这是「下一代产品方向」的最强信号。');
  if(inferred.length) opp.push('体验升级路径：从 '+inferred[0].split('·')[0].trim()+' 切入，重新定义类目的使用预期。');
  if(!opp.length) opp.push('输入数据不足以形成类目级洞察，请提供更多原始用户评论。');
  steps.push({title:'神之一手洞察',n:'05',items:[{k:'类目级机会',v:opp.join('\n\n')}]});
  renderInsightReport(steps);
  if(btn) btn.disabled=false;
}
function renderInsightReport(steps){
  var el=document.getElementById('insightReport');
  if(!el) return;
  var html=steps.map(function(s){
    var items=s.items.map(function(it){
      return '<div class="ir-item"><div class="ir-item-k">'+escHtml(it.k)+'</div><div class="ir-item-v">'+escHtml(it.v).replace(/\n/g,'<br>')+'</div></div>';
    }).join('');
    return '<div class="ir-card"><div class="ir-head"><span class="ir-n">'+s.n+'</span><span class="ir-title">'+escHtml(s.title)+'</span></div><div class="ir-body">'+items+'</div></div>';
  }).join('');
  el.innerHTML=
    '<div class="ir-summary"><div class="ps-sec">洞察报告</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:-4px;margin-bottom:6px">基于「神之一手洞察系统」5步工作流的启发式分析。接入真实数据后精度可大幅提升。</div></div>'+
    '<div class="ir-steps">'+html+'</div>'+

// ---- 风险与能力匹配决策引擎 ----
var RISK_SIGNALS = {
  competition:['竞争','竞品','对手','饱和','红海','多','拥挤','激烈'],
  cost:['成本','资金','预算','投入','贵','烧钱','亏损','ROI'],
  brand:['品牌','知名度','信任','认知','口碑'],
  channel:['渠道','流量','推广','获客','投放','KOL'],
  tech:['技术','开发','研发','技术门槛','专利','壁垒'],
  policy:['政策','合规','法规','监管','标准','资质','认证'],
  team:['团队','人才','人','招人','找人','组建'],
  time:['时间','周期','长','慢','久','短期','长期'],
  user:['用户','需求','客户','市场','受众','人群']
};
function runRiskAnalysis(){
  var ids=['rqGoal','rqSuccess','rqAbility','rqExp','rqEnv'];
  var vals={};
  ids.forEach(function(id){
    var el=document.getElementById(id);
    vals[id]=el?el.value.trim():'';
  });
  if(!vals.rqGoal&&!vals.rqEnv){ if(window.toast) toast('请至少填写目标和环境信息'); return; }
  var el=document.getElementById('rpReport');
  if(el) el.innerHTML='<div class="ps-loading">正在分析风险与能力匹配度…</div>';
  var btn=document.querySelector('.ps-run'); if(btn) btn.disabled=true;
  // 启发式风险分析
  var text=(vals.rqGoal+' '+vals.rqSuccess+' '+vals.rqAbility+' '+vals.rqExp+' '+vals.rqEnv).toLowerCase();
  var signals={};
  Object.keys(RISK_SIGNALS).forEach(function(k){
    var matched=RISK_SIGNALS[k].filter(function(w){return text.indexOf(w)>-1;});
    if(matched.length) signals[k]={count:matched.length,words:matched};
  });
  // 生成报告
  var steps=[];
  // 1.目标定义
  steps.push({title:'目标定义', n:'01', items:[{k:'目标结果',v:vals.rqGoal||'未填写'},{k:'成功标准',v:vals.rqSuccess||'未填写'}]});
  // 2.环境状况
  var envRisks=Object.keys(signals).map(function(k){
    var labels={competition:'市场竞争',cost:'成本压力',brand:'品牌壁垒',channel:'渠道获客',tech:'技术门槛',policy:'政策合规',team:'团队能力',time:'时间周期',user:'用户需求'};
    return '<span class="rp-risk-chip">'+escHtml(labels[k]||k)+'</span>';
  }).join('');
  steps.push({title:'环境状况分析', n:'02', items:[
    {k:'用户描述的环境',v:vals.rqEnv||'未填写'},
    {k:'检测到的风险信号',v:envRisks||'<span style="color:var(--muted)">未检测到明显风险信号，建议补充更多信息</span>'}
  ]});
  // 3.能力评估
  steps.push({title:'能力范围分析', n:'03', items:[
    {k:'已有能力',v:vals.rqAbility||'未填写'},
    {k:'相关经验',v:vals.rqExp||'未填写'}
  ]});
  // 4.风险分类 + 5.匹配度
  var matchedItems=[];
  var unmatchedItems=[];
  Object.keys(signals).forEach(function(k){
    var labels={competition:'市场竞争',cost:'成本压力',brand:'品牌壁垒',channel:'渠道获客',tech:'技术门槛',policy:'政策合规',team:'团队能力',time:'时间周期',user:'用户需求'};
    var inAbility = (vals.rqAbility+vals.rqExp).toLowerCase().indexOf(k)>-1;
    if(inAbility){
      matchedItems.push({k:labels[k]||k, v:'能力范围内 — 具备对应经验或资源，覆盖度需进一步量化评估'});
    } else {
      unmatchedItems.push({k:labels[k]||k, v:'能力范围外 — 当前无明确覆盖，需要重点判断是否决定结果'});
    }
  });
  if(!matchedItems.length&&!unmatchedItems.length){
    unmatchedItems.push({k:'暂无明确风险',v:'输入信息不足以识别明确风险，建议补充更多详情'});
  }
  steps.push({title:'风险分类与匹配度', n:'04', items:[
    {k:'能力范围内风险',v:matchedItems.length?matchedItems.map(function(m){return '<b>'+escHtml(m.k)+'</b>：'+escHtml(m.v);}).join('<br><br>'):'<span style="color:var(--muted)">暂无</span>'},
    {k:'能力范围外风险',v:unmatchedItems.length?unmatchedItems.map(function(m){return '<b>'+escHtml(m.k)+'</b>：'+escHtml(m.v);}).join('<br><br>'):'<span style="color:var(--muted)">暂无</span>'}
  ]});
  // 6.是否可达
  var criticalOutside=unmatchedItems.length;
  var hasCritical=criticalOutside>0;
  steps.push({title:'结果是否可达', n:'05', items:[
    {k:'关键判断',v:hasCritical?'存在 <b>'+criticalOutside+'</b> 个能力外风险可能决定结果':'所有检测到的风险均在能力覆盖范围内'},
    {k:'逻辑推演',v:hasCritical?'能力外风险 → 决定结果 → 不可解决 → 不建议直接进入':'能力内风险 → 可覆盖 → 建议进入 + 小规模验证'}
  ]});
  // 7.逻辑链条表格
  var chainRows=Object.keys(signals).map(function(k){
    var labels={competition:'市场竞争',cost:'成本压力',brand:'品牌壁垒',channel:'渠道获客',tech:'技术门槛',policy:'政策合规',team:'团队能力',time:'时间周期',user:'用户需求'};
    var inAbility = (vals.rqAbility+vals.rqExp).toLowerCase().indexOf(k)>-1;
    return '<tr><td style="padding:4px 8px;font-size:11px">'+escHtml(labels[k]||k)+'</td><td style="padding:4px 8px;font-size:11px">'+(inAbility?'<span style="color:#10b981">能力内</span>':'<span style="color:#dc2626">能力外</span>')+'</td><td style="padding:4px 8px;font-size:11px">'+(inAbility?'✅ 可解决':'❌ 不可解决')+'</td><td style="padding:4px 8px;font-size:11px">'+(inAbility?'可控':'决定性')+'</td></tr>';
  }).join('');
  steps.push({title:'最终建议', n:'06', items:[
    {k:'建议结论',v:hasCritical?'⚠️ 不建议直接进入 — 当前能力结构与目标结果存在关键缺口，建议先补足能力再评估':'✅ 建议进入 — 能力结构可覆盖检测到的环境风险'},
    {k:'行动方向',v:hasCritical?'优先处理能力外风险（'+Object.keys(signals).filter(function(k){return (vals.rqAbility+vals.rqExp).toLowerCase().indexOf(k)<0;}).map(function(k){var labels={competition:'市场竞争',cost:'成本压力',brand:'品牌壁垒',channel:'渠道获客',tech:'技术门槛',policy:'政策合规',team:'团队能力',time:'时间周期',user:'用户需求'};return labels[k]||k;}).join('、')+'），可采用MVP小规模验证。':'可制定执行计划，建议PDCA持续迭代优化。'}
  ]});
  renderRiskReport(steps, chainRows);
  if(btn) btn.disabled=false;
}
function renderRiskReport(steps, chainRows){
  var el=document.getElementById('rpReport');
  if(!el) return;
  var html=steps.map(function(s){
    var items=s.items.map(function(it){
      return '<div class="rp-ri"><div class="rp-rik">'+it.k+'</div><div class="rp-riv">'+it.v+'</div></div>';
    }).join('');
    return '<div class="rp-rcard"><div class="rp-rhead"><span class="rp-rn">'+s.n+'</span><span class="rp-rtitle">'+escHtml(s.title)+'</span></div><div class="rp-rbody">'+items+'</div></div>';
  }).join('');
  el.innerHTML=
    '<div class="ps-sec">风险与能力匹配分析报告</div>'+
    '<div style="font-size:11px;color:var(--muted);margin:-4px 0 8px">基于「风险与能力匹配决策模型」7步分析流程 · 系统论+风险管理+反脆弱</div>'+
    '<div class="rp-steps">'+html+'</div>'+
    (chainRows?'<div class="rp-rcard" style="margin-top:10px"><div class="rp-rhead"><span class="rp-rn">LC</span><span class="rp-rtitle">逻辑链条</span></div><div class="rp-rbody"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:var(--glass-bg)"><th style="padding:5px 8px;font-size:10px;font-weight:800;text-align:left;color:var(--muted)">风险</th><th style="padding:5px 8px;font-size:10px;font-weight:800;text-align:left;color:var(--muted)">能力</th><th style="padding:5px 8px;font-size:10px;font-weight:800;text-align:left;color:var(--muted)">匹配</th><th style="padding:5px 8px;font-size:10px;font-weight:800;text-align:left;color:var(--muted)">对结果的影响</th></tr></thead><tbody>'+chainRows+'</tbody></table></div></div>':'')+
    '<div class="ps-verdict caution" style="margin-top:10px;text-align:left;padding:12px 16px"><div style="font-size:11.5px;line-height:1.6;color:var(--ink-2)">以上分析基于启发式规则引擎。接入真实数据后精度可大幅提升。最终判断需结合行业专家经验。</div></div>';
}

function ndSwitchTab(tab){
  document.getElementById('ndTabTriz').classList.toggle('active',tab==='triz');
  document.getElementById('ndTabCompass').classList.toggle('active',tab==='compass');
  document.getElementById('ndTrizPanel').style.display=(tab==='triz'?'':'none');

function ndFilterCat(cat, btn){
  document.querySelectorAll('.nd-cat').forEach(function(b){b.classList.toggle('active',b===btn);});
  if(!window._ND) return;
  window._ND.selCat=cat;
  var list = window._ND.triz.filter(function(p){return p.cat===cat;});
  var html = list.map(function(p){
    var sel = window._ND.selPrins.indexOf(p.n)>-1;
    return '<div class="nd-prin'+(sel?' sel':'')+'" data-n="'+p.n+'" onclick="ndTogglePrin('+p.n+',this)"><span class="nd-pn">'+p.n+'</span><span class="nd-pname">'+escHtml(p.name)+'</span><span class="nd-pdesc">'+escHtml(p.desc)+'</span></div>';
  }).join('');
  document.getElementById('ndPrins').innerHTML=html||'<div class="nd-pempty">该分类暂无原理</div>';
}
function ndTogglePrin(n, el){
  if(!window._ND) return;
  var idx = window._ND.selPrins.indexOf(n);
  if(idx>-1){ window._ND.selPrins.splice(idx,1); el.classList.remove('sel'); }
  else{ window._ND.selPrins.push(n); el.classList.add('sel'); }
  document.getElementById('ndSelCnt').textContent = window._ND.selPrins.length;
}
function ndSelectQuad(q, el){
  document.querySelectorAll('.nc-quad').forEach(function(b){b.classList.toggle('active',b===el);});
  if(window._ND) window._ND.selQuad = (window._ND.selQuad===q?null:q);
}
function runNewDevelop(){
  var ta=document.getElementById('ndNl');
  var text=ta?ta.value.trim():'';
  if(!text){ if(window.toast) toast('请先输入产品痛点或描述'); return; }
  if(!window._ND) return;
  var el=document.getElementById('ndReport');
  if(el) el.innerHTML='<div class="ps-loading">正在基于选定框架生成创意方案…</div>';
  var btn=document.getElementById('ndRun'); if(btn) btn.disabled=true;
  var isTriz = document.getElementById('ndTabTriz').classList.contains('active');
  var steps = [];
  if(isTriz){
    var sel = window._ND.selPrins.length ? window._ND.selPrins.map(function(n){return window._ND.triz.find(function(p){return p.n===n;});}).filter(Boolean) : window._ND.triz.filter(function(p){return p.cat===window._ND.selCat;}).slice(0,4);
    steps.push({title:'TRIZ 创意方案', n:'01', items:sel.map(function(p){
      return {k:p.n+'. '+escHtml(p.name), v:'核心思路：'+escHtml(p.desc)+'<br>应用示例：'+escHtml(p.example)+'<br><span style="color:var(--accent)">建议：结合「'+escHtml(text)+'」的痛点，可将此原理应用于产品重构。</span>'};
    })});
  } else {
    var selQ = window._ND.selQuad ? window._ND.compass.find(function(q){return q.q===window._ND.selQuad;}) : window._ND.compass[0];
    if(selQ){
      steps.push({title:'产品创意罗盘 · '+escHtml(selQ.qName), n:'01', items:selQ.moves.map(function(m){
        return {k:escHtml(m.m), v:escHtml(m.desc)+'<br><span style="color:var(--accent)">结合痛点「'+escHtml(text)+'」，从 '+escHtml(m.m)+' 方向切入：重新定义产品在 '+escHtml(selQ.qName)+' 维度的价值。</span>'};
      })});
    }
  }
  renderNewDevelopReport(steps, isTriz);
  if(btn) btn.disabled=false;
}
function renderNewDevelopReport(steps, isTriz){
  var el=document.getElementById('ndReport');
  if(!el||!steps.length) return;
  var html = steps.map(function(s){
    var items=s.items.map(function(it){
      return '<div class="nd-res-item"><div class="nd-res-k">'+it.k+'</div><div class="nd-res-v">'+it.v+'</div></div>';
    }).join('');
    return '<div class="nd-res-card"><div class="nd-res-head"><span class="nd-res-n">'+s.n+'</span><span class="nd-res-title">'+s.title+'</span></div><div class="nd-res-body">'+items+'</div></div>';
  }).join('');
  var total = steps.reduce(function(a,s){return a+s.items.length;},0);
  el.innerHTML=
    '<div class="ps-sec">创意方案</div>'+
    '<div style="font-size:11px;color:var(--muted);margin:-4px 0 6px">基于 '+(isTriz?'TRIZ 40 个发明原理':'产品创意罗盘 4 象限×20 种打法')+' 生成 · 共 <b>'+total+'</b> 个创意方向</div>'+

async function ndFetchReddit(){
  var kw=document.getElementById('ndExtKw');
  var q=kw?kw.value.trim():'';
  if(!q){if(window.toast) toast('请输入关键词或选择内置样本'); return;}
  var load=document.getElementById('ndExtLoad'); if(load) load.innerHTML='<div class="ps-loading" style="padding:8px">正在搜索百科知识…</div>';
  var btn=document.getElementById('ndExtBtn'); if(btn) btn.disabled=true;
  try{
    // 使用 Wikipedia API（国内可直连、免费、CORS 友好）
    var url='https://zh.wikipedia.org/w/api.php?action=query&list=search&srsearch='+encodeURIComponent(q)+'&format=json&origin=*&srlimit=10&srprop=snippet';
    var res=await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data=await res.json();
    var posts=(data.query&&data.query.search) ? data.query.search.map(function(p){
      return{title:escHtml(p.title), text:(p.snippet||'').replace(/<[^>]+>/g,'').substring(0,250), subreddit:'Wikipedia', score:p.wordcount||0, comments:0};
    }) : [];
    if(posts.length) renderRedditPosts(posts);
    else throw new Error('未找到相关条目');
  }catch(e){
    if(load) load.innerHTML='<div style="padding:6px;font-size:11px;color:#dc2626">百科搜索异常：'+escHtml(e.message)+'</div>'+

          return '<button class="lf-chip" onclick="ndFillSample(\''+k+'\',this)">'+escHtml(k)+'</button>';
        }).join('')+
      '</div>';

  if(btn) btn.disabled=false;

function ndLoadLocalFile(file){
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){

    var posts=lines.map(function(line,i){
      return{title:'本地数据 #'+(i+1), text:line.trim().substring(0,250), subreddit:'本地文件', score:0, comments:0};
    });
    renderRedditPosts(posts);
  };
  reader.readAsText(file);
}

function decomposeInput(text){
  text = (text||'').toString();
  var d = {raw:text, category:null, categoryHit:[], price:null, priceUnit:'', features:[], appearance:[], audience:[], scene:[]};
  for(var c in PS_TAXONOMY.category){
    if(text.indexOf(c) >= 0){ d.category=c; d.categoryHit=PS_TAXONOMY.category[c]; break; }
  }
  if(!d.category){
    var m = text.match(/(?:一款|一个|一支|一台|一件|卖|上|做|开发|设计|推)(.{1,8}?)(?:，|。|，|\s|$)/);
    d.category = (m && m[1] && m[1].length>=2) ? m[1].replace(/[，。\s]/g,'') : '通用品类';
  }
  var pm = text.match(/(\d+(?:\.\d+)?)\s*(美元|美金|欧|元|块|￥|¥|eur|usd|\$)/i);
  if(pm){ d.price=parseFloat(pm[1]); d.priceUnit=(pm[2]||'').toLowerCase(); }
  for(var f in PS_TAXONOMY.feature){ if(text.indexOf(f) >= 0) d.features.push(f); }
  PS_TAXONOMY.appearance.forEach(function(w){ if(text.indexOf(w) >= 0) d.appearance.push(w); });
  PS_TAXONOMY.audience.forEach(function(w){ if(text.indexOf(w) >= 0) d.audience.push(w); });
  PS_TAXONOMY.scene.forEach(function(w){ if(text.indexOf(w) >= 0) d.scene.push(w); });
  return d;
}

function matchSources(decomp){
  var hits = {};
  function add(id,w){ hits[id]=(hits[id]||0)+w; }
  decomp.categoryHit.forEach(function(id){ add(id,3); });
  decomp.features.forEach(function(f){ (PS_TAXONOMY.feature[f]||[]).forEach(function(id){ add(id,2); }); });
  if(decomp.price!=null){ add('s3',2); add('s7',2); add('s9',1); }
  if(decomp.appearance.length){ add('s1',1); add('s8',1); }
  if(decomp.audience.length){ add('s5',2); add('s1',1); }
  if(decomp.scene.length){ add('s1',1); add('s6',1); add('s5',1); }
  add('s1',1); add('s8',1); // VOC 基底始终计入
  return Object.keys(hits).map(function(id){
    var s = DATA.sources[id];
    return {id:id, name:s.name, weight:hits[id], status:s.status, records:s.records, desc:s.desc};
  }).sort(function(a,b){ return b.weight-a.weight; });
}

function confidenceOf(srcIds){
  var readyBig=false, ready=false, pending=false;
  srcIds.forEach(function(id){
    var s=DATA.sources[id]; if(!s) return;
    if(s.status==='ready' && s.records>=100) readyBig=true;
    else if(s.status==='ready') ready=true;
    else if(s.status==='pending') pending=true;
  });
  if(readyBig) return 'high';
  if(ready) return 'mid';
  if(pending) return 'low';
  return 'guess';
}
function dimSignalWeak(itemId, d){
  switch(itemId){
    case 'margin': case 'price_band': return d.price==null;
    case 'demand_heat': case 'trend': case 'market_size': case 'fantasy_value': return !d.category || d.category==='通用品类';
    case 'user_pain': case 'diff_level': case 'usp_unique': case 'barrier': return d.features.length===0;
    case 'sales_potential': case 'lifecycle': return d.audience.length===0 && d.features.length===0;
  }
  return false;
}
function dimSrcIds(itemId, matchedIds){
  var base = DIM_SRC[itemId] || [];
  var inter = base.filter(function(id){ return matchedIds.indexOf(id) >= 0; });
  return inter.length ? inter : base;
}

function scoreDimension(itemId, d, matchedIds){
  var featN=d.features.length, audN=d.audience.length, appN=d.appearance.length;
  var hasCat = d.category && d.category!=='通用品类';
  var srcIds = dimSrcIds(itemId, matchedIds);
  var score=3, reason='';
  switch(itemId){
    case 'demand_heat':
      score=3; if(hasCat)score++; if(featN>=2)score++; if(!hasCat&&featN===0)score=2;
      reason = hasCat ? ('类目「'+d.category+'」命中数据源，结合功能词可判断存在明确需求。') : '未识别明确类目，需求热度按通用品类估算。'; break;
    case 'user_pain':
      score=3; if(featN>=1)score++; if(audN>=1)score++; if(appN>=1)score++;
      reason='从功能/人群/外观信号看用户诉求明确'+(featN?'（含'+d.features.join('、')+'）':'')+'，痛点可被产品响应。'; break;
    case 'trend':
      score=3; if(hasCat && ['小家电','数码','个护','家居','美妆'].indexOf(d.category)>=0)score++;
      reason=hasCat?('类目「'+d.category+'」属持续消费品类，趋势性中等偏上。'):'类目未明确，趋势性按中性估算。'; break;
    case 'market_size':
      score=3; if(hasCat)score++; if(d.price!=null&&d.price>=20)score++;
      reason='类目'+(hasCat?'「'+d.category+'」':'')+'具备一定容量，配合价格带判断有销售空间。'; break;
    case 'margin':
      score=3; if(d.price!=null){ if(d.price>=45)score++; else if(d.price<15)score--; }
      reason=d.price!=null?('客单价约 '+d.price+(d.priceUnit||'')+'，毛利率空间'+(d.price>=45?'较充足':d.price<15?'偏紧':'中性')+'。'):'未提供价格，毛利率按中性估算。'; break;
    case 'price_band':
      score=3; if(d.price!=null){ if(d.price>=20&&d.price<=120)score=4; else if(d.price<20)score=2; }
      reason=d.price!=null?('售价 '+d.price+(d.priceUnit||'')+'，'+(d.price>=20&&d.price<=120?'落在主流可接受区间':'需强价值或走量支撑')+'。'):'价格缺失，售价带按中性估算。'; break;
    case 'sales_potential':
      score=3; if(featN>=2)score++; if(audN>=1)score++;
      reason=(featN>=2||audN>=1)?'功能组合/目标人群清晰，具备稳定销售预期。':'信号偏弱，销售潜力按中性估算。'; break;
    case 'lifecycle':
      score=3; if(hasCat && ['家居','数码','个护','小家电','美妆'].indexOf(d.category)>=0)score++;
      reason=hasCat?('「'+d.category+'」属耐耗/复购品类，生命周期较长。'):'类目未明确，生命周期按中性估算。'; break;
    case 'diff_level':
      score=3; if(featN>=2)score++; if(appN>=1)score++;
      reason=(featN>=1||appN>=1)?('功能'+(featN?('「'+d.features.join('、')+'」'):'')+(appN?' + 外观优势':'')+'提供差异化抓手。'):'缺乏明显差异化锚点，差异化程度中性。'; break;
    case 'barrier':
      score=3; if(featN>=1&&(d.features.indexOf('智能')>=0||d.features.indexOf('APP')>=0||d.features.indexOf('蓝牙')>=0))score++;
      reason=(d.features.indexOf('智能')>=0||d.features.indexOf('APP')>=0)?'含智能/互联功能，具备一定技术壁垒。':'功能较易复制，壁垒中性。'; break;
    case 'fantasy_value':
      score=3; if(hasCat&&['情趣','个护','美妆','家居'].indexOf(d.category)>=0)score++;
      reason=(hasCat&&['情趣','个护','美妆','家居'].indexOf(d.category)>=0)?('「'+d.category+'」具备人设/幻想标签延展空间。'):'幻想标签价值按中性估算。'; break;
    case 'usp_unique':
      score=3; if(featN>=1)score++; if(appN>=1)score++;
      reason=(featN>=1||appN>=1)?'存在可感知、可传播的核心卖点。':'可传播卖点不突出，独特性中性。'; break;
  }
  score=Math.max(1,Math.min(5,score));
  var conf = confidenceOf(srcIds);
  if(conf!=='high' && conf!=='mid' && dimSignalWeak(itemId,d)) conf='guess';
  return {score:score, reason:reason, srcIds:srcIds, conf:conf};
}

function computeScoreReport(d, sources){
  var matchedIds = sources.map(function(s){ return s.id; });
  var panels = PS_DIMS.map(function(dim){
    var items = dim.items.map(function(item){
      var r = scoreDimension(item.id, d, matchedIds);
      PS_SCORES[item.id] = r.score;
      return {item:item, score:r.score, reason:r.reason, srcIds:r.srcIds, conf:r.conf};
    });
    var avg = items.reduce(function(a,b){return a+b.score;},0)/items.length;
    return {dim:dim, items:items, panelScore:avg};
  });
  var confCounts = {high:0,mid:0,low:0,guess:0};
  panels.forEach(function(p){ p.items.forEach(function(it){ confCounts[it.conf]++; }); });
  return {panels:panels, confCounts:confCounts};
}

// ---- 文件读取（txt/csv 直接；docx/xlsx 用 DecompressionStream 提取文本）----
async function psReadFile(file){
  var name=(file.name||'').toLowerCase();
  if(name.endsWith('.txt')||name.endsWith('.csv')) return await file.text();
  if(name.endsWith('.docx')||name.endsWith('.xlsx')){
    try{ return await extractOfficeText(file); }catch(e){ return ''; }
  }
  try{ return await file.text(); }catch(e){ return ''; }
}
async function psOnFile(file){
  if(!file) return;
  var t = await psReadFile(file);
  if(!t || !t.trim()){ if(window.toast) toast('无法解析该文件，请导出为 .txt 或 .csv 后重试'); return; }
  var ta=document.getElementById('psNl'); if(ta){ ta.value=t.slice(0,20000); }
  if(window.toast) toast('已读取文件内容，点击「拆解并评分」');
}
async function extractOfficeText(file){
  var buf=await file.arrayBuffer();
  var bytes=new Uint8Array(buf);
  var isDocx=file.name.toLowerCase().endsWith('.docx');
  var targets=isDocx?['word/document.xml']:['xl/sharedStrings.xml','xl/worksheets/sheet1.xml'];
  var texts=[]; var i=0;
  while(i<bytes.length-4){
    if(bytes[i]===0x50&&bytes[i+1]===0x4b&&bytes[i+2]===0x03&&bytes[i+3]===0x04){
      var method=bytes[i+8]|(bytes[i+9]<<8);
      var nameLen=bytes[i+26]|(bytes[i+27]<<8);
      var extraLen=bytes[i+28]|(bytes[i+29]<<8);
      var name=new TextDecoder().decode(bytes.subarray(i+30,i+30+nameLen));
      var compSize=(bytes[i+18]|(bytes[i+19]<<8)|(bytes[i+20]<<24)|(bytes[i+21]<<16))>>>0;
      var dataStart=i+30+nameLen+extraLen;
      if(targets.indexOf(name)>=0 && method===8){
        var compBytes=bytes.subarray(dataStart,dataStart+compSize);
        var ds=new DecompressionStream('deflate-raw');
        var writer=ds.writable.getWriter(); writer.write(compBytes); writer.close();
        var ab=await new Response(ds.readable).arrayBuffer();
        var xml=new TextDecoder().decode(new Uint8Array(ab));
        texts.push(extractXmlText(xml,name));
      }
      i = (method===8) ? dataStart+compSize : dataStart+1;
      continue;
    }
    i++;
  }
  return texts.join('\n');
}
function extractXmlText(xml,name){
  var out=[];
  var re=/<(?:w:t|t)[^>]*>([\s\S]*?)<\/\w:t>/g, m;
  while((m=re.exec(xml))){ out.push(m[1].replace(/<[^>]+>/g,'')); }
  return out.join(name.indexOf('sharedStrings')>=0?' ':'\n');
}

function renderPSTotal(){
  var totalEl = document.getElementById('psTotalVal');
  var radarEl = document.getElementById('psRadar');
  var verdictEl = document.getElementById('psVerdict');
  if(!totalEl || !radarEl || !verdictEl) return;

  // Calculate weighted total
  var weightedSum = 0;
  var maxWeightedSum = 0;
  var dimScores = [];
  PS_DIMS.forEach(function(dim){
    var itemSum = 0;
    dim.items.forEach(function(item){
      itemSum += (PS_SCORES[item.id] || 3);
    });
    var avgItem = itemSum / dim.items.length;
    var wScore = avgItem * dim.weight;
    weightedSum += wScore;
    maxWeightedSum += 5 * dim.weight; // max per dimension
    dimScores.push({name:dim.name, score:avgItem, color:dim.color});
  });

  var finalScore = weightedSum / (maxWeightedSum || 1) * 5;
  // Clamp
  if(finalScore > 5) finalScore = 5;
  if(finalScore < 1) finalScore = 1;

  totalEl.textContent = finalScore.toFixed(2);

  // Radar chart SVG
  radarEl.innerHTML = buildPSRadar(dimScores);

  // Verdict
  var cls, text;
  if(finalScore >= 3.8){cls='go';text='建议推进 — 市场真实存在且具备商业价值，差异化竞争力较强。建议进入详细可行性验证阶段（小批量测款 / VOC深度挖掘）。';}
  else if(finalScore >= 2.6){cls='caution';text='谨慎观察 — 部分维度存在风险或不确定性。建议补充数据验证薄弱环节（如扩大VOC样本 / 竞品对标分析）后再决策。';}
  else{cls='stop';text='暂缓投入 — 当前维度综合得分偏低，市场需求或商业回报存在明显缺口。建议重新评估方向或寻找替代机会点。';}
  verdictEl.className = 'ps-verdict '+cls;
  verdictEl.textContent = text;
}

function buildPSRadar(dimScores){
  var cx=180, cy=170, R=120;
  var N = dimScores.length;
  var angles = dimScores.map(function(_,i){ return -Math.PI/2 + (2*Math.PI*i)/N; });

  // Background grid (5 rings)
  var grid='';
  for(var ring=1;ring<=5;ring++){
    var r=R*ring/5;
    var pts=angles.map(function(a){ return (cx+r*Math.cos(a))+','+(cy+r*Math.sin(a)); }).join(' ');
    grid+='<polygon points="'+pts+'" fill="none" stroke="rgba(128,140,164,.15)" stroke-width="1"/>';
  }
  // Axes
  angles.forEach(function(a){
    grid+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R*Math.cos(a))+'" y2="'+(cy+R*Math.sin(a))+'" stroke="rgba(128,140,164,.15)" stroke-width="1"/>';
  });

  // Data polygon
  var dPts = dimScores.map(function(d,i){
    var s=(d.score||3)/5*R;
    var a=angles[i];
    return (cx+s*Math.cos(a))+','+(cy+s*Math.sin(a));
  }).join(' ');
  var dataPoly='<polygon points="'+dPts+'" fill="rgba(0,212,255,.18)" stroke="#00d4ff" stroke-width="2"/>';

  // Labels + dots
  var labels='';
  dimScores.forEach(function(d,i){
    var a=angles[i];
    var lx=cx+(R+22)*Math.cos(a);
    var ly=cy+(R+22)*Math.sin(a);
    var align=i===0?'middle':(i<N/2?'start':'end');
    labels+='<text x="'+lx+'" y="'+ly+'" fill="var(--ink)" font-size="11.5" font-weight="700" text-anchor="'+align+'">'+d.name+'</text>';
    // dot
    var s=(d.score||3)/5*R;
    var dx=cx+s*Math.cos(a);
    var dy=cy+s*Math.sin(a);
    labels+='<circle cx="'+dx+'" cy="'+dy+'" r="4" fill="'+d.color+'"/>';
  });

  // Center label
  labels+='<text x="'+cx+'" y="'+(cy+4)+'" fill="var(--muted)" font-size="11" text-anchor="middle" font-weight="700">核心</text>';

  return '<svg viewBox="0 0 360 340" xmlns="http://www.w3.org/2000/svg">'+grid+dataPoly+labels+'</svg>';
}

function lfDimClass(v){ var s=String(v); return s==='极高'||s==='高' ? 'dim-hi' : (s==='中' ? 'dim-mid' : 'dim-lo'); }

function switchLfTab(tab, el){
  var zone = el ? el.closest('.lf-zone') : null;
  var tabs = zone ? zone.querySelectorAll('.lf-tab') : $$('.lf-tab');
  tabs.forEach(function(t){ t.classList.toggle('active', t.getAttribute('data-lftab')===tab); });
  renderLfBody(zone);
}

function renderLfBody(zone){
  if(!zone) zone = document.querySelector('.lf-zone');
  var body = zone ? zone.querySelector('.lf-body') : null;
  if(!body) return;
  var active = zone.querySelector('.lf-tab.active');
  var tab = active ? active.getAttribute('data-lftab') : 'portrait';
  if(tab === 'portrait') body.innerHTML = renderLfPortrait(zone);
  else body.innerHTML = renderLfFeedback(zone);
}

// 四象限分布图：横轴=产品优化/创意；纵轴=用户感知度
function renderLfQuadrant(){
  // 1. 统计
  var maxFreq=0;
  LF_PORTRAITS.forEach(function(u){if(u.freq>maxFreq)maxFreq=u.freq;});
  // 2. 坐标
  var pos={};
  LF_PORTRAITS.forEach(function(u){
    var ic=(u.idea||'').toLowerCase();
    var isCreative=ic.indexOf('新')>-1||ic.indexOf('定制')>-1||ic.indexOf('设计')>-1||ic.indexOf('模块化')>-1;
    var x=isCreative?0.55+Math.random()*0.30:0.15+Math.random()*0.30;
    var y=maxFreq>0?0.20+(u.freq/maxFreq)*0.60:0.5;
    pos[u.id]={x:Math.max(0.12,Math.min(0.88,x)),y:Math.max(0.18,Math.min(0.85,y))};
  });
  // 3. 象限统计
  var quad={NE:0,NW:0,SE:0,SW:0};
  LF_PORTRAITS.forEach(function(u){
    var p=pos[u.id]||{x:0.5,y:0.5};
    if(p.x>=0.5) p.y>=0.5?quad.NE++:quad.SE++; else p.y>=0.5?quad.NW++:quad.SW++;
  });
  var dominant=Object.keys(quad).sort(function(a,b){return quad[b]-quad[a];})[0];
  // 4. SVG 散点
  var W=540, H=340, P=70;
  var dots = LF_PORTRAITS.map(function(u){
    var p=pos[u.id]||{x:0.5,y:0.5};
    var cx=P+p.x*(W-2*P), cy=P+(1-p.y)*(H-2*P);
    var arch=LF_ARCH[u.archetype]||{color:'#94a3b8'};
    var r = 16 + Math.round((u.freq||0)*1.2);
    return '<g class="lf-pt" onclick="openLfModal(\''+u.id+'\',\'portrait\')" style="cursor:pointer">'+
      '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+arch.color+'" fill-opacity=".12" stroke="'+arch.color+'" stroke-width="1.5"/>'+
      '<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="14" font-weight="900">'+escHtml(u.avatar)+'</text>'+
      '<text x="'+cx+'" y="'+(cy+r+12)+'" text-anchor="middle" fill="'+arch.color+'" font-size="10" font-weight="800">'+(u.freq||0)+'%</text>'+
      '<title>'+escHtml(u.name)+' · '+(u.freq||0)+'%</title></g>';
  }).join('');
  // 5. 象限标签
  var qLabels = [
    {qx:1, qy:1, t:'创新×高频', s:'品牌级差异化', c:'#0891B2'},
    {qx:0, qy:1, t:'优化×高频', s:'体验升级', c:'#10B981'},
    {qx:1, qy:0, t:'创新×低频', s:'能力建设', c:'#A855F7'},
    {qx:0, qy:0, t:'优化×低频', s:'运营降本', c:'#F59E0B'}
  ];
  var qlHtml = qLabels.map(function(l){
    var cx = P + (l.qx>0.5?0.85:0.15) * (W-2*P);
    var cy = P + ((1-(l.qy>0.5?0.82:0.18)))*(H-2*P);
    return '<text x="'+cx+'" y="'+cy+'" text-anchor="'+(l.qx>0.5?'end':'start')+'" fill="'+l.c+'" font-size="11" font-weight="800" opacity=".8">'+escHtml(l.t)+'</text>'+
           '<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="'+(l.qx>0.5?'end':'start')+'" fill="var(--muted)" font-size="9" opacity=".7">'+escHtml(l.s)+'</text>';
  }).join('');
  // 6. 轴标签
  var axisHtml =
    '<line x1="'+P+'" y1="'+(H/2)+'" x2="'+(W-P)+'" y2="'+(H/2)+'" stroke="var(--ink-2)" stroke-width="1" opacity=".3"/>'+
    '<line x1="'+P+'" y1="'+P+'" x2="'+P+'" y2="'+(H-P)+'" stroke="var(--ink-2)" stroke-width="1" opacity=".3"/>'+
    '<text x="'+P+'" y="'+(H-12)+'" fill="var(--accent)" font-size="11" font-weight="800">产品优化升级</text>'+
    '<text x="'+(W-P)+'" y="'+(H-12)+'" text-anchor="end" fill="var(--accent)" font-size="11" font-weight="800">产品创意升级</text>'+
    '<text x="12" y="'+(P-8)+'" fill="var(--accent)" font-size="11" font-weight="800">低频·不易察觉</text>'+
    '<text x="12" y="'+(H-P+14)+'" fill="var(--accent)" font-size="11" font-weight="800">高频·明显感知</text>';
  // 7. Hero
  var hero = '<div class="lfq-hero"><div class="lfq-hl">领先用户四象限分布</div>'+
    '<div class="lfq-hs">基于「创意程度 × 出现频率」量化聚类 · 共 '+LF_PORTRAITS.length+' 位领先用户</div>'+
    '<div class="lfq-kpis">'+
      '<div class="lfq-kpi"><div class="lfq-kv" style="color:#0891B2">'+quad.NE+'</div><div class="lfq-kl">创新×高频</div></div>'+
      '<div class="lfq-kpi"><div class="lfq-kv" style="color:#10B981">'+quad.NW+'</div><div class="lfq-kl">优化×高频</div></div>'+
      '<div class="lfq-kpi"><div class="lfq-kv" style="color:#A855F7">'+quad.SE+'</div><div class="lfq-kl">创新×低频</div></div>'+
      '<div class="lfq-kpi"><div class="lfq-kv" style="color:#F59E0B">'+quad.SW+'</div><div class="lfq-kl">优化×低频</div></div>'+
    '</div></div>';
  // 8. SVG 整体
  var quadChart = '<div class="lfq-quad"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:560px;height:auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);display:block;margin:0 auto">'+
    // 4 象限背景
    '<rect x="'+P+'" y="'+P+'" width="'+(W/2-P)+'" height="'+(H/2-P)+'" fill="#10B981" fill-opacity=".04"/>'+
    '<rect x="'+(W/2)+'" y="'+P+'" width="'+(W/2-P)+'" height="'+(H/2-P)+'" fill="#0891B2" fill-opacity=".04"/>'+
    '<rect x="'+P+'" y="'+(H/2)+'" width="'+(W/2-P)+'" height="'+(H/2-P)+'" fill="#F59E0B" fill-opacity=".04"/>'+
    '<rect x="'+(W/2)+'" y="'+(H/2)+'" width="'+(W/2-P)+'" height="'+(H/2-P)+'" fill="#A855F7" fill-opacity=".04"/>'+
    // 中线
    '<line x1="'+(W/2)+'" y1="'+P+'" x2="'+(W/2)+'" y2="'+(H-P)+'" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 3"/>'+
    '<line x1="'+P+'" y1="'+(H/2)+'" x2="'+(W-P)+'" y2="'+(H/2)+'" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 3"/>'+
    // 轴标签 + 象限标签 + 散点
    axisHtml+qlHtml+dots+
    '</svg></div>';
  // 9. 结论卡
  var dominantName={NE:'创新×高频（品牌级差异化）',NW:'优化×高频（体验升级）',SE:'创新×低频（能力建设）',SW:'优化×低频（运营降本）'}[dominant];
  var recs=[
    {q:'NE',name:'创新 × 高频',tip:'用户已主动表达且频次高，是最值得投入的方向，量产+营销+大投入。',color:'#0891B2'},
    {q:'NW',name:'优化 × 高频',tip:'高频低门槛改进，做了立即有体感，性价比最高的优化。',color:'#10B981'},
    {q:'SE',name:'创新 × 低频',tip:'早期信号，可能定义下一代品类，需要技术验证与MVP测试。',color:'#A855F7'},
    {q:'SW',name:'优化 × 低频',tip:'长尾运营改进，可纳入长期 roadmap 批量优化。',color:'#F59E0B'}
  ];
  var recHtml=recs.map(function(r){
    var active=r.q===dominant;
    return '<div class="lfq-rec" style="--rc:'+r.color+';border-color:'+(active?r.color:'var(--border)')+';'+(active?'background:rgba(0,212,255,.04)':'')+'">'+
      '<div class="lfq-rh"><span class="lfq-rt" style="color:'+r.color+'">'+r.name+'</span>'+(active?'<span class="lfq-rm">当前主要</span>':'')+'</div>'+
      '<div class="lfq-rd">'+r.tip+'</div></div>';
  }).join('');
  var bottom='<div class="lfq-bottom"><div class="lfq-bh">结论与建议</div>'+
    '<div class="lfq-bs">主要分布：<b>'+dominantName+'</b> · 共 '+quad[dominant]+' 位用户 · 占比 '+Math.round(quad[dominant]/Math.max(1,LF_PORTRAITS.length)*100)+'%</div>'+

function renderLfFeedback(zone){
  if(!FEEDBACK_RAW.length) return '<div style="padding:14px;color:var(--muted);font-size:12px">暂无原始反馈数据</div>';
  var f = {purpose:zone.dataset.fbPurpose||'all', cluster:zone.dataset.fbCluster||'all', sort:zone.dataset.fbSort||'lead'};
  // 筛选栏：按目的聚类
  var purChips = ['all'].concat(LF_PURPOSES).map(function(p){
    var on = f.purpose===p;
    return '<button class="lf-chip'+(on?' on':'')+'" onclick="lfSetFilter(\'purpose\',\''+p+'\',this)">'+(p==='all'?'全部目的':escHtml(p))+'</button>';
  }).join('');
  // 筛选栏：按主题聚类
  var cluChips = ['all'].concat(LF_CLUSTERS).map(function(c){
    var on = f.cluster===c;
    return '<button class="lf-chip'+(on?' on':'')+'" onclick="lfSetFilter(\'cluster\',\''+c+'\',this)">'+(c==='all'?'全部主题':escHtml(c))+'</button>';
  }).join('');
  // 排序控件
  var sortChips = [['lead','超前性'],['creat','创意度'],['hitRate','命中率(低→高)']].map(function(s){
    var on=f.sort===s[0];
    return '<button class="lf-chip'+(on?' on':'')+'" onclick="lfSetFilter(\'sort\',\''+s[0]+'\',this)">'+s[1]+'</button>';
  }).join('');
  // 过滤 + 排序
  var rows = FEEDBACK_RAW.filter(function(r){
    return (f.purpose==='all'||r.purpose===f.purpose) && (f.cluster==='all'||r.cluster===f.cluster);
  });
  if(f.sort==='lead'||f.sort==='creat') rows.sort(function(a,b){ return lfScore(b[f.sort])-lfScore(a[f.sort]); });
  else rows.sort(function(a,b){ return parseFloat(a.hitRate)-(parseFloat(b.hitRate)) }); // 命中率低排前
  // 来源样式映射
  var srcMap={'voc-niche':'voc','interview':'interview'};
  // 渲染列表
  var listHtml = rows.map(function(r){
    var cls=srcMap[r.src]||'niche';
    return '<div class="rf-row" onclick="openLfModal(\''+r.id+'\',\'feedback\')" style="cursor:pointer">'+
      '<div class="rf-head">'+
        '<span class="rf-src '+cls+'">'+escHtml(r.srcLabel)+'</span>'+
        '<span class="rf-purpose">'+escHtml(r.purpose)+'</span>'+
        '<span class="rf-cluster">'+escHtml(r.cluster)+'</span>'+
      '</div>'+
      '<div class="rf-txt">'+escHtml(r.txt)+'</div>'+
      '<div class="rf-metrics">'+
        '<span class="rf-metric lead">超前性 <b class="'+lfDimClass(r.lead)+'">'+escHtml(r.lead)+'</b></span>'+
        '<span class="rf-metric creat">创意度 <b class="'+lfDimClass(r.creat)+'">'+escHtml(r.creat)+'</b></span>'+
        '<span class="rf-metric hit-low">VOC命中 '+escHtml(r.hitRate)+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
  return '<div class="fb-filter"><div class="fb-row"><span class="fb-label">按目的</span><div class="fb-chips">'+purChips+'</div></div>'+
    '<div class="fb-row"><span class="fb-label">按主题</span><div class="fb-chips">'+cluChips+'</div></div>'+

var EMOTION_DEFS = {

};

  {emo:'joy',         kws:['满意','喜欢','开心','高兴','赞','棒','好用','惊喜','幸福','值得','推荐','爱','完美','享受','舒服','顺手','惊艳','超出预期','心水']},

  {emo:'anticipation',kws:['期待','想买','种草','观望','下次','准备','打算','希望','计划','复购','再来']},

function emotionHasNeg(text, idx){
  if(idx < 1) return false;
  var seg = text.slice(Math.max(0, idx-3), idx);
  return /[不没无别非未否].{0,2}$/.test(seg);
}
function classifyEmotion(text){
  text = (text||'').toString();
  var found = {};
  EMOTION_RULES.forEach(function(rule){
    rule.kws.forEach(function(kw){
      var idx = text.indexOf(kw);
      while(idx >= 0){
        if(!emotionHasNeg(text, idx)){ found[rule.emo] = (found[rule.emo]||0)+1; }
        idx = text.indexOf(kw, idx+1);
      }
    });
  });
  var keys = Object.keys(found);
  if(!keys.length) return {emos:[], primary:'', allLabels:'', polarity:0, tone:'中性', color:'#94A3B8'};
  var score = 0;
  keys.forEach(function(k){ score += EMOTION_DEFS[k].polarity * found[k]; });
  var primary = keys.slice().sort(function(a,b){
    return (Math.abs(EMOTION_DEFS[b].polarity)*found[b]) - (Math.abs(EMOTION_DEFS[a].polarity)*found[a]);
  })[0];
  var tone = score > 0 ? '正面' : (score < 0 ? '负面' : '中性');
  var color = score > 0 ? '#10B981' : (score < 0 ? '#EF4444' : '#94A3B8');
  var labels = keys.map(function(k){ return EMOTION_DEFS[k].name; }).join('、');
  return {emos:keys, primary:EMOTION_DEFS[primary].name, allLabels:labels, polarity:score, tone:tone, color:color};
}
function hex2rgbaLocal(hex, a){
  hex=String(hex).replace('#','');
  if(hex.length===3) hex=hex.split('').map(function(x){return x+x;}).join('');
  var r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function corpusParseCSV(text){
  var rows=[], row=[], field='', i=0, inQ=false;
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<text.length){
    var c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue; }
      field+=c;i++;continue;
    }
    if(c==='"'){inQ=true;i++;continue;}
    if(c===','){row.push(field);field='';i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
    field+=c;i++;
  }
  if(field.length>0||row.length>0){row.push(field);rows.push(row);}
  return rows;
}
function corpusColumnStats(header, rows){
  return header.map(function(col,ci){
    var ne=0; rows.forEach(function(r){ if((r[ci]||'').trim()) ne++; });
    return {col:col, ci:ci, nonEmpty:ne, rate: rows.length? ne/rows.length:0};
  });
}
function corpusDetectCols(stats){
  var cands=['内容','评论','评价','正文','评论内容','review','content','text','comment'];
  var found=[];
  cands.forEach(function(c){
    var s=stats.find(function(x){return x.col.toLowerCase()===c.toLowerCase() && x.nonEmpty>0;});
    if(s) found.push(s.col);
  });
  if(!found.length){
    var wc=stats.filter(function(x){return x.nonEmpty>0;});
    if(wc.length) found.push(wc.sort(function(a,b){return b.rate-a.rate;})[0].col);
  }
  return found;
}

function runCorpusAnalysis(){
  var data=[];
  if(CORPUS_CSV.mode){
    if(!CORPUS_CSV.selected.length){ toast('请至少选择一个文本列'); return; }
    var cis=CORPUS_CSV.selected.map(function(c){return CORPUS_CSV.header.indexOf(c);}).filter(function(i){return i>=0;});
    if(!cis.length){ toast('未找到选中的文本列'); return; }
    CORPUS_CSV.rows.forEach(function(r,ri){
      var text=cis.map(function(ci){return (r[ci]||'').trim();}).filter(Boolean).join('\n');
      data.push({text:text, cells:r});
    });
  } else {
    var ta=$('#corpusInput'); if(!ta){return;}
    ta.value.split('\n').map(function(x){return x.trim();}).filter(Boolean).forEach(function(t){ data.push({text:t, cells:null}); });
    if(!data.length){ toast('请先粘贴用户语料'); return; }
  }
  var valid = data.filter(function(d){return d.text;});
  if(!valid.length){ toast('没有可分析的语料内容'); return; }

  var tagCount={}, emoCount={}, posLines=0, negLines=0;
  data.forEach(function(d){
    if(!d.text){ d.tags=[]; d.emo=classifyEmotion(''); return; }
    var tags=[];
    VOC_RULES.forEach(function(rule){
      var m=false;
      rule.patterns.forEach(function(p){ if(p.test(d.text)) m=true; });
      if(m && rule.negPatterns && rule.negPatterns.length){
        rule.negPatterns.forEach(function(np){ if(np.test(d.text)) m=false; });
      }
      if(m){ tags.push(rule.tag); tagCount[rule.tag]=(tagCount[rule.tag]||0)+1; }
    });
    var emo=classifyEmotion(d.text);
    d.tags=tags; d.emo=emo;
    if(emo.tone==='正面') posLines++;
    else if(emo.tone==='负面') negLines++;
    emo.allLabels.split('、').forEach(function(l){ if(l) emoCount[l]=(emoCount[l]||0)+1; });
  });
  var total=valid.length;
  var negPct=total?Math.round(negLines/total*100):0;
  var posPct=total?Math.round(posLines/total*100):0;
  var neuPct=total?100-posPct-negPct:0;
  CORPUS_LAST={data:data, total:total, posLines:posLines, negLines:negLines, tagCount:tagCount, emoCount:emoCount};

  var topTags=Object.keys(tagCount).sort(function(a,b){return tagCount[b]-tagCount[a];}).slice(0,5);
  var tagBars=topTags.map(function(t){
    var pct=Math.round(tagCount[t]/total*100);
    return '<div class="rep-bar-row"><span class="rbl">'+escHtml(t)+'</span><span class="rb-track"><span class="rb-fill" style="width:'+pct+'%"></span></span><span class="rbv">'+tagCount[t]+'</span></div>';
  }).join('') || '<div class="rep-note">未命中任何维度标签。</div>';

  var emoRows=EMOTION_ORDER.map(function(k){
    var c=emoCount[EMOTION_DEFS[k].name]||0;
    var pct=total?Math.round(c/total*100):0;
    return '<div class="emo-row"><span class="emo-name">'+EMOTION_DEFS[k].name+'</span>'+
      '<span class="emo-track"><span class="emo-fill" style="width:'+pct+'%;background:'+EMOTION_DEFS[k].color+'"></span></span>'+
      '<span class="emo-val">'+c+'</span></div>';
  }).join('');

  var perLine=data.map(function(d){
    if(!d.text) return '';
    var tagEls=d.tags.length?d.tags.map(function(t){return '<span class="tp-tag">'+escHtml(t)+'</span>';}).join(''):'<span class="cl-none">无匹配</span>';
    var emo=d.emo;
    var emoBg=hex2rgbaLocal(emo.color,.12);
    var emoEls=emo.allLabels
      ? ('<span class="emo-tag" style="color:'+emo.color+';border-color:'+emo.color+';background:'+emoBg+'">'+escHtml(emo.allLabels)+'</span>'+
         '<span class="emo-tag" style="color:'+emo.color+';border-color:'+emo.color+';background:'+emoBg+'">'+emo.tone+'</span>')
      : '<span class="emo-tag" style="color:#94A3B8;border-color:#94A3B8;background:rgba(148,163,184,.12)">中性</span>';
    return '<div class="cl-row"><span class="cl-txt">'+escHtml(d.text)+'</span>'+
      '<span class="cl-tags">'+tagEls+emoEls+'</span></div>';
  }).join('');

  $('#corpusResult').innerHTML=
    '<div class="rep-title">语料综合分析 · 情绪维度</div>'+
    '<div class="emo-summary">'+
      '<span class="emo-pill" style="background:#10B981">正面 '+posPct+'%</span>'+
      '<span class="emo-pill" style="background:#94A3B8">中性 '+neuPct+'%</span>'+
      '<span class="emo-pill" style="background:#EF4444">负面 '+negPct+'%</span>'+
    '</div>'+
    '<div class="rep-grid">'+
      '<div class="rep-kpi"><b>'+total+'</b><span>语料条数</span></div>'+
      '<div class="rep-kpi"><b>'+posPct+'%</b><span>正面情绪</span></div>'+
      '<div class="rep-kpi"><b>'+negPct+'%</b><span>负面情绪</span></div>'+
      '<div class="rep-kpi"><b>'+topTags.length+'</b><span>命中维度</span></div>'+
    '</div>'+
    '<div class="rep-section"><div class="rep-h">情绪分布（Plutchik 八情绪）</div><div class="emo-dist">'+emoRows+'</div></div>'+
    '<div class="rep-section"><div class="rep-h">维度标签频率 TOP5</div>'+tagBars+'</div>'+
    '<div class="rep-section"><div class="rep-h">逐行明细（维度标签 + 情绪）</div>'+perLine+'</div>'+
    '<button class="export-ai" style="margin-top:6px" onclick="exportCorpusCSV()">导出分析结果 CSV</button>';
}
function exportCorpusCSV(){
  if(!CORPUS_LAST){ toast('请先分析语料'); return; }
  var L=CORPUS_LAST, rows=[];
  if(CORPUS_CSV.mode && CORPUS_CSV.header.length){
    rows.push(['原始行号'].concat(CORPUS_CSV.header, ['情绪','情绪极性','维度标签']).map(csvCell).join(','));
    L.data.forEach(function(d,ri){
      var cells=(d.cells||[]).map(csvCell);
      var line=[ri+1].concat(cells, [csvCell(d.emo?d.emo.allLabels:''), csvCell(d.emo?d.emo.tone:''), csvCell(d.tags.join('、'))]).map(csvCell);
      rows.push(line.join(','));
    });
  } else {
    rows.push(['原评价','情绪','情绪极性','维度标签'].map(csvCell).join(','));
    L.data.forEach(function(d){
      if(!d.text) return;
      rows.push([csvCell(d.text), csvCell(d.emo?d.emo.allLabels:''), csvCell(d.emo?d.emo.tone:''), csvCell(d.tags.join('、'))].map(csvCell).join(','));
    });
  }
  var csv='﻿'+rows.join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='语料情绪分析结果.csv';
  document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },200);
}

function suggestCrossSources(p){
  var bound=p.sources;
  var boundMarkets={};
  bound.forEach(function(sid){var s=DATA.sources[sid];if(s)(s.market||'').split('/').forEach(function(m){boundMarkets[m]=1});});
  // 跨目的出现频次
  var freq={};
  Object.keys(DATA.workspaces).forEach(function(wk){
    DATA.workspaces[wk].purposes.forEach(function(pp){
      pp.sources.forEach(function(sid){if(bound.indexOf(sid)<0)freq[sid]=(freq[sid]||0)+1;});
    });
  });
  var cands=Object.keys(DATA.sources).filter(function(sid){return bound.indexOf(sid)<0;});
  cands.sort(function(a,b){
    var sa=0,sb=0;
    var ma=(DATA.sources[a].market||'').split('/');var mb=(DATA.sources[b].market||'').split('/');
    ma.forEach(function(m){if(boundMarkets[m])sa+=2;});mb.forEach(function(m){if(boundMarkets[m])sb+=2;});
    sa+=(freq[a]||0);sb+=(freq[b]||0);
    return sb-sa;
  });
  return cands.slice(0,3);
}
