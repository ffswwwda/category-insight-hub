<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>用户反馈信息合集 · 看板</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:rgba(255,255,255,.72); --panel-2:rgba(255,255,255,.5); --border:rgba(0,0,0,.08);
    --ink:#2b2f33; --ink-2:#5b6470; --muted:#8b94a3; --line:rgba(0,0,0,.05);
    --accent:#00C3F3; --accent-weak:#E6F7FC; --accent-2:#a855f7;
    --rad-grad:linear-gradient(135deg,#00d4ff 0%,#a855f7 50%,#ff6b9d 100%);
    --warn:#e8833a; --ok:#1f9d6b; --danger:#e05656; --star:#f5a623;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 6px 20px rgba(0,0,0,.05);
    --glass-blur:blur(14px);
    --radius:14px; --radius-sm:10px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  body.dark{
    --bg:#0a0e1a; --panel:rgba(20,28,48,.6); --panel-2:rgba(30,40,66,.45); --border:rgba(255,255,255,.1);
    --ink:#e6ebf5; --ink-2:#aab4c8; --muted:#8893a8; --line:rgba(255,255,255,.08);
    --accent-weak:rgba(0,195,243,.14);
    --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.4);
    background-image:
      radial-gradient(circle at 18% 82%, rgba(0,195,243,.14) 0%, transparent 45%),
      radial-gradient(circle at 82% 18%, rgba(168,85,247,.12) 0%, transparent 45%),
      radial-gradient(circle at 55% 55%, rgba(219,179,96,.06) 0%, transparent 60%),
      linear-gradient(rgba(0,195,243,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,195,243,.06) 1px,transparent 1px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{margin:0;background-color:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 18% 82%, rgba(0,195,243,.08) 0%, transparent 45%),
      radial-gradient(circle at 82% 18%, rgba(168,85,247,.07) 0%, transparent 45%),
      radial-gradient(circle at 55% 55%, rgba(219,179,96,.04) 0%, transparent 60%),
      linear-gradient(rgba(0,195,243,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,195,243,.04) 1px,transparent 1px);
    background-size:auto,auto,auto,60px 60px,60px 60px;background-attachment:fixed}
  .ic-svg{width:18px;height:18px;flex:none}

  .app{display:flex;height:100vh;overflow:hidden}

  .sidebar{width:264px;flex:0 0 264px;background:rgba(255,255,255,.74);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-right:1px solid var(--border);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  body.dark .sidebar{background:rgba(20,28,48,.6)}
  .brand{display:flex;gap:11px;align-items:center;padding:18px 18px 14px;position:sticky;top:0;background:inherit;z-index:2}
  .brand-mark{width:36px;height:36px;border-radius:10px;background:var(--rad-grad);color:#fff;display:grid;place-items:center;box-shadow:0 6px 18px rgba(0,195,243,.32)}
  .brand-name{font-weight:700;font-size:15px;letter-spacing:.2px}
  .brand-sub{font-size:11px;color:var(--muted);letter-spacing:.6px;margin-top:1px}
  .side-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding:6px 18px 8px}
  .src-card{margin:8px 14px;background:var(--panel-2);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;display:flex;align-items:center;gap:11px}
  .src-card:hover{border-color:rgba(0,195,243,.35)}
  .src-card.active{border-color:var(--accent);background:var(--accent-weak);box-shadow:0 0 0 1px rgba(0,195,243,.15)}
  .src-card .ic-box{width:32px;height:32px;border-radius:9px;background:var(--rad-grad);display:grid;place-items:center;flex:none}
  .src-card .ic-box .ic-svg{color:#fff;width:17px;height:17px}
  .src-card .sc-name{font-size:13.5px;font-weight:700;line-height:1.35}
  .src-card .sc-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .sidebar-foot{margin-top:auto;padding:13px 16px 16px;border-top:1px solid var(--border);font-size:11.5px;color:var(--muted);line-height:1.5}

  /* ===== 视图图层（与 de-dashboard 完全一致） ===== */
  .view-layers{margin:10px 14px 4px;border:1px solid var(--border);border-radius:12px;background:var(--panel-2);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);overflow:hidden}
  .vl-head{display:flex;align-items:center;gap:7px;padding:10px 13px;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border);user-select:none;cursor:pointer}
  .vl-head .ic-svg{width:15px;height:15px;stroke:var(--accent)}
  .vl-count{background:var(--accent-weak);color:var(--accent);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;margin-left:2px}
  .vl-head .vl-toggle{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:0;border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;transition:.15s;flex-shrink:0}
  .vl-head .vl-toggle:hover{background:var(--accent-weak);color:var(--accent)}
  .vl-head .vl-toggle svg{width:15px;height:15px;transition:transform .2s}
  .view-layers.collapsed .vl-list{display:none}
  .view-layers.collapsed .vl-head{border-bottom:0}
  .view-layers.collapsed .vl-toggle svg{transform:rotate(180deg)}
  .view-layers.collapsed + .vl-batch{display:none}
  .vl-list{padding:8px;display:flex;flex-direction:column;gap:6px;max-height:300px;overflow:auto}
  .vl-empty{font-size:11.5px;color:var(--muted);text-align:center;padding:14px 8px;line-height:1.7}
  .vl-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;border:1px solid transparent;cursor:pointer;transition:all .15s;background:var(--panel);user-select:none;pointer-events:auto}
  .vl-item:hover{border-color:rgba(0,195,243,.3);background:rgba(0,195,243,.05)}
  .vl-item.active{border-color:var(--accent);background:var(--accent-weak);box-shadow:0 0 0 1px rgba(0,195,243,.15)}
  .vl-item .vl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--rad-grad)}
  .vl-item .vl-name{flex:1;font-size:11.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vl-item .vl-board{font-size:9px;color:var(--accent-2);background:rgba(168,85,247,.12);padding:1px 6px;border-radius:6px;flex-shrink:0;font-weight:700}
  .vl-item .vl-meta{font-size:9.5px;color:var(--muted);flex-shrink:0}
  .vl-item .vl-del{opacity:0;font-size:13px;color:var(--muted);cursor:pointer;flex-shrink:0;padding:2px 4px;border-radius:4px;transition:all .12s;pointer-events:auto}
  .vl-item:hover .vl-del{opacity:.6}
  .vl-item .vl-del:hover{opacity:1;color:var(--danger)}
  .vl-item.selected{background:var(--accent-weak);border-color:#c9b8f0}
  .vl-check{width:15px;height:15px;flex:0 0 15px;margin:0 2px 0 0;cursor:pointer;accent-color:#7c3aed}
  .vl-batch{margin:0 14px 14px;border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--panel-2);position:sticky;bottom:0;display:flex;flex-direction:column;gap:9px}
  .vl-batch-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .vl-batch-info{font-size:12px;color:var(--ink-2)}
  .vl-batch-info b{color:var(--accent)}
  .vl-batch-cancel{background:transparent;border:0;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;padding:3px 8px;border-radius:6px;transition:.15s}
  .vl-batch-cancel:hover{color:var(--ink-2);background:var(--panel)}
  .vl-batch-primary{width:100%;border:0;background:var(--rad-grad);color:#fff;padding:9px 12px;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:0 2px 10px rgba(0,195,243,.2);transition:.15s}
  .vl-batch-primary:hover{box-shadow:0 3px 14px rgba(0,195,243,.32)}
  .vl-batch-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .vl-batch-row button{border:1px solid var(--border);background:var(--panel);color:var(--ink-2);padding:8px 10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
  .vl-batch-row button:hover{border-color:var(--accent);color:var(--accent)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;gap:0}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.72);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    border-bottom:1px solid var(--border);padding:16px 26px;display:flex;align-items:center;gap:18px;flex-shrink:0}
  body.dark .topbar{background:rgba(20,28,48,.6)}
  .topbar-left{display:flex;flex-direction:column;min-width:0}
  .topbar-titlerow{display:flex;align-items:center;gap:13px}
  .back-btn{appearance:none;border:1px solid var(--border);background:var(--panel);color:var(--ink-2);font-family:var(--font);font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer;transition:background .15s,border-color .15s,color .15s;white-space:nowrap}
  .back-btn:hover{background:var(--accent-weak);border-color:var(--accent);color:var(--accent)}
  .board-title{margin:0;font-size:18px;font-weight:700;letter-spacing:.2px}
  .board-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .search-box{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 12px;width:300px}
  .search-box input{border:0;outline:0;background:transparent;font-size:13px;width:100%;color:var(--ink);font-family:var(--font)}
  .search-box .ico{color:var(--accent);display:flex}
  .search-box .ico .ic-svg{stroke:var(--accent)}
  .save-view-btn{display:inline-flex;align-items:center;border:1px solid var(--border);background:var(--panel);color:var(--ink-2);font-family:var(--font);font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap}
  .save-view-btn:hover{background:var(--accent-weak);border-color:var(--accent);color:var(--accent)}

  .filterbar{background:var(--panel);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-bottom:1px solid var(--border);padding:12px 26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:68px;z-index:19}
  body.dark .filterbar{background:rgba(20,28,48,.7)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--panel-2);border-radius:20px;padding:6px 13px;font-size:12.5px;cursor:pointer;color:var(--ink-2);transition:.15s;user-select:none}
  .chip:hover{border-color:#c4cad3}
  .chip.on{background:var(--rad-grad);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(0,195,243,.3)}
  .chip .ic-svg{stroke:currentColor}
  .chip .c-n{opacity:.7;font-size:11px}
  .chip.drill{background:rgba(168,85,247,.14);border-color:#c9b8f0;color:#7c3aed}
  .chip.drill .ic-svg{stroke:#7c3aed}
  .fsel{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-2)}
  .fsel select{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12.5px;font-family:var(--font);background:var(--panel);color:var(--ink);outline:0;cursor:pointer}
  .fsel .lbl{color:var(--muted)}
  .fsel.cls{margin-left:auto}

  .board{flex:1;padding:18px 26px 60px;overflow:auto}
  .countline{font-size:13px;color:var(--ink-2);margin:0 2px 14px}
  .countline b{color:var(--accent);font-size:15px;font-weight:700}

  .sumrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .sumcard{background:var(--panel);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .sumcard .sv{font-size:24px;font-weight:800;background:var(--rad-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
  .sumcard .sl{font-size:12px;color:var(--muted);margin-top:4px}

  .vizrow{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
  .viz{background:var(--panel);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .viz-title{font-size:12px;font-weight:800;color:var(--ink-2);letter-spacing:.3px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .viz-title .ic-svg{width:14px;height:14px;stroke:var(--accent-2)}
  .barchart{display:flex;flex-direction:column;gap:9px}
  .bar{display:grid;grid-template-columns:84px 1fr 56px;align-items:center;gap:10px}
  .bar-label{font-size:12px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{height:9px;border-radius:5px;background:var(--panel-2);overflow:hidden}
  .bar-fill{height:100%;border-radius:5px;background:var(--rad-grad);transition:width .4s}
  .bar-val{font-size:11.5px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}

  .cluster-sec{margin-bottom:16px}
  .cluster-head{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:800;color:var(--ink);margin-bottom:11px}
  .cluster-head .ic-svg{width:16px;height:16px;stroke:var(--accent)}
  .cluster-head .ch-sub{font-size:11.5px;font-weight:600;color:var(--muted);margin-left:4px}
  .cgroup{background:var(--panel);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:12px;padding:12px 15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
  .cgroup:hover{border-color:rgba(0,195,243,.35)}
  .cgroup.active{border-color:var(--accent);background:var(--accent-weak)}
  .cgroup-top{display:flex;align-items:center;gap:10px}
  .cgroup-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
  .cgroup-name .dot{width:9px;height:9px;border-radius:50%;background:var(--rad-grad);flex:none}
  .cgroup-meta{font-size:11.5px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .cgroup-meta b{color:var(--accent);font-size:13px}
  .cgroup-track{height:7px;border-radius:4px;background:var(--panel-2);overflow:hidden;margin-top:9px}
  .cgroup-fill{height:100%;border-radius:4px;background:var(--rad-grad)}
  .cgroup-docs{margin-top:10px;display:none;flex-direction:column;gap:5px}
  .cgroup.open .cgroup-docs{display:flex}
  .cgroup-docs .cd{font-size:12px;color:var(--ink-2);padding:5px 10px;background:var(--panel-2);border-radius:7px;border:1px solid var(--border)}
  .cgroup-docs .cd:hover{border-color:var(--accent);color:var(--accent)}

  .doc{background:var(--panel);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px 15px 20px;margin-bottom:12px;cursor:pointer;box-shadow:var(--shadow);transition:.18s;position:relative;overflow:hidden}
  .doc::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--rad-grad)}
  .doc:hover{border-color:rgba(0,195,243,.4);box-shadow:0 4px 10px rgba(20,30,50,.05),0 14px 34px rgba(0,195,243,.14)}
  .doc .dhead{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .doc .dtype{width:28px;height:28px;border-radius:8px;background:var(--panel-2);border:1px solid var(--border);display:grid;place-items:center;flex:none}
  .doc .dtype .ic-svg{stroke:var(--accent-2);width:15px;height:15px}
  .doc h3{font-size:15px;margin:0;flex:1;line-height:1.4}
  .doc .meta{font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 8px;padding-left:38px}
  .doc .meta b{color:var(--ink-2);font-weight:600}
  .doc .snip{font-size:13px;color:var(--ink-2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;padding-left:38px}
  .doc .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-left:38px}
  .doc .tag{font-size:11.5px;color:#7c3aed;background:rgba(168,85,247,.10);padding:3px 9px;border-radius:9px}
  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty .e-ico{width:54px;height:54px;margin:0 auto 16px;border-radius:16px;background:var(--accent-weak);display:grid;place-items:center}
  .empty .e-ico .ic-svg{stroke:var(--accent);width:26px;height:26px}
  .empty code{background:var(--line);padding:2px 7px;border-radius:6px;font-size:12px;color:var(--ink-2);font-family:var(--mono)}

  .mask{position:fixed;inset:0;background:rgba(10,14,26,.42);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:60;padding:24px}
  .mask.on{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:880px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 24px 70px rgba(10,14,26,.3)}
  body.dark .modal{background:#121829}
  .modal .mhead{position:sticky;top:0;background:#fff;padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;z-index:2}
  body.dark .modal .mhead{background:#121829}
  .modal .mhead .dtype{width:34px;height:34px;border-radius:10px;background:var(--panel-2);border:1px solid var(--border);display:grid;place-items:center;flex:none}
  .modal .mhead .dtype .ic-svg{stroke:var(--accent-2);width:18px;height:18px}
  .modal .mhead h2{font-size:17px;margin:0;flex:1;line-height:1.4}
  .modal .mhead .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;border:none;background:none}
  .modal .mmeta{display:flex;gap:20px;flex-wrap:wrap;padding:16px 22px 0;font-size:12.5px;color:var(--muted)}
  .modal .mmeta b{color:var(--ink-2);font-weight:600}
  .modal .msectitle{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;padding:18px 22px 6px}
  .modal .cols{display:flex;gap:6px;flex-wrap:wrap;padding:0 22px}
  .modal .cols .tag{font-size:11.5px;color:var(--accent-2);background:var(--accent-weak);padding:3px 9px;border-radius:9px}
  .modal .samp-wrap{padding:8px 22px 10px;overflow-x:auto}
  .modal table.samp{border-collapse:collapse;font-size:12px;min-width:100%}
  .modal table.samp th,.modal table.samp td{border:1px solid var(--border);padding:6px 9px;text-align:left;vertical-align:top;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
  .modal table.samp th{background:var(--accent-weak);color:var(--ink-2);font-weight:700;position:sticky;top:0}
  .modal table.samp td{color:var(--ink-2)}
  .modal .samp-note{font-size:11.5px;color:var(--muted);padding:2px 22px 4px}
  .modal .rate{display:flex;gap:8px;flex-wrap:wrap;padding:4px 22px 22px}
  .modal .rate .rbar{display:flex;flex-direction:column;gap:3px;min-width:54px}
  .modal .rate .rbar .rt{font-size:11px;color:var(--muted)}
  .modal .rate .rbar .rt b{color:var(--star)}
  .modal .rate .rbar .rtrack{height:5px;border-radius:3px;background:var(--panel-2);overflow:hidden}
  .modal .rate .rbar .rfill{height:100%;border-radius:3px;background:var(--rad-grad)}
  @media(max-width:760px){.sidebar{display:none}.search-box{width:160px}.sumrow{grid-template-columns:repeat(2,1fr)}.vizrow{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ===== 主站标准 SVG 图标 sprite（三色渐变 #uiGrad · 绝不用 emoji） ===== -->
<svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <defs>
    <linearGradient id="uiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/><stop offset="50%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>

/* ===== 派生维度 ===== */
function yearOf(d){
  const m=(d.period||'').match(/(\d{2})\./);
  return m ? ('20'+m[1]) : '未知';
}
function scaleBand(d){
  const r=d.rows||0;
  if(r<1000) return '小规模 (<1k)';
  if(r<5000) return '中规模 (1k-5k)';
  return '大规模 (>5k)';
}
function dominantAiLabel(d){
  if(d.board!=='邮件原文') return null;
  const idx=(d.cols||[]).indexOf('ai_label_raw');
  if(idx<0) return null;
  const cnt={};
  (d.sample||[]).forEach(r=>{const v=r[idx]; if(v!=null && String(v).trim()){const s=String(v).trim(); cnt[s]=(cnt[s]||0)+1;}});
  let best=null, bn=0;
  Object.keys(cnt).forEach(k=>{ if(cnt[k]>bn){bn=cnt[k];best=k;} });
  return best || '未标注';
}
function ratingBand(d){
  if(d.board!=='用户评论与留言' || !d.ratingHist) return null;
  const ks=Object.keys(d.ratingHist); if(!ks.length) return '未评分';
  let sum=0,n=0;
  ks.forEach(k=>{ const v=parseFloat(k); sum+=v*(d.ratingHist[k]||0); n+=d.ratingHist[k]; });
  const avg=n?sum/n:0;
  if(avg<2.5) return '低分 (1-2.5★)';
  if(avg<3.5) return '中分 (2.5-3.5★)';
  return '高分 (>3.5★)';
}
function dimValue(d, dim){
  switch(dim){
    case 'board': return d.board;
    case 'source': return (d.source&&d.source.trim())?d.source.trim():'未标注';
    case 'market': return (d.market&&d.market.trim())?d.market.trim():'未标注';
    case 'year': return yearOf(d);
    case 'scale': return scaleBand(d);
    case 'ailabel': return dominantAiLabel(d);
    case 'rating': return ratingBand(d);
  }
  return null;
}
const DIM_LABELS = {board:'子看板',source:'来源',market:'市场',year:'年份',scale:'记录规模',ailabel:'AI意图分类',rating:'评分档位'};
function dimLabel(d){ return DIM_LABELS[d]||d; }

function availDims(){
  const base=['source','market','year','scale'];
  if(activeBoard==='全部') base.unshift('board');
  if(activeBoard==='邮件原文' || activeBoard==='全部') base.push('ailabel');
  if(activeBoard==='用户评论与留言' || activeBoard==='全部') base.push('rating');
  return base;
}

/* ===== 筛选 ===== */
function filt(){
  const q=state.filters.q.trim().toLowerCase();
  const fs=state.filters.src, fm=state.filters.mkt, fy=state.filters.year;
  return FEEDBACK_DOCS.filter(d=>{
    if(activeBoard!=='全部' && d.board!==activeBoard) return false;
    if(fs && (d.source||'')!==fs) return false;
    if(fm && (d.market||'')!==fm) return false;
    if(fy && yearOf(d)!==fy) return false;
    if(state.drill){
      const dv = dimValue(d, state.drill.dim);
      if(dv!==state.drill.val) return false;
    }
    if(q){
      const hay=(d.file+' '+(d.source||'')+' '+(d.market||'')+' '+(d.period||'')+' '+d.cols.join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ===== 可视化（条形图） ===== */
function barChart(pairs){
  if(!pairs.length) return '<div class="vl-empty">无数据</div>';
  const max=Math.max(...pairs.map(p=>p.value),1);
  return '<div class="barchart">'+pairs.map(p=>{
    const pct=Math.round(p.value/max*100);
    return `<div class="bar"><div class="bar-label" title="${esc(p.label)}">${esc(p.label)}</div>`+
      `<div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`+
      `<div class="bar-val">${p.value.toLocaleString()}${p.suffix||''}</div></div>`;
  }).join('')+'</div>';
}
function groupCount(docs, dim){
  const m={};
  docs.forEach(d=>{ const v=dimValue(d,dim); const k=v==null?'未标注':v; m[k]=(m[k]||0)+1; });
  return Object.keys(m).map(k=>({label:k,value:m[k]})).sort((a,b)=>b.value-a.value);
}
function renderViz(docs){
  const cards=[];
  cards.push(vizCard('i-bar','按来源分布', barChart(groupCount(docs,'source').map(p=>({label:p.label,value:p.value,suffix:'篇'})))));
  cards.push(vizCard('i-bar','按市场分布', barChart(groupCount(docs,'market').map(p=>({label:p.label,value:p.value,suffix:'篇'})))));
  cards.push(vizCard('i-clock','按年份分布', barChart(groupCount(docs,'year').map(p=>({label:p.label,value:p.value,suffix:'篇'})))));
  cards.push(vizCard('i-pie','按记录规模分布', barChart(groupCount(docs,'scale').map(p=>({label:p.label,value:p.value,suffix:'篇'})))));
  return cards.join('');
}
function vizCard(icon,title,body){
  return `<div class="viz"><div class="viz-title"><svg class="ic-svg"><use href="#${icon}"/></svg>${title}</div>${body}</div>`;
}

/* ===== 聚类区块 ===== */
function renderCluster(docs){
  const dim=state.clusterDim;
  const groups={};
  docs.forEach(d=>{
    const v=dimValue(d,dim); const k=v==null?'未标注':v;
    (groups[k]=groups[k]||[]).push(d);
  });
  const keys=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);
  const maxDocs=Math.max(...keys.map(k=>groups[k].length),1);
  const totalRows=keys.reduce((a,k)=>a+groups[k].reduce((x,d)=>x+(d.rows||0),0),0);
  const head=`<div class="cluster-head"><svg class="ic-svg"><use href="#i-tag"/></svg>聚类结果`+
    `<span class="ch-sub">按「${dimLabel(dim)}」分为 ${keys.length} 组 · 共 ${docs.length} 篇 / ${totalRows.toLocaleString()} 条记录 · 点击分组展开文档，再点一次收起</span></div>`;
  const body=keys.map(k=>{
    const arr=groups[k];
    const rows=arr.reduce((x,d)=>x+(d.rows||0),0);
    const w=Math.round(arr.length/maxDocs*100);
    const active=(state.drill && state.drill.dim===dim && state.drill.val===k)?' active':'';
    const docsHtml=arr.map(d=>`<div class="cd" onclick="event.stopPropagation();openDetailAt('${esc(d.file)}')">${esc(d.title)} <span style="opacity:.6">· ${(d.rows||0).toLocaleString()}条</span></div>`).join('');
    return `<div class="cgroup${active}" onclick="toggleGroup('${esc(dim)}','${esc(k)}')">`+
      `<div class="cgroup-top"><div class="cgroup-name"><span class="dot"></span>${esc(k)}</div>`+
      `<div class="cgroup-meta"><b>${arr.length}</b> 篇 · ${(rows).toLocaleString()} 条</div></div>`+
      `<div class="cgroup-track"><div class="cgroup-fill" style="width:${w}%"></div></div>`+
      `<div class="cgroup-docs">${docsHtml}</div></div>`;
  }).join('');
  return `<div class="cluster-sec">${head}${body}</div>`;
}
function toggleGroup(dim,val){
  if(state.drill && state.drill.dim===dim && state.drill.val===val){ state.drill=null; }
  else { state.drill={dim,val}; }
  render();
}

/* ===== 渲染主区 ===== */
function snippetOf(d){
  const cols=d.cols||[];
  const idx=cols.findIndex(c=>/描述|内容|反馈|投诉点|要求|文字/.test(c));
  const s=d.sample||[];
  if(idx>=0 && s[0] && s[0][idx]!=null && String(s[0][idx]).trim()) return String(s[0][idx]).replace(/\s+/g,' ');
  for(const r of s){ const t=r.filter(c=>c!=null && String(c).trim()).slice(0,2).join(' · '); if(t) return t; }
  return '';
}
function render(){
  state.filters.q=document.getElementById('q').value;
  state.filters.src=document.getElementById('fSrc').value;
  state.filters.mkt=document.getElementById('fMkt').value;
  state.filters.year=document.getElementById('fYear').value;

  const docs=filt();
  document.getElementById('boardTitle').textContent = activeBoard==='全部'?'用户反馈信息合集':activeBoard;
  document.getElementById('boardSub').textContent = activeBoard==='全部'
    ? '客诉 / 评论留言 / 邮件原文 · 统一检索与聚类'
    : BOARDS.find(b=>b.id===activeBoard).sub+' · 聚类与可视化';

  const el=document.getElementById('board');
  if(!document.getElementById('countline')){
    el.insertAdjacentHTML('beforebegin','<div class="countline" id="countline"></div>');
  }
  const qt=state.filters.q;
  const totalRows=docs.reduce((a,d)=>a+(d.rows||0),0);
  document.getElementById('countline').innerHTML =
    '共 <b>'+docs.length+'</b> 个文档'+(activeBoard!=='全部'?' · '+esc(activeBoard):'')+
    ' · 含 <b>'+totalRows.toLocaleString()+'</b> 条记录'+(qt?' · 关键词「'+esc(qt)+'」':'')+
    (state.drill?' · 聚类下钻：'+esc(state.drill.val):'');

  if(docs.length===0){
    el.innerHTML = `<div class="empty"><div class="e-ico"><svg class="ic-svg"><use href="#i-doc"/></svg></div>
      <div style="font-size:15px;color:var(--ink-2);margin-bottom:6px">没有匹配的文档</div>
      <div>调整关键词、子看板或来源/市场/年份筛选再试。</div></div>`;
    return;
  }
  const srcN=new Set(docs.map(d=>d.source).filter(Boolean)).size;
  const mktN=new Set(docs.map(d=>d.market).filter(Boolean)).size;
  const sum=`<div class="sumrow">
    <div class="sumcard"><div class="sv">${docs.length}</div><div class="sl">文档数</div></div>
    <div class="sumcard"><div class="sv">${totalRows.toLocaleString()}</div><div class="sl">总记录数</div></div>
    <div class="sumcard"><div class="sv">${srcN}</div><div class="sl">来源数</div></div>
    <div class="sumcard"><div class="sv">${mktN}</div><div class="sl">市场数</div></div>
  </div>`;
  const viz=`<div class="vizrow">${renderViz(docs)}</div>`;
  const cluster=renderCluster(docs);
  const list=docs.map((d,i)=>{
    const snip=snippetOf(d).slice(0,150);
    const tags=[];
    if(d.source) tags.push(d.source);
    if(d.market) tags.push(d.market);
    if(d.period) tags.push(d.period);
    const tagHtml=tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    return `<div class="doc" onclick="openDetail(${i})">
      <div class="dhead"><div class="dtype"><svg class="ic-svg"><use href="#${boardIcon(d.board)}"/></svg></div>
        <h3>${esc(d.title)}</h3></div>
      <div class="meta">
        <span><b>行数</b> ${(d.rows||0).toLocaleString()}</span>
        <span><b>字段</b> ${d.colCount||0}</span>
        <span><b>来源</b> ${esc(d.source||'—')}</span>
        <span><b>市场</b> ${esc(d.market||'—')}</span>
        <span><b>周期</b> ${esc(d.period||'—')}</span>
      </div>
      <div class="snip">${esc(snip)}${snip.length>=150?'…':''}</div>
      ${tagHtml?`<div class="tags">${tagHtml}</div>`:''}
    </div>`;
  }).join('');
  el.innerHTML = sum + viz + cluster + list;
}

/* ===== 详情 ===== */
function openDetailAt(file){
  const idx = FEEDBACK_DOCS.findIndex(d=>d.file===file);
  if(idx>=0) openDetail(idx);
}
function openDetail(i){
  const d=filt()[i]; if(!d) return;
  document.getElementById('mType').innerHTML=`<svg class="ic-svg"><use href="#${boardIcon(d.board)}"/></svg>`;
  document.getElementById('mTitle').textContent=d.title;
  const ext=[];
  if(d.board==='邮件原文'){ const l=dominantAiLabel(d); if(l) ext.push('AI意图：<b>'+esc(l)+'</b>'); }
  if(d.board==='用户评论与留言' && d.ratingHist){ const ks=Object.keys(d.ratingHist); if(ks.length){let s=0,n=0;ks.forEach(k=>{s+=parseFloat(k)*(d.ratingHist[k]||0);n+=d.ratingHist[k];});ext.push('平均评分：<b>'+(n?(s/n).toFixed(2):'—')+'★</b>');}}
  document.getElementById('mMeta').innerHTML=
    `<span>子看板：<b>${esc(d.board)}</b></span>`+
    `<span>来源：<b>${esc(d.source||'—')}</b></span>`+
    `<span>市场：<b>${esc(d.market||'—')}</b></span>`+
    `<span>周期：<b>${esc(d.period||'—')}</b></span>`+
    `<span>记录数：<b>${(d.rows||0).toLocaleString()}</b></span>`+
    `<span>字段数：<b>${d.colCount||0}</b></span>`+
    (ext.length?ext.map(e=>`<span>${e}</span>`).join(''):'');
  document.getElementById('mColN').textContent=d.colCount||0;
  document.getElementById('mCols').innerHTML=(d.cols||[]).map(c=>`<span class="tag">${esc(c)}</span>`).join('');
  const cols=d.cols||[];
  const samp=d.sample||[];
  let th='<tr>'+cols.map(c=>`<th>${esc(c)}</th>`).join('')+'</tr>';
  let tb=samp.map(r=>'<tr>'+cols.map((c,ci)=>`<td title="${esc(r[ci]||'')}">${esc(r[ci]||'')}</td>`).join('')+'</tr>').join('');
  document.getElementById('mSamp').innerHTML=th+tb;
  document.getElementById('mSampNote').textContent='仅展示前 '+samp.length+' 行样例（共 '+(d.rows||0).toLocaleString()+' 条记录，全量数据存于原始 xlsx 文件）。';
  const rt=document.getElementById('mRate'); const rtt=document.getElementById('mRateTitle');
  if(d.ratingHist && Object.keys(d.ratingHist).length){
    const max=Math.max(...Object.values(d.ratingHist));
    const keys=Object.keys(d.ratingHist).sort((a,b)=>parseFloat(a)-parseFloat(b));
    rt.innerHTML=keys.map(k=>`<div class="rbar"><div class="rt"><b>${esc(k)}★</b> ${d.ratingHist[k].toLocaleString()}</div><div class="rtrack"><div class="rfill" style="width:${Math.round(d.ratingHist[k]/max*100)}%"></div></div></div>`).join('');
    rtt.style.display='';
  } else { rt.innerHTML=''; rtt.style.display='none'; }
  document.getElementById('mask').classList.add('on');
}
function closeDetail(){document.getElementById('mask').classList.remove('on');}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ===================== 视图图层（与 de-dashboard 一致） ===================== */
function generateViewName(){
  const parts=[];
  if(activeBoard!=='全部') parts.push('看板:'+activeBoard);
  if(state.filters.src) parts.push('来源:'+state.filters.src);
  if(state.filters.mkt) parts.push('市场:'+state.filters.mkt);
  if(state.filters.year) parts.push('年份:'+state.filters.year);
  if(state.filters.q) parts.push('关键词:'+state.filters.q);
  if(state.drill) parts.push('聚类:'+state.drill.val);
  parts.push('维度:'+dimLabel(state.clusterDim));
  return parts.join(' · ');
}
function currentViewKey(){
  return JSON.stringify({b:activeBoard,f:state.filters,dim:state.clusterDim,drill:state.drill});
}
function saveCurrentView(){
  const key=currentViewKey();
  const dup=SAVED_VIEWS.find(v=>v.key===key);
  if(dup){ toast('该视图组合已存在：'+dup.name); setActiveView(dup.id); return; }
  _viewIdCounter++;
  const view={
    id:_viewIdCounter,
    name:generateViewName(),
    board:activeBoard,
    filters:JSON.parse(JSON.stringify(state.filters)),
    clusterDim:state.clusterDim,
    drill:state.drill?JSON.parse(JSON.stringify(state.drill)):null,
    hitCount:filt().length,
    key:key,
    createdAt:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})
  };
  SAVED_VIEWS.push(view);
  setActiveView(view.id);
  renderViewLayers();
  try{ localStorage.setItem('fb_saved_views', JSON.stringify(SAVED_VIEWS)); }catch(e){}
  toast('已保存视图：'+view.name);
}
function loadView(id){
  const v=SAVED_VIEWS.find(x=>x.id===id); if(!v) return;
  activeBoard=v.board||'全部';
  state.filters=JSON.parse(JSON.stringify(v.filters||{src:'',mkt:'',year:'',q:''}));
  state.clusterDim=v.clusterDim||'source';
  state.drill=v.drill?JSON.parse(JSON.stringify(v.drill)):null;
  document.getElementById('q').value=state.filters.q||'';
  document.getElementById('fSrc').value=state.filters.src||'';
  document.getElementById('fMkt').value=state.filters.mkt||'';
  document.getElementById('fYear').value=state.filters.year||'';
  const dims=availDims(); if(dims.indexOf(state.clusterDim)<0) state.clusterDim=dims[0];
  buildDimOptions();
  buildSide(); buildChips(); render();
  setActiveView(id);
}
function deleteView(id,e){
  if(e&&e.stopPropagation) e.stopPropagation();
  SAVED_VIEWS=SAVED_VIEWS.filter(v=>v.id!==id);
  _vlSel.delete(id); updateVlBatch();
  if(ACTIVE_VIEW_ID===id) ACTIVE_VIEW_ID=null;
  renderViewLayers();
  try{ localStorage.setItem('fb_saved_views', JSON.stringify(SAVED_VIEWS)); }catch(e){}
}
function setActiveView(id){
  ACTIVE_VIEW_ID=id;
  document.querySelectorAll('.vl-item').forEach(el=>el.classList.toggle('active', el.dataset.vid===String(id)));
}
function renderViewLayers(){
  const list=document.getElementById('vlList');
  document.getElementById('vlCount').textContent=String(SAVED_VIEWS.length);
  if(!SAVED_VIEWS.length){
    list.innerHTML='<div class="vl-empty">筛选后点「保存为新视图」<br>即可在此保存多组筛选条件</div>';
    return;
  }
  list.innerHTML=SAVED_VIEWS.map(v=>{
    const isActive=(v.id===ACTIVE_VIEW_ID);
    const isSel=_vlSel.has(v.id);
    const boardTag=(v.board&&v.board!=='全部')?`<span class="vl-board">${esc(v.board)}</span>`:'';
    return `<div class="vl-item${isActive?' active':''}${isSel?' selected':''}" data-vid="${v.id}" role="button" tabindex="0">`+
      `<input type="checkbox" class="vl-check" data-vid="${v.id}"${isSel?' checked':''}>`+
      `<span class="vl-dot"></span>`+
      `<span class="vl-name" title="${esc(v.name)}">${esc(v.name)}</span>`+
      boardTag+
      `<span class="vl-meta">${v.hitCount}篇</span>`+
      `<span class="vl-del" data-vid="${v.id}" title="删除此视图">✕</span>`+
      `</div>`;
  }).join('');
}
(function bindViewLayersToggle(){
  const panel=document.getElementById('viewLayers');
  const head=document.getElementById('vlHead');
  const btn=document.getElementById('vlToggle');
  if(!panel||!head) return;
  function toggle(e){ if(e&&e.type==='click'){e.stopPropagation();e.preventDefault();} panel.classList.toggle('collapsed'); }
  if(btn) btn.addEventListener('click',toggle);
  head.addEventListener('click',function(e){
    if(e.target.closest('.vl-toggle, .vl-check, .vl-del, input, button')) return;
    toggle(e);
  });
})();
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:9999;padding:8px 18px;border-radius:10px;font-size:12.5px;font-weight:600;color:#fff;background:rgba(0,0,0,.76);backdrop-filter:blur(8px);pointer-events:none;opacity:0;transition:opacity .25s';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(toast._tm); toast._tm=setTimeout(function(){t.style.opacity='0';},2000);
}
function updateVlBatch(){
  const n=_vlSel.size;
  document.getElementById('vlSelCount').textContent=n;
  document.getElementById('vlBatch').style.display=(n>0)?'':'none';
}
function toggleVlSel(id,on){ if(on)_vlSel.add(id); else _vlSel.delete(id); updateVlBatch(); }
function computeViewDocs(v){
  const savedB=activeBoard, savedF=JSON.parse(JSON.stringify(state.filters)), savedDim=state.clusterDim, savedDrill=state.drill;
  activeBoard=v.board||'全部';
  state.filters=JSON.parse(JSON.stringify(v.filters||{src:'',mkt:'',year:'',q:''}));
  state.clusterDim=v.clusterDim||'source';
  state.drill=v.drill?JSON.parse(JSON.stringify(v.drill)):null;
  const arr=filt();
  activeBoard=savedB; state.filters=savedF; state.clusterDim=savedDim; state.drill=savedDrill;
  return arr;
}
function csvCell(v){ v=(v==null?'':String(v)); if(/[",\n]/.test(v)) v='"'+v.replace(/"/g,'""')+'"'; return v; }
function downloadBlob(name,content,mime){
  try{
    const blob=new Blob([content],{type:mime||'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},120);
  }catch(e){ toast('下载失败：'+((e&&e.message)||e)); }
}
const FB_CART_COLUMNS=[
  {key:'file',label:'文件名'},{key:'title',label:'标题'},{key:'source',label:'来源'},
  {key:'market',label:'市场'},{key:'period',label:'周期'},{key:'rows',label:'记录数'},{key:'board',label:'子看板'}
];
function pushLocalCart(item){
  const key='cih_cart_v1', a=[];
  try{ a=JSON.parse(localStorage.getItem(key))||[]; }catch(e){}
  const dup=a.find(x=>x.source===item.source && x.filter===item.filter);
  if(dup){ dup.items=item.items; dup.count=item.count; dup.addedAt=item.addedAt; }
  else a.push(item);
  try{ localStorage.setItem(key,JSON.stringify(a)); }catch(e){}
}
function batchAddToCart(){
  if(!_vlSel.size){ toast('请先勾选视图'); return; }
  let added=0;
  SAVED_VIEWS.forEach(function(v){
    if(!_vlSel.has(v.id)) return;
    const items=computeViewDocs(v).map(function(d){ const o={}; FB_CART_COLUMNS.forEach(function(c){ o[c.key]=(d[c.key]==null?'':d[c.key]); }); return o; });
    const item={
      id:'cart_'+Date.now()+'_'+v.id+'_'+Math.floor(Math.random()*9999),
      source:'用户反馈信息合集 · '+(v.board||'全部'), filter:v.name, count:items.length,
      addedAt:new Date().toISOString(), columns:FB_CART_COLUMNS, items:items, _sel:true
    };
    try{ window.parent.postMessage({type:'cih-cart-add',item:item},'*'); }catch(e){}
    if(window.parent===window) pushLocalCart(item);
    added++;
  });
  toast('已批量加入 '+added+' 个视图到购物车');
}
function batchDownload(){
  if(!_vlSel.size){ toast('请先勾选视图'); return; }
  const rows=[];
  SAVED_VIEWS.forEach(function(v){
    if(!_vlSel.has(v.id)) return;
    const items=computeViewDocs(v).map(function(d){ const o={}; FB_CART_COLUMNS.forEach(function(c){ o[c.key]=(d[c.key]==null?'':d[c.key]); }); return o; });
    items.forEach(function(it){ it.__view=v.name; rows.push(it); });
  });
  if(!rows.length){ toast('所选视图无数据'); return; }
  const header=['视图'].concat(FB_CART_COLUMNS.map(function(c){return c.label;}));
  const lines=[header.join(',')];
  rows.forEach(function(it){
    const cells=[csvCell(it.__view)].concat(FB_CART_COLUMNS.map(function(c){return csvCell(it[c.key]);}));
    lines.push(cells.join(','));
  });
  downloadBlob('用户反馈合集-多视图-'+rows.length+'条.csv','﻿'+lines.join('\n'),'text/csv;charset=utf-8');
}

/* ===== 初始化 ===== */
(function initViews(){
  try{ const raw=localStorage.getItem('fb_saved_views'); if(raw) SAVED_VIEWS=JSON.parse(raw)||[]; }catch(e){}
  SAVED_VIEWS.forEach(v=>{ if(v.id>_viewIdCounter)_viewIdCounter=v.id; });
})();
buildDimOptions();
buildSide(); buildChips(); render(); renderViewLayers();
document.getElementById('saveViewBtn').addEventListener('click',saveCurrentView);
document.getElementById('vlList').addEventListener('click',function(e){
  const del=e.target.closest('.vl-del');
  if(del){ const vid=Number(del.dataset.vid); if(vid>0) deleteView(vid,e); return; }
  if(e.target.closest('.vl-check')) return;
  const item=e.target.closest('.vl-item'); if(!item) return;
  const vid=Number(item.dataset.vid); if(vid>0) loadView(vid);
});
document.getElementById('vlList').addEventListener('keydown',function(e){
  if(e.key!=='Enter'&&e.key!==' ') return;
  const item=e.target.closest('.vl-item'); if(!item) return;
  e.preventDefault(); const vid=Number(item.dataset.vid); if(vid>0) loadView(vid);
});
document.getElementById('vlList').addEventListener('change',function(e){
  const cb=e.target.closest('.vl-check'); if(!cb) return;
  toggleVlSel(Number(cb.dataset.vid),cb.checked);
});
document.getElementById('vlBatchAdd').addEventListener('click',batchAddToCart);
document.getElementById('vlBatchDl').addEventListener('click',batchDownload);
document.getElementById('vlBatchClear').addEventListener('click',function(){_vlSel.clear();renderViewLayers();updateVlBatch();});
document.getElementById('vlBatchAll').addEventListener('click',function(){
  const all=SAVED_VIEWS.length>0 && SAVED_VIEWS.every(function(v){return _vlSel.has(v.id);});
  if(all) _vlSel.clear(); else SAVED_VIEWS.forEach(function(v){_vlSel.add(v.id);});
  renderViewLayers(); updateVlBatch();
});
</script>
</body>
